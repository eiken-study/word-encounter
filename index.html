   ja:"危機的状況では、緊急要員からの明確な指示への即時obedienceが、生死の差を意味することがある。"},
  {label:"でる度C #1196",target:"objectivity",jp:"その後、続いて",
   en:"Maintaining objectivity when reporting on highly emotional topics is one of the most challenging aspects of professional journalism.",
   ja:"感情的なトピックを報道する際にobjectivityを維持することは、プロのジャーナリズムで最も難しい側面の一つだ。"},
  {label:"でる度C #1197",target:"obsession",jp:"故意に",
   en:"His obsession with achieving perfection led to extreme overwork and eventually caused a serious physical and mental breakdown.",
   ja:"完璧を達成することへの彼のobsessionが極度の過重労働をもたらし、最終的に深刻な身体的・精神的崩壊を引き起こした。"},
  {label:"でる度C #1198",target:"oppression",jp:"優しく、静かに",
   en:"Generations of political oppression left deep scars on the collective memory and cultural identity of the affected population.",
   ja:"世代にわたる政治的oppressionが、影響を受けた人々の集団的記憶と文化的アイデンティティに深い傷を残した。"},
  {label:"でる度C #1199",target:"optimism",jp:"〜の手段によって、〜経由で",
   en:"Despite the challenges ahead, the scientist maintained her optimism that a solution could eventually be found through collaborative research.",
   ja:"前途の課題にもかかわらず、科学者は協力的な研究を通じて最終的に解決策が見つかるという彼女のoptimismを維持した。"},
  {label:"でる度C #1200",target:"outbreak",jp:"と一緒に",
   en:"Rapid containment of the outbreak depended on clear public communication and swift deployment of medical resources.",
   ja:"outbreakの迅速な封じ込めは、明確な公的コミュニケーションと医療リソースの迅速な展開に依存していた。"},
  {label:"でる度C #1201",target:"overconfidence",jp:"を描写する、を描く。",
   en:"The company's overconfidence in its dominant market position led it to ignore emerging competitors until it was too late.",
   ja:"支配的な市場地位への会社のoverconfidenceが、遅すぎるまで新興の競合他社を無視させることにつながった。"},
  {label:"でる度C #1202",target:"oversight",jp:"を急送する、を急派する",
   en:"The regulatory oversight of the financial sector was deemed inadequate by independent analysts following the banking crisis.",
   ja:"金融危機後、独立したアナリストによって金融セクターの規制的oversightが不十分と判断された。"},
  {label:"でる度C #1203",target:"passion",jp:"伝える",
   en:"Her passion for social justice was the driving force behind decades of tireless advocacy on behalf of marginalized communities.",
   ja:"社会的正義への彼女のpassionが、疎外されたコミュニティのための数十年にわたる精力的な活動の原動力だった。"},
  {label:"でる度C #1204",target:"pessimism",jp:"を改正する、を修正する",
   en:"The economists' pessimism about recovery prospects was reflected in their cautious forecasts for growth in the coming year.",
   ja:"回復見通しへのエコノミストのpessimismは、来年の成長への慎重な予測に反映されていた。"},
  {label:"でる度C #1205",target:"poverty",jp:"を裏切る",
   en:"Persistent poverty in rural areas reflects a lack of investment in infrastructure, education, and economic diversification.",
   ja:"農村部の持続的なpovertyは、インフラ、教育、経済的多様化への投資の欠如を反映している。"},
  {label:"でる度C #1206",target:"prejudice",jp:"しおれる",
   en:"Unconscious prejudice in hiring processes can disadvantage qualified candidates from minority backgrounds even when policies are neutral.",
   ja:"採用プロセスにおける無意識のprejudiceは、方針が中立であっても、少数派の背景を持つ資格のある候補者を不利にすることがある。"},
  {label:"でる度C #1207",target:"presumption",jp:"省略する",
   en:"The presumption of innocence is a cornerstone of fair trial rights that must be protected in any just legal system.",
   ja:"無罪のpresumptionは、いかなる公正な法制度においても保護されなければならない公正な裁判権の礎石だ。"},
  {label:"でる度C #1208",target:"pride",jp:"をでっち上げる",
   en:"National pride can be a unifying force, but when taken to extremes it can become a barrier to international cooperation.",
   ja:"国民的prideは統合的な力になり得るが、行き過ぎると国際協力への障壁になり得る。"},
  {label:"でる度C #1209",target:"privilege",jp:"(約束など)を破る",
   en:"Recognizing one's own privilege is the first step toward understanding and addressing systemic inequality in society.",
   ja:"自分自身のprivilegeを認識することは、社会における制度的不平等を理解し対処するための最初のステップだ。"},
  {label:"でる度C #1210",target:"procrastination",jp:"証拠なしに主張する",
   en:"Research shows that procrastination is often driven by anxiety and perfectionism rather than laziness or poor time management.",
   ja:"研究によると、procrastinationは怠惰や時間管理の悪さではなく、多くの場合anxietyと完璧主義によって駆動されることが示されている。"},
  {label:"でる度C #1211",target:"proficiency",jp:"統合する",
   en:"Achieving proficiency in a second language typically requires several thousand hours of dedicated study and regular practice.",
   ja:"第二言語のproficiencyを達成するには、通常、何千時間もの専念した学習と定期的な練習が必要だ。"},
  {label:"でる度C #1212",target:"propaganda",jp:"を過小評価する",
   en:"State-sponsored propaganda was used to manipulate public perception of the conflict and justify military intervention.",
   ja:"国家が後援するpropagandaが、紛争についての国民の認識をmanipulateし、軍事介入を正当化するために使われた。"},
  {label:"でる度C #1213",target:"prosperity",jp:"護衛する、護送する",
   en:"Sustainable prosperity depends on equitable distribution of wealth and investment in public services that benefit all citizens.",
   ja:"持続可能なprosperityは、富の公平な分配とすべての市民に利益をもたらす公共サービスへの投資に依存している。"},
  {label:"でる度C #1214",target:"racism",jp:"を促進する、を容易にする",
   en:"Institutional racism embedded in hiring, housing, and criminal justice systems perpetuates inequality across generations.",
   ja:"採用、住宅、刑事司法制度に埋め込まれた制度的racismが、世代を越えて不平等を持続させる。"},
  {label:"でる度C #1215",target:"rationality",jp:"を新たに始める",
   en:"Economic theories that assume complete rationality in human decision-making often fail to account for emotional and cognitive biases.",
   ja:"人間の意思決定における完全なrationalityを前提とする経済理論は、感情的および認知的バイアスを考慮に入れないことが多い。"},
  {label:"でる度C #1216",target:"realism",jp:"を伝える",
   en:"The novelist was praised for the unflinching realism of her portrayal of poverty and social inequality in postwar society.",
   ja:"その小説家は戦後社会のpovertyと社会的不平等の描写における揺るぎないrealismで称賛された。"},
  {label:"でる度C #1217",target:"rebellion",jp:"に住み着く",
   en:"The student rebellion of the 1960s challenged traditional authority and helped reshape social norms in many Western countries.",
   ja:"1960年代の学生rebellionは伝統的な権威に挑戦し、多くの西洋諸国で社会的規範を再形成するのに役立った。"},
  {label:"でる度C #1218",target:"reconciliation",jp:"を補強する、を強化する",
   en:"True reconciliation between formerly divided communities requires both formal acknowledgment of past wrongs and ongoing dialogue.",
   ja:"以前に分断されたコミュニティ間の真のreconciliationには、過去の過ちの公式な認識と継続的な対話の両方が必要だ。"},
  {label:"でる度C #1219",target:"redemption",jp:"を獲得する、を達成する",
   en:"The film explored the theme of personal redemption through a character who gradually overcame his troubled past.",
   ja:"その映画は、徐々に波乱に満ちた過去を克服するキャラクターを通して個人的なredemptionのテーマを探求した。"},
  {label:"でる度C #1220",target:"resentment",jp:"カンニングをする",
   en:"Resentment that builds up over years of perceived unfair treatment can ultimately destroy even the strongest professional relationships.",
   ja:"不公平な扱いと感じられることへの長年のresentmentは、最も強固な職業的関係さえも最終的に破壊することがある。"},
  {label:"でる度C #1221",target:"resignation",jp:"をだます",
   en:"Her resignation from the party came as a shock to supporters who had seen her as a future leader.",
   ja:"彼女のresignationは、彼女を将来のリーダーと見ていた支持者にとってショックとなった。"},
  {label:"でる度C #1222",target:"resistance",jp:"に不満を抱かせる",
   en:"Historical resistance movements against colonial rule often relied on nonviolent tactics that eventually led to independence.",
   ja:"植民地支配に対する歴史的なresistance運動は、しばしば最終的に独立につながった非暴力的な戦術に頼った。"},
  {label:"でる度C #1223",target:"resolution",jp:"に補助金を支給する",
   en:"Making a New Year's resolution is easy; the true challenge lies in sustaining the effort needed to achieve lasting change.",
   ja:"新年のresolutionを立てることは簡単だが、本当の課題は持続的な変化を達成するために必要な努力を維持することだ。"},
  {label:"でる度C #1224",target:"restraint",jp:"行き来する、行ったり来たりする",
   en:"Diplomatic restraint in the face of provocation prevented a minor incident from escalating into a full diplomatic crisis.",
   ja:"挑発に直面した外交的restraintが、小さな事件が本格的な外交危機にエスカレートするのを防いだ。"},
  {label:"でる度C #1225",target:"retaliation",jp:"を捧げる",
   en:"The government warned that any military retaliation against civilian targets would result in immediate international sanctions.",
   ja:"政府は、民間人の標的に対するいかなる軍事的retaliationも即時の国際的な制裁をもたらすと警告した。"},
  {label:"でる度C #1226",target:"revelation",jp:"しようと努力する、を試みる",
   en:"The revelation that the company had been covering up safety defects for years triggered a major investigation and public outrage.",
   ja:"その会社が何年もの間安全上の欠陥を隠蔽してきたというrevelationが、大規模な調査と国民の怒りを引き起こした。"},
  {label:"でる度C #1227",target:"revenge",jp:"の興味をそそる",
   en:"The desire for revenge rarely leads to satisfaction and often perpetuates cycles of conflict rather than resolving underlying issues.",
   ja:"revengeへの欲求は満足をもたらすことはまれで、根本的な問題を解決するのではなく紛争のサイクルを持続させることが多い。"},
  {label:"でる度C #1228",target:"reward",jp:"急上昇する",
   en:"The reward for years of dedicated research was the discovery of a treatment that could benefit millions of patients worldwide.",
   ja:"何年もの専念した研究へのrewardは、世界中で何百万もの患者に利益をもたらす可能性のある治療法の発見だった。"},
  {label:"でる度C #1229",target:"ridicule",jp:"をからかう",
   en:"Fear of ridicule prevents many people from sharing unconventional ideas that might otherwise lead to genuine innovation.",
   ja:"ridiculeへの恐怖が、多くの人々が本物のイノベーションにつながるかもしれない型破りなアイデアを共有することを妨げている。"},
  {label:"でる度C #1230",target:"confer",jp:"を授けるを、授与する",
   en:"The university decided to confer an honorary degree upon the novelist in recognition of her contribution to literature.",
   ja:"大学は文学への貢献を称えて、その小説家に名誉学位をconferすることを決めた。"},
  {label:"でる度C #1231",target:"forbid",jp:"を禁じる",
   en:"The regulations forbid the use of mobile phones while operating heavy machinery to prevent accidents in the workplace.",
   ja:"規制は職場での事故を防ぐために、重機を操作中の携帯電話使用をforbidしている。"},
  {label:"でる度C #1232",target:"nod",jp:"うなずく、頭を軽く下げる",
   en:"The senior partner nodded in approval as the junior lawyer presented her case clearly and confidently to the panel.",
   ja:"後輩の弁護士が陪審団に明確かつ自信を持ってケースを発表すると、上級パートナーは賛同のnodをした。"},
  {label:"でる度C #1233",target:"oblige",jp:"〜せざるを得ない、やむを得ず〜する",
   en:"As a professional accountant, she was obliged to report any financial irregularities she discovered, regardless of the consequences.",
   ja:"専門の会計士として、彼女は結果にかかわらず発見した財務上の不正をreportすることをobligedされていた。"},
  {label:"でる度C #1234",target:"discontent",jp:"不満",
   en:"Growing discontent among workers over wages and conditions eventually led to the formation of a new independent trade union.",
   ja:"賃金と労働条件をめぐる労働者間のgrowing discontentはついに新しい独立した労働組合の結成につながった。"},
  {label:"でる度C #1235",target:"disposal",jp:"処理、処分",
   en:"The safe disposal of chemical waste is strictly regulated to protect both the environment and public health from contamination.",
   ja:"化学廃棄物の安全なdisposalは、汚染から環境と公衆衛生の両方を保護するために厳しく規制されている。"},
  {label:"でる度C #1236",target:"exile",jp:"国外追放",
   en:"The dissident was forced into exile after the government declared his political activities illegal and issued a warrant for his arrest.",
   ja:"政府が彼の政治活動を違法と宣言し逮捕令状を発行した後、その反体制派は強制的にexileに追いやられた。"},
  {label:"でる度C #1237",target:"foe",jp:"敵",
   en:"The two political opponents, long considered bitter foes, surprised everyone by agreeing to collaborate on the environmental reform package.",
   ja:"長い間激しいfoeとみなされていた2人の政治的対立者が、環境改革パッケージで協力することに合意して全員を驚かせた。"},
  {label:"でる度C #1238",target:"itinerary",jp:"日程、旅行計画",
   en:"The tour operator provided a detailed itinerary outlining each day's activities, meal times, and accommodation arrangements.",
   ja:"旅行会社は毎日の活動、食事時間、宿泊施設の手配を概説した詳細なitineraryを提供した。"},
  {label:"でる度C #1239",target:"persecution",jp:"迫害、弾圧",
   en:"Thousands of people fled the country to escape the brutal persecution of ethnic minorities carried out by the regime.",
   ja:"何千人もの人々が、政権による民族的マイノリティのbrutalなpersecutionから逃れるために国を離れた。"},
  {label:"でる度C #1240",target:"publication",jp:"出版物",
   en:"The academic journal agreed to delay the publication of the study until the research team had addressed all peer review concerns.",
   ja:"学術誌は研究チームがすべての査読の懸念に対処するまで、その研究のpublicationを延期することに合意した。"},
  {label:"でる度C #1241",target:"riddle",jp:"なぞなぞ",
   en:"The ancient inscription proved to be a riddle that scholars puzzled over for decades before its meaning was finally uncovered.",
   ja:"その古代の碑文は意味が最終的に明らかになるまで、学者たちが何十年も頭を悩ませたriddleであることが判明した。"},
  {label:"でる度C #1242",target:"sanitation",jp:"公衆衛生",
   en:"Improving sanitation infrastructure in developing regions is one of the most cost-effective ways to reduce child mortality rates.",
   ja:"開発途上地域のsanitation インフラの改善は、子どもの死亡率を下げる最もコスト効率の良い方法の一つだ。"},
  {label:"でる度C #1243",target:"component",jp:"部品",
   en:"Quality control checks are applied to every component before assembly to ensure the final product meets safety standards.",
   ja:"品質管理チェックはすべてのcomponentに組み立て前に適用され、最終製品が安全基準を満たすことを確保する。"},
  {label:"でる度C #1244",target:"quota",jp:"割り当て量",
   en:"The government set an import quota on foreign steel to protect domestic manufacturers from unfair competition.",
   ja:"政府は国内の製造業者を不公正な競争から守るために、外国産鉄鋼に輸入quotaを設けた。"},
  {label:"でる度C #1245",target:"cuisine",jp:"料理",
   en:"The city's diverse cuisine reflects its history as a crossroads of trade routes, blending flavors from dozens of cultures.",
   ja:"その都市の多様なcuisineは、何十もの文化の風味を融合させた交易路の交差点としての歴史を反映している。"},
  {label:"でる度C #1246",target:"detour",jp:"迂回、迂回路、回り道",
   en:"Road construction forced drivers to take a lengthy detour through the residential streets, adding significant time to their commute.",
   ja:"道路工事により、ドライバーは住宅街を通る長いdetourを余儀なくされ、通勤時間に大幅な追加をもたらした。"},
  {label:"でる度C #1247",target:"inmate",jp:"収容者",
   en:"The prison introduced a vocational training program to help inmates develop practical skills and reduce the likelihood of reoffending.",
   ja:"刑務所は受刑者が実践的なスキルを身につけ再犯の可能性を減らすために、職業訓練プログラムを導入した。"},
  {label:"でる度C #1249",target:"uproar",jp:"大騒ぎ、騒動",
   en:"The unexpected decision to close the beloved community centre caused an uproar among local residents, who organized a protest march.",
   ja:"愛されていたコミュニティセンターを閉鎖するという予期せぬ決定は、抗議行進を組織した地域住民の間でuproarを引き起こした。"},
  {label:"でる度C #1250",target:"coincidence",jp:"偶然の一致",
   en:"It seemed too convenient to be mere coincidence that both witnesses had given almost identical accounts of the disputed event.",
   ja:"両方の証人が争われた出来事についてほぼ同一の陳述をしたことは、単なるcoincidenceと言うには都合が良すぎるように思えた。"},
  {label:"でる度C #1251",target:"correspondence",jp:"通信",
   en:"The historian discovered a fascinating collection of correspondence between the two scientists dating back to the early twentieth century.",
   ja:"その歴史家は20世紀初頭にさかのぼる2人の科学者間の魅力的なcorrespondenceのコレクションを発見した。"},
  {label:"でる度C #1252",target:"ballot",jp:"投票",
   en:"All members of the organization were invited to cast a ballot in the election for a new chairperson.",
   ja:"組織のすべてのメンバーが新しい議長の選挙でballotを投じるよう招かれた。"},
  {label:"でる度C #1253",target:"competence",jp:"能力",
   en:"The committee assessed each candidate's competence through a series of practical tasks and structured interviews before making its decision.",
   ja:"委員会は決定を下す前に、一連の実践的なタスクと構造化された面接を通じて各候補者のcompetenceを評価した。"},
  {label:"でる度C #1254",target:"enterprise",jp:"事業",
   en:"The young entrepreneur launched a social enterprise that employed people with disabilities to produce handcrafted goods for local markets.",
   ja:"その若い起業家は地元市場向けに手工芸品を製造するために障害のある人々を雇用するソーシャルenterpriseを立ち上げた。"},
  {label:"でる度C #1255",target:"hazard",jp:"危険",
   en:"Workers were required to wear protective equipment at all times due to the significant chemical hazard posed by the substances used.",
   ja:"使用されている物質による重大な化学的hazardのため、労働者は常に保護具を着用することが求められた。"},
  {label:"でる度C #1256",target:"explosion",jp:"爆発",
   en:"The explosion at the chemical plant injured several workers and prompted an immediate evacuation of the surrounding neighborhood.",
   ja:"化学工場でのexplosionは数人の労働者を負傷させ、周辺の地域の即時避難を促した。"},
  {label:"でる度C #1257",target:"famine",jp:"飢饉",
   en:"International aid organizations mobilized quickly in response to the threat of famine caused by a combination of drought and conflict.",
   ja:"国際援助機関は干ばつと紛争の組み合わせによって引き起こされたfamineの脅威に対応して迅速に動員した。"},
  {label:"でる度C #1258",target:"acceptance",jp:"受け取り、受諾",
   en:"Her acceptance into the prestigious research program marked the beginning of a career that would reshape her entire field.",
   ja:"権威ある研究プログラムへのacceptanceは、彼女の分野全体を再構築することになるキャリアの始まりを示した。"},
  {label:"でる度C #1259",target:"leftover",jp:"残り物、食べ残し",
   en:"She used the leftover vegetables from the previous night's dinner to make a hearty soup for lunch the following day.",
   ja:"彼女は前夜の夕食のleftoverの野菜を使って、翌日の昼食にボリューム満点のスープを作った。"},
  {label:"でる度C #1260",target:"apprehension",jp:"不安、懸念",
   en:"A sense of apprehension spread through the team as the deadline approached and key parts of the project remained incomplete.",
   ja:"締め切りが近づき、プロジェクトの重要な部分が未完成のままだったため、チームにapprehensionの感覚が広まった。"},
  {label:"でる度C #1261",target:"wreck",jp:"残骸",
   en:"Divers explored the wreck of the merchant ship that had sunk in a storm over three hundred years ago.",
   ja:"ダイバーたちは300年以上前の嵐で沈没した商船のwreckを探索した。"},
  {label:"でる度C #1262",target:"landmark",jp:"歴史的建造物",
   en:"The old lighthouse has been designated a protected landmark and will be carefully restored to its original condition.",
   ja:"古い灯台は保護されたlandmarkに指定され、元の状態に丁寧に修復される予定だ。"},
  {label:"でる度C #1263",target:"dweller",jp:"居住者",
   en:"Urban dwellers tend to have higher exposure to air pollution than those living in rural or suburban areas.",
   ja:"都市のdwellerは農村部や郊外に住む人々よりも大気汚染への暴露が高い傾向がある。"},
  {label:"でる度C #1264",target:"geometry",jp:"幾何学",
   en:"The architect's work was inspired by the geometry of natural forms, incorporating curves and organic shapes into every design.",
   ja:"その建築家の作品は自然形態のgeometryにインスパイアされ、すべてのデザインに曲線と有機的な形を取り入れた。"},
  {label:"でる度C #1265",target:"standby",jp:"頼りになるもの(人)",
   en:"The backup generator was kept on standby to ensure the hospital's critical systems could function even during a power outage.",
   ja:"停電時でも病院の重要なシステムが機能できるよう、バックアップ発電機はstandbyの状態に維持されていた。"},
  {label:"でる度C #1267",target:"accuracy",jp:"正確さ",
   en:"The accuracy of the automated translation system has improved significantly, though it still struggles with nuanced idiomatic expressions.",
   ja:"自動翻訳システムのaccuracyは大幅に改善されているが、ニュアンスのある慣用的表現にはまだ苦労している。"},
  {label:"でる度C #1268",target:"tap",jp:"水道の蛇口",
   en:"The tap in the kitchen had been dripping for weeks, wasting a significant amount of water before it was finally repaired.",

// ── Highlight ──
function escR(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }
function highlight(text, target){
  if(!text) return '';
  const parts = text.split(/(<[^>]+>)/);
  const sorted = [...VOCAB].sort((a,b) => b.w.length - a.w.length);
  return parts.map(part => {
    if (part.startsWith('<')) return part;
    if(target){
      const base = target.toLowerCase();
      const forms = [base,base+'s',base+'ed',base+'ing',base+'er',base+'d',
                     base.replace(/e$/,'ing'),base.replace(/y$/,'ied'),base.replace(/e$/,'ed')]
        .filter((f,i,a)=>a.indexOf(f)===i).sort((a,b)=>b.length-a.length);
      const re = new RegExp('\\b('+forms.map(escR).join('|')+')\\b','gi');
      part = part.replace(re, match => `<span class="tw target-word" data-word="${base}">${match}</span>`);
    }
    sorted.forEach(v => {
      const base = v.w;
      const forms = [base,base+'s',base+'ed',base+'ing',base+'er',base+'d',
                     base.replace(/e$/,'ing'),base.replace(/y$/,'ied'),base.replace(/e$/,'ed')]
        .filter((f,i,a)=>a.indexOf(f)===i).sort((a,b)=>b.length-a.length);
      const re = new RegExp('\\b('+forms.map(escR).join('|')+')\\b','gi');
      part = part.replace(re, match => {
        if(part.includes('class="tw')) return match;
        const isM = v.src.length > 1;
        return `<span class="tw${isM?' multi':''}" data-word="${base}">${match}</span>`;
      });
    });
    return part;
  }).join('');
}

// ── State ──
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
let blocks = shuffle(ALL_BLOCKS);
let idx = 0;
let showingJa = false;

function renderCard(){
  const b = blocks[idx];
  document.getElementById('card-source-en').textContent = b.label;
  document.getElementById('card-body-en').innerHTML = highlight(b.en||'', b.target||null);
  document.getElementById('card-body-ja').textContent = b.ja;
  document.getElementById('card-en').style.display = showingJa ? 'none' : 'block';
  document.getElementById('card-ja').style.display = showingJa ? 'block' : 'none';
  document.getElementById('card-progress').textContent = `${idx+1} / ${blocks.length}`;
  document.getElementById('progress-fill').style.width = ((idx+1)/blocks.length*100)+'%';
  document.getElementById('card-state').textContent = showingJa ? '📖 和訳' : '🔤 英文';
  document.getElementById('btn-prev').disabled = (idx === 0 && !showingJa);
  const isLast = idx === blocks.length - 1;
  const btn = document.getElementById('btn-next');
  if(isLast && showingJa){ btn.textContent = '最初から'; }
  else if(showingJa){ btn.textContent = '次の英文 →'; }
  else { btn.textContent = '和訳を見る →'; }
}

function cardNext(){
  const isLast = idx === blocks.length - 1;
  if(!showingJa){ showingJa = true; }
  else if(isLast){ idx = 0; showingJa = false; }
  else { idx++; showingJa = false; }
  renderCard();
}

function cardNav(dir){
  if(showingJa){ showingJa = false; }
  else { idx = Math.max(0, idx + dir); showingJa = false; }
  renderCard();
}

function doShuffle(){
  blocks = shuffle(ALL_BLOCKS);
  idx = 0; showingJa = false;
  renderCard();
}
// ── startApp (top screen → card screen) ──
function startApp(){
  document.getElementById('top-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  renderCard();
}

// ── Popup ──
const popup = document.getElementById('popup');
let pTimeout = null;
document.addEventListener('mouseover', e => {
  const el = e.target.closest('.tw'); if(!el) return;
  clearTimeout(pTimeout); showPopup(el.dataset.word, el);
});
document.addEventListener('mouseout', e => {
  const el = e.target.closest('.tw'); if(!el) return;
  pTimeout = setTimeout(()=>popup.classList.remove('show'), 150);
});
popup.addEventListener('mouseenter', ()=>clearTimeout(pTimeout));
popup.addEventListener('mouseleave', ()=>popup.classList.remove('show'));
document.addEventListener('click', e => {
  const el = e.target.closest('.tw');
  if(!el){ popup.classList.remove('show'); return; }
  showPopup(el.dataset.word, el); e.stopPropagation();
});
document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight'||e.key==='ArrowDown') cardNext();
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')   cardNav(-1);
});

function showPopup(word, anchor){
  const v = VOCAB.find(x=>x.w.toLowerCase()===word.toLowerCase());
  const s500 = !v ? ALL_BLOCKS.find(b=>b.target&&b.target.toLowerCase()===word.toLowerCase()) : null;
  if(!v && !s500) return;
  if(v){
    document.getElementById('pp-word').textContent = v.w;
    document.getElementById('pp-num').textContent = `でる度A — #${v.n}`;
    document.getElementById('pp-jp').textContent = v.jp;
    const rows = v.src.map(s=>`<div class="pp-enc-row"><span class="pp-enc-badge">${s}</span></div>`).join('');
    document.getElementById('pp-enc').innerHTML = `<div class="pp-enc-label">出現箇所 (${v.src.length})</div>${rows}`;
  } else {
    const n = parseInt(s500.label.replace('でる度A #',''));
    document.getElementById('pp-word').textContent = word;
    document.getElementById('pp-num').textContent = `でる度A — #${n}`;
    document.getElementById('pp-jp').textContent = s500.jp || '';
    document.getElementById('pp-enc').innerHTML = '<div class="pp-enc-label">でる度A 例文カード</div>';
  }
  popup.classList.add('show');
  const rect = anchor.getBoundingClientRect();
  let top = rect.bottom + window.scrollY + 6;
  let left = rect.left + window.scrollX;
  if(left+300>window.innerWidth-16) left=window.innerWidth-316;
  if(left<8) left=8;
  if(rect.bottom+200>window.innerHeight) top=rect.top+window.scrollY-215;
  popup.style.left=left+'px'; popup.style.top=top+'px';
}
