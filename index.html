<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英検準1級｜単語遭遇カード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap');
  :root {
    --bg:#f7f5f0; --paper:#fffffe; --ink:#1c1a18; --ink-mid:#5a5650;
    --ink-light:#999490; --border:#e2ded8;
    --red:#b8381a; --red-bg:rgba(184,56,26,0.10); --red-line:rgba(184,56,26,0.55);
    --multi-bg:rgba(184,56,26,0.20); --multi-line:#b8381a;
    --green:#2a7a4b; --green-bg:rgba(42,122,75,0.08); --green-border:rgba(42,122,75,0.3);
  }
  *{box-sizing:border-box;margin:0;padding:0;} html,body{height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:'Noto Serif JP',serif;font-size:16px;line-height:2;}

  header{
    position:sticky;top:0;z-index:100;
    background:#faf8f4;color:#fff;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 24px;height:52px;
  }
  .logo{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;}
  .logo em{color:#b8381a;font-style:normal;}
  .header-right{display:flex;align-items:center;gap:10px;}
  .legend-s{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--red-bg);border-bottom:2px solid var(--red-line);border-radius:2px;padding:0 5px;color:#ccc;}
  .legend-m{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--multi-bg);border-bottom:3px solid var(--multi-line);border-radius:2px;padding:0 5px;color:#ccc;}
  .legend-txt{font-family:'Noto Sans JP',sans-serif;font-size:10px;color:rgba(255,255,255,.45);margin-right:4px;}
  .shuffle-btn{
    font-family:'IBM Plex Mono',monospace;font-size:10px;
    background:none;border:1px solid rgba(255,255,255,.3);
    color:#fff;border-radius:4px;padding:4px 14px;cursor:pointer;
    transition:background .15s;
  }
  .shuffle-btn:hover{background:rgba(255,255,255,.1);}
  .tw.target-word{
    background:var(--red-bg);
    border-bottom:2px solid var(--red-line);
    border-radius:2px;padding:0 1px;
    font-weight:700;cursor:pointer;
  }

  .shell{display:flex;min-height:calc(100vh - 52px);}

  .card-area{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:40px 24px 60px;
  }

  .card{
    background:var(--paper);border:1px solid var(--border);
    border-radius:16px;
    box-shadow:0 4px 28px rgba(0,0,0,.08);
    padding:48px 56px;max-width:700px;width:100%;
    min-height:260px;
    
  }

  /* 英文面 */
  .card-en .card-source{
    font-family:'IBM Plex Mono',monospace;font-size:9px;
    color:var(--ink-light);letter-spacing:.15em;text-transform:uppercase;
    margin-bottom:20px;
  }
  .card-en .card-body{font-size:16px;line-height:2.1;}

  /* 和訳面 */
  .card-ja{display:none;}
  .card-ja .card-source{
    font-family:'IBM Plex Mono',monospace;font-size:9px;
    color:var(--green);letter-spacing:.15em;text-transform:uppercase;
    margin-bottom:20px;
  }
  .card-ja .card-body{
    font-family:'Noto Sans JP',sans-serif;
    font-size:15px;line-height:2;color:var(--ink-mid);
    border-left:3px solid var(--green-border);
    padding-left:18px;
  }
  .card-ja-note{
    margin-top:16px;padding-top:12px;
    border-top:1px dashed var(--border);
    font-family:'IBM Plex Mono',monospace;font-size:9px;
    color:var(--ink-light);letter-spacing:.05em;
  }

  .progress-bar{width:100%;height:3px;background:var(--border);border-radius:2px;margin-top:36px;}
  .progress-fill{height:100%;background:var(--red);border-radius:2px;transition:width .25s;}

  .card-nav{
    display:flex;align-items:center;gap:16px;
    max-width:700px;width:100%;margin-top:20px;
  }
  .nav-btn{
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    border:1px solid var(--border);background:var(--paper);
    color:var(--ink-mid);border-radius:6px;padding:9px 24px;
    cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .nav-btn:hover:not(:disabled){border-color:var(--red);color:var(--red);}
  .nav-btn:disabled{opacity:.25;cursor:default;}
  .nav-btn.ja-btn{border-color:var(--green-border);color:var(--green);}
  .nav-btn.ja-btn:hover{background:var(--green-bg);}
  .card-progress{
    font-family:'IBM Plex Mono',monospace;font-size:11px;
    color:var(--ink-light);flex:1;text-align:center;
  }
  .card-state{
    font-family:'Noto Sans JP',sans-serif;font-size:10px;
    color:var(--ink-light);text-align:center;margin-top:4px;
  }

  .tw{background:var(--red-bg);border-bottom:2px solid var(--red-line);border-radius:2px;cursor:pointer;padding:0 2px;transition:background .12s;}
  .tw:hover{background:rgba(184,56,26,.22);}
  .tw.multi{background:var(--multi-bg);border-bottom:3px solid var(--multi-line);}
  .tw.multi:hover{background:rgba(184,56,26,.30);}

  .popup{
    position:fixed;z-index:300;
    background:var(--paper);border:1px solid var(--border);
    border-radius:10px;
    box-shadow:0 8px 36px rgba(0,0,0,.13),0 2px 8px rgba(0,0,0,.07);
    padding:18px 22px 16px;max-width:300px;min-width:210px;
    pointer-events:none;opacity:0;transform:translateY(8px);
    transition:opacity .15s,transform .15s;
  }
  .popup.show{opacity:1;transform:translateY(0);}
  .pp-word{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:500;color:var(--red);margin-bottom:2px;}
  .pp-num{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-light);margin-bottom:8px;}
  .pp-jp{font-family:'Noto Sans JP',sans-serif;font-size:15px;font-weight:500;color:var(--ink);margin-bottom:10px;}
  .pp-enc{border-top:1px solid var(--border);padding-top:10px;}
  .pp-enc-label{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink-light);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;}
  .pp-enc-row{display:flex;align-items:center;padding:3px 0;border-bottom:1px dotted var(--border);}
  .pp-enc-row:last-child{border-bottom:none;}
  .pp-enc-badge{font-family:'IBM Plex Mono',monospace;font-size:9px;background:var(--red);color:#fff;border-radius:3px;padding:2px 6px;}

  @media(max-width:700px){
    .card{padding:28px 22px;min-height:200px;}
    .card-area{padding:24px 12px 48px;}
    .legend-s,.legend-m,.legend-txt{display:none;}
  }
  .vocab-card-en{
    font-family:'Noto Serif JP',serif;font-size:1.3rem;line-height:2;
    color:var(--ink);margin-bottom:12px;
  }
  .vocab-card-word{
    font-family:'IBM Plex Mono',monospace;font-size:2rem;font-weight:500;
    color:var(--red);margin-bottom:4px;letter-spacing:.02em;
  }
  .vocab-card-jp{
    font-family:'Noto Sans JP',sans-serif;font-size:.95rem;
    color:var(--ink-mid);margin-bottom:20px;
  }
  .vocab-card-num{
    font-family:'IBM Plex Mono',monospace;font-size:.75rem;
    color:var(--ink-light);margin-bottom:16px;
  }
  .vocab-progress{
    font-family:'IBM Plex Mono',monospace;font-size:.75rem;
    color:var(--ink-light);margin-bottom:8px;
  }
to   { opacity:0; transform:scale(1.03); }
  }
}
}
  /* ══ TOP SCREEN ══ */
  #top-screen {
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    width:100%;
    height:100vh;
    background:#faf8f4;
    padding:24px;
    box-sizing:border-box;
    overflow:hidden;
  }
  #app-screen { display:none; }

  .ts-eyebrow {
    font-family:'IBM Plex Mono',monospace;
    font-size:10px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--red); margin-bottom:20px; opacity:1;
  }
  .ts-h1 {
    font-family:'Noto Serif JP',serif;
    font-size:clamp(2rem,7vw,3rem);
    font-weight:700; line-height:1.3;
    color:#1c1a18;
    margin-bottom:16px;
  }
  .ts-copy {
    font-family:'Noto Sans JP',sans-serif;
    font-size:.78rem; line-height:1.8;
    color:#b8381a;
    margin-bottom:40px;
    letter-spacing:.04em;
  }
  .ts-btn {
    display:inline-flex; align-items:center; gap:12px;
    background:var(--red); color:#fff;
    border:none; border-radius:3px;
    font-family:'Noto Sans JP',sans-serif;
    font-size:.95rem; font-weight:500;
    padding:15px 36px; cursor:pointer;
    transition:opacity .15s, transform .15s;
  }
  .ts-btn:hover { opacity:.88; transform:translateY(-1px); }
  .ts-btn-arr { font-family:'IBM Plex Mono',monospace; transition:transform .15s; }
  .ts-btn:hover .ts-btn-arr { transform:translateX(3px); }

</style>
</head>
<body>
<div id="top-screen">
  <div style="width:100%;max-width:440px;margin:0 auto;text-align:center;padding:110px 16px 0;">
    <div class="ts-eyebrow">英検準1級</div>
    <h1 class="ts-h1">単語記憶、定着。</h1>
    <p class="ts-copy">単語の記憶は、遭遇するほど深く刻まれる。</p>
    <ul style="
      list-style:none;
      text-align:left;
      margin:0 auto 36px;
      max-width:320px;
      display:flex;
      flex-direction:column;
      gap:10px;
    ">
      <li style="font-family:'Noto Sans JP',sans-serif;font-size:.82rem;color:#5a5650;display:flex;gap:10px;align-items:flex-start;">
        <span style="color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:.75rem;flex-shrink:0;margin-top:2px;">01</span>
        <span>過去3年分の本番問題から、試験に出る単語を実際の文脈で体験する</span>
      </li>
      <li style="font-family:'Noto Sans JP',sans-serif;font-size:.82rem;color:#5a5650;display:flex;gap:10px;align-items:flex-start;">
        <span style="color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:.75rem;flex-shrink:0;margin-top:2px;">02</span>
        <span>でる度A全500語＋でる度B/C 29語を例文とともに収録。ターゲット語はハイライト表示</span>
      </li>
      <li style="font-family:'Noto Sans JP',sans-serif;font-size:.82rem;color:#5a5650;display:flex;gap:10px;align-items:flex-start;">
        <span style="color:var(--red);font-family:'IBM Plex Mono',monospace;font-size:.75rem;flex-shrink:0;margin-top:2px;">03</span>
        <span>英文 → 和訳の2ステップ。シャッフルで毎回新鮮な出会いを繰り返す</span>
      </li>
    </ul>
    <button class="ts-btn" onclick="startApp()">
      学習をはじめる <span class="ts-btn-arr">→</span>
    </button>
  </div>
</div>
<div id="app-screen">
<header>
  <div class="logo">英検準1級 <em>//</em> 単語遭遇カード</div>
  <div class="header-right">
    <span class="legend-txt">でる度A:</span>
    <span class="legend-s">word</span>
    <span class="legend-m">word</span>
    <span class="legend-txt" style="margin-left:4px;">= 複数回出現</span>
    <button class="shuffle-btn" onclick="doShuffle()">↺ シャッフル</button>
  </div>
</header>

<div class="shell">

  <div class="card-area" id="card-wrap">
    <div class="card" id="card">
      <!-- 英文面 -->
      <div class="card-en" id="card-en">
        <div class="card-source" id="card-source-en"></div>
        <div class="card-body" id="card-body-en"></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <!-- 和訳面 -->
      <div class="card-ja" id="card-ja">
        <div class="card-source" id="card-source-ja">和訳</div>
        <div class="card-body" id="card-body-ja"></div>
        <div class="card-ja-note" id="card-ja-note"></div>
      </div>
    </div>

    <div class="card-nav">
      <button class="nav-btn" id="btn-prev" onclick="cardNav(-1)">← 前へ</button>
      <div style="flex:1;text-align:center;">
        <div class="card-progress" id="card-progress"></div>
        <div class="card-state" id="card-state"></div>
      </div>
      <button class="nav-btn" id="btn-next" onclick="cardNext()">次へ →</button>
    </div>
  </div>
</div>

<div class="popup" id="popup">
  <div class="pp-word" id="pp-word"></div>
  <div class="pp-num" id="pp-num"></div>
  <div class="pp-jp" id="pp-jp"></div>
  <div class="pp-enc" id="pp-enc"></div>
</div>

  {label:"2025-1 大問1",

  {label:"2025-1 長文①",
   en:"In 1911, a group of schoolchildren in Wales walked out of their school in protest. They then proceeded to march through the streets of their town, encouraging students from other schools to join them along the way. The strike ended peacefully on the same day, but news of the incident spread to other towns and cities across the country. As a result, a series of school strikes occurred across the United Kingdom. In the end, schoolchildren from around sixty schools are thought to have participated in similar protests.",
   ja:"1911年、ウェールズの小学生たちが抗議のために学校を退場した。彼らはその後、町の通りを行進し、沿道の他の学校の生徒たちにも合流するよう呼びかけた。ストライキはその日のうちに平和的に終結したが、この出来事のニュースは国中の他の町や都市へと広まった。その結果、イギリス全土で一連の学校ストライキが起きた。最終的に、約60校の学校の子どもたちが同様の抗議行動に参加したと考えられている。"},

  {label:"2025-1 長文①",
   en:"Reports of the initial strike state that it began because of the unfair punishment of a student at the school. However, some historians suggest the reason was more complex. The strike followed many months of public unrest in the United Kingdom, during which workers called for improved labor conditions and many industrial strikes occurred. The schoolchildren would have seen members of their families participate in these protests, which historians believe inspired them to stand up for their own rights as well.",
   ja:"最初のストライキに関する報告によれば、それはある生徒への不当な罰に端を発したとされている。しかし、一部の歴史家はその理由はより複雑だと指摘する。このストライキは、労働者たちが労働条件の改善を求めて声を上げ、多くの産業ストライキが起きたイギリスの長期にわたる社会不安の後に起きたのだ。子どもたちは家族がこうした抗議活動に参加するのを目の当たりにしており、それが彼ら自身も自分たちの権利のために立ち上がる動機になったと歴史家たちは考えている。"},

  {label:"2025-1 長文①",
   en:"School authorities attempted to play down the importance of the school strikes by pointing out that only a small percentage of the national school population participated. While this was true, it did not lessen the significance of the protests. The strikes also provided the stimulus for societal reforms that would end up improving child welfare in the United Kingdom.",
   ja:"学校当局は、全国の学校の生徒のほんのわずかしか参加していないと指摘することで、学校ストライキの重要性を矮小化しようとした。それは事実であったが、それでも抗議活動の意義は少しも損なわれなかった。またこのストライキは、最終的にイギリスにおける児童福祉の向上につながる社会改革を促す契機にもなった。"},

  {label:"2025-1 長文②",
   en:"When researcher Justin Berg looked into which bands were able to avoid becoming one-hit wonders, he discovered two key factors. The first was novelty, or how different songs are from other current music. The second key factor for career longevity was diversity, or the degree of variety among an artist's own songs. Berg found that artists whose songs had both these qualities early in their careers were far less likely to be one-hit wonders.",
   ja:"研究者のジャスティン・バーグが、どのバンドがいわゆる「一発屋」になることを回避できたかを調べたところ、2つの重要な要因を発見した。1つ目は「新規性」、つまり楽曲が他の現在の音楽とどれだけ異なるかという点だ。キャリアの長続きに関わる2つ目の重要な要因は「多様性」、すなわちアーティスト自身の楽曲がどれだけ多彩かという点だった。バーグは、キャリアの早い段階でこの2つの特性を持つ楽曲を出したアーティストは、一発屋になる可能性がはるかに低いと突き止めた。"},

  {label:"2025-1 長文②",
   en:"According to Berg, songs that are too different from what is currently fashionable have a lower probability of climbing the music rankings in the first place. Artists who desire multiple hits benefit from producing work that is similar to their first success, with only small changes to adapt to new trends. Berg believes that the balance between reminding listeners of the artist's initial hits while still sounding up-to-date is the true recipe for continued success.",
   ja:"バーグによれば、現在流行しているものとあまりにもかけ離れた楽曲は、そもそも音楽チャートを上昇できる可能性が低いという。複数のヒットを望むアーティストは、新しいトレンドに適応するための小さな変化を加えながらも、最初の成功作に似た作品を生み出すことが有益だ。バーグは、聴衆にアーティストの初期のヒット曲を想起させながら、なおかつ現代的に聞こえるバランスこそが、継続的な成功の真の秘訣だと考えている。"},

  {label:"2025-2 大問1",
   en:"The doctor told Emma she was suffering from fatigue due to overwork. He said that with a break and plenty of rest, she would recover quickly.",

  {label:"2025-2 大問1",
   en:"The documentary on the war was so powerful that it evoked strong feelings of sadness and anger in the viewers. It featured many key figures from that era.",
   ja:"その戦争のドキュメンタリーは非常に強烈で、視聴者に深い悲しみと怒りの感情を呼び起こした。その時代の多くの重要な人物が登場した。"},

  {label:"2025-2 長文①",
   en:"Some US astronauts became household names in the 1950s and '60s, partly due to the media coverage of their achievements. Behind the scenes, however, others played a crucial role in making US space missions successful. These women, who came to be called human computers, conducted complex calculations in areas such as spacecraft navigation, rocket aerodynamics, and orbital physics. Without them, it would have been impossible to launch spacecraft, and any inaccuracies could have had life-threatening consequences for the astronauts.",
   ja:"1950〜60年代、一部のアメリカの宇宙飛行士たちは、その業績に関するメディア報道もあって広く知られる存在となった。しかし舞台裏では、アメリカの宇宙ミッションを成功させるために欠かせない役割を担った人々がいた。「ヒューマン・コンピューター」と呼ばれるようになった女性たちで、宇宙船の航法、ロケットの空気力学、軌道物理学などの分野で複雑な計算を行った。彼女たちなしには宇宙船の打ち上げは不可能であり、計算の誤りは宇宙飛行士たちの命に関わる結果を招きかねなかった。"},

  {label:"2025-2 長文①",
   en:"Partly due to the discriminatory nature of contemporary societal norms, employing women meant that salaries and therefore overall costs could be dramatically reduced. Although human-computer work was sometimes repetitive, it often required advanced math skills.",
   ja:"当時の社会規範が持つ差別的な性質もあって、女性を雇用することは給与、ひいては全体的なコストを大幅に削減できることを意味した。ヒューマン・コンピューターの仕事は単調な作業を含むこともあったが、高度な数学的スキルを必要とすることも多かった。"},

  {label:"2025-2 長文①",
   en:"African American women faced an additional layer of discrimination as they were forced to conduct much of their work in segregated facilities. As electronic computers became more advanced in the 1960s, the role of human computers eventually declined. However, their contribution was significant. When John Glenn became the first American to orbit Earth in 1962, he insisted that Katherine Johnson personally verify the electronic computer's calculations before he would proceed with the mission.",
   ja:"アフリカ系アメリカ人女性たちはさらなる差別の重圧にさらされ、隔離された施設での業務を余儀なくされた。1960年代に電子コンピューターが高度化するにつれ、ヒューマン・コンピューターの役割はやがて縮小していった。しかし、彼女たちの貢献は計り知れない。1962年にジョン・グレンがアメリカ人初の地球周回飛行を行った際、彼はキャサリン・ジョンソンが電子コンピューターの計算を直接確認するまでミッションを続行しないと主張した。"},

  {label:"2025-2 長文②",
   en:"Plants produce many chemical substances to protect themselves against disease, and some of these chemicals have medicinal properties. A growing body of research shows that animals have learned to recognize and consume these substances to treat and prevent illnesses.",
   ja:"植物は病気から身を守るために多くの化学物質を生成しており、そのいくつかには薬効がある。蓄積されつつある研究成果によると、動物たちはこれらの物質を認識し、病気の治療や予防のために摂取することを学んでいるという。"},

  {label:"2025-2 長文②",
   en:"Self-medication by animals was first recorded in the 1970s by researchers studying a group of chimpanzees in Tanzania. They observed some chimpanzees swallowing the leaves of plants whole without chewing them. Further observations revealed that the behavior occurred more frequently when stomach parasites were common among the group. The researchers used the term \"zoopharmacognosy\" to refer to this self-medicating behavior.",
   ja:"動物の自己投薬が初めて記録されたのは1970年代のことで、タンザニアのチンパンジーの群れを研究していた研究者たちによるものだった。彼らは一部のチンパンジーが植物の葉を噛まずにそのまま丸飲みするのを観察した。さらなる観察により、群れの中で胃の寄生虫が蔓延しているときにこの行動がより頻繁に見られることが明らかになった。研究者たちはこの自己投薬行動を「動物薬理学（ズーファーマコグノシー）」と呼んだ。"},

  {label:"2025-2 長文②",
   en:"For many years, it was believed that this behavior was limited to animals with advanced intellectual ability. However, a recent review of research has shown that self-medication is much more common than was previously thought and is even demonstrated by some insects. Researchers also believe that studying zoopharmacognosy may be useful for identifying plant-based medication that could benefit humans.",
   ja:"長年にわたり、この行動は高度な知的能力を持つ動物に限られると考えられていた。しかし最近の研究レビューにより、自己投薬は以前考えられていたよりはるかに広く見られることが示され、一部の昆虫においても確認されている。また研究者たちは、動物薬理学を研究することが、人間に有益な植物由来の薬を特定する上で役立つ可能性があると考えている。"},

  {label:"2025-3 大問1",
   en:"The novel was fascinating because it told the same story from several different perspectives. Each character saw the events in a very different way.",
   ja:"その小説はいくつかの異なる視点から同じ物語を語っていたため、非常に魅力的だった。それぞれの登場人物は出来事をまったく異なる見方でとらえていた。"},

  {label:"2025-3 大問1",
   en:"The company gave its salespeople autonomy over their daily work. They are now free to make their own decisions — the last say on each option belongs to them.",
   ja:"その会社は営業担当者に日々の業務における自律性を与えた。彼らは今や自分で判断を下すことができ、各選択肢についての最終決定権は彼ら自身にある。"},

  {label:"2025-3 大問1",
   en:"The children were hungry, so the couple decided to make for the nearest town to find a restaurant and get a fresh supply of snacks.",
   ja:"子どもたちがお腹を空かせていたので、夫婦はレストランを見つけて軽食を新たに調達しようと、最寄りの町へ向かうことにした。"},

  {label:"2025-3 大問1",
   en:"The company wants to try all other options first, but it cannot rule out reducing its staff if its poor sales continue.",
   ja:"その会社はまず他のすべての選択肢を試みたいと考えているが、売上不振が続くならば人員削減を排除することはできない。"},

  {label:"2025-3 大問1",
   en:"The two fighter jets were flying so close to one another that the pilot of one of them was afraid they would collide.",
   ja:"2機の戦闘機はあまりにも近接して飛行していたため、一方のパイロットは衝突するのではないかと恐れた。"},

  {label:"2025-3 大問1",
   en:"Medical students spend a lot of time studying human anatomy. They must memorize the terms for even the smallest parts of the body.",
   ja:"医学生たちは人体解剖学の勉強に多くの時間を費やす。最も小さな体の部位に至るまで、その用語を暗記しなければならない。"},

  {label:"2025-3 長文①",
   en:"This level of production has only been achieved through modern agriculture's increasing reliance on chemical pesticides to protect crops from insects that feed on plants and microbial pathogens such as bacteria and fungi. These pests can impair plant growth and lead to significantly reduced crop yields. Pests also develop resistance to pesticides, so researchers are constantly looking for alternative crop-protection methods.",
   ja:"これほどの生産水準は、植物を食い荒らす害虫や細菌・菌類などの微生物病原体から作物を守るための化学農薬への依存を高めることで現代農業が達成してきたものだ。これらの害虫は植物の生育を妨げ、収穫量を大幅に低下させることがある。また害虫は農薬への耐性をつけるため、研究者たちは常に代替的な作物保護の方法を模索している。"},

  {label:"2025-3 長文①",
   en:"A promising new approach to crop protection is the concept of induced resistance. This works by activating plants' natural defenses, which range from destroying pathogen-infected cells to releasing toxins to kill insects. Defense priming involves applying stress to plants to stimulate a weak defense response, preparing them to react strongly to threats in the future. Researchers have found that the protection can even be carried into the next generation, although the genetic mechanism by which this occurs has yet to be determined.",
   ja:"作物保護における有望な新しいアプローチが「誘導抵抗性」という概念だ。これは植物が本来持つ防御機構を活性化させることで機能し、その防御は病原菌に感染した細胞の破壊から害虫を殺す毒素の放出まで多岐にわたる。「ディフェンス・プライミング」は植物にストレスを与えて弱い防御反応を引き起こし、将来の脅威に対して強く反応できるよう準備させるプロセスだ。研究者たちは、この保護効果が次世代にまで引き継がれることも発見しているが、そのメカニズムを担う遺伝的な仕組みはまだ解明されていない。"},

  {label:"2025-3 長文①",
   en:"Induced resistance is the result of a complex network of developmental and environmental pathways in the plant. Using it effectively is not as simple as introducing a gene for a specific characteristic. Many aspects need to be just right, including the growing conditions and agricultural methods used. However, when combined with other forms of natural crop protection, induced resistance can help minimize the need for pesticides and make agriculture more sustainable. One limitation is that diverting plants' resources toward defense can lead to reduced growth, which affects crop yields and scale.",
   ja:"誘導抵抗性は、植物における発達経路と環境経路が複雑に絡み合ったネットワークの産物だ。それを効果的に活用することは、特定の特性を持つ遺伝子を導入するほど単純ではない。栽培条件や農業手法など、多くの要素が適切でなければならない。しかし他の自然な作物保護手段と組み合わせることで、誘導抵抗性は農薬の必要性を最小限に抑え、農業をより持続可能なものにする助けになりうる。一つの制約は、植物の資源を防御に振り向けることで生育が抑制され、収穫量や生産規模に影響が出る可能性があることだ。"},

  {label:"2025-3 大問3",
   en:"On May 3, 1886, at least two striking workers were killed by the police at a demonstration in Chicago. Angered by the deaths, labor rights activists organized a gathering for the next day at Haymarket Square. Many thousands of flyers were distributed — printed not only in English but also in German for German-speaking immigrant workers. One of the attendees was the Chicago mayor, there to ensure the protest passed peacefully.",
   ja:"1886年5月3日、シカゴのデモでストライキ中の労働者が少なくとも2名、警察によって殺害された。その死に憤慨した労働権運動家たちは、翌日ヘイマーケット広場での集会を組織した。英語だけでなく、ドイツ語を話す移民労働者のためにドイツ語でも印刷されたビラが何千枚も配られた。参加者の一人にはシカゴ市長もおり、抗議活動が平和的に終わるよう確認するためにその場に来ていた。"},

  {label:"2025-3 大問3",
   en:"Chicago became a center for activists concerned about workers' rights in factories, shipyards, and mills. Some pro-worker groups were radical, some were socialist, while others were less politically oriented. The movement's main rallying cry was a demand to limit working hours to eight a day. According to Professor Adelman, one obstacle to its success was a lack of strict enforcement. This gave employers room to force employees — often poor immigrants — to sign contracts agreeing to longer working days, accepting low wages.",
   ja:"シカゴは、工場・造船所・製粉所における労働者の権利を訴える活動家たちの中心地となっていた。労働者支持派のグループの中には急進的なもの、社会主義的なもの、政治色の薄いものなどがあった。運動の最大の訴えは、1日の労働時間を8時間に制限するよう求めるものだった。アデルマン教授によると、その実現を阻んだ障害の一つは、法律の厳格な執行が欠如していたことだった。これにより雇用者は、しばしば貧しい移民である従業員に、より長い労働日と低賃金を認める契約に署名させる余地を持った。"},

  {label:"2025-3 大問3",
   en:"The May 4 incident provoked a strong response from some newspapers. Eight men were charged in connection with the bombing. Even though there were concerns about jury bias and a lack of evidence, most of the men were given the death penalty. According to Adelman, the trial ranked as one of the most notorious in American history.",
   ja:"5月4日の事件は一部の新聞による強烈な反応を引き起こした。8人の男性が爆弾事件への関与で起訴された。陪審の偏向や証拠不足への懸念があったにもかかわらず、ほとんどの被告に死刑が宣告された。アデルマンによれば、この裁判はアメリカ史上最も悪名高いものの一つとして位置づけられている。"},

  {label:"2025-3 大問3",
   en:"In the early 1890s, the governor of Illinois concluded that the trial had been unfair. The surviving men were pardoned and released from prison — a decision condemned by some industrialists and sections of the media. The Haymarket Affair exposed the social and economic division that were commonplace at the time. The incident contributed to important labor reforms and greater recognition of workers' rights.",
   ja:"1890年代初頭、イリノイ州知事は裁判が不公正であったと結論づけた。生き残った被告たちは恩赦を受けて釈放されたが、その決定は一部の実業家やメディアから批判を受けた。ヘイマーケット事件は、当時広く存在した社会的・経済的な分断を露わにした。この出来事は重要な労働改革と労働者の権利のより広い認知に貢献した。"},
  {label:"でる度A #1",target:"last",jp:"続く",
   en:"Do you think that true motivation can last even when results are slow to appear?",
   ja:"本当のモチベーションは、結果がなかなか出ないときでも続くと思いますか？"},
  {label:"でる度A #2",target:"affect",jp:"影響を与える",
   en:"I honestly think that the people around you deeply affect the kind of person you become.",
   ja:"周囲の人々があなたがどんな人間になるかに深く影響を与えると、私は正直思います。"},
  {label:"でる度A #3",target:"claim",jp:"主張する",
   en:"Do you think she has the right to claim that her approach is the only correct one?",
   ja:"彼女のアプローチだけが正しいと主張する権利が彼女にあると思いますか？"},
  {label:"でる度A #4",target:"ship",jp:"出荷する",
   en:"Do you think she realizes how much effort it takes to ship products safely across the world?",
   ja:"世界中に製品を安全に出荷するためにどれほどの努力が必要か、彼女は気づいていると思いますか？"},
  {label:"でる度A #5",target:"issue",jp:"声明を出す",
   en:"Do you think the government should issue a clearer statement about its environmental policy?",
   ja:"政府は環境政策についてより明確な声明を出すべきだと思いますか？"},
  {label:"でる度A #6",target:"purchase",jp:"購入する",
   en:"I honestly feel that every purchase we make is a small vote for the kind of world we want to live in.",
   ja:"私たちが行うすべての購入は、自分が生きたい世界への小さな投票だと正直感じています。"},
  {label:"でる度A #7",target:"occur",jp:"起きる",
   en:"Do you think it is possible to prevent serious accidents from occurring in the workplace?",
   ja:"職場での重大な事故が起きるのを防ぐことは可能だと思いますか？"},
  {label:"でる度A #8",target:"deal",jp:"対処する",
   en:"Have you ever had to deal with a situation where everyone around you was wrong but you were afraid to speak up?",
   ja:"周りの全員が間違っているのに、声を上げるのが怖かった状況に対処しなければならなかったことはありますか？"},
  {label:"でる度A #9",target:"consume",jp:"消費する",
   en:"Have you ever stopped to think about how much energy you consume in a single day?",
   ja:"一日にどれだけのエネルギーを消費しているか、立ち止まって考えたことはありますか？"},
  {label:"でる度A #10",target:"present",jp:"提示する",
   en:"I really believe that the way you present your ideas matters just as much as the ideas themselves.",
   ja:"アイデアを提示する方法は、アイデアそのものと同じくらい重要だと強く思います。"},
  {label:"でる度A #11",target:"fire",jp:"解雇する",
   en:"Do you think a company has the right to fire an employee without giving any clear reason?",
   ja:"明確な理由を示さずに従業員を解雇する権利が会社にあると思いますか？"},
  {label:"でる度A #12",target:"regard",jp:"みなす",
   en:"Do you think she regards her own failures as valuable lessons rather than reasons to give up?",
   ja:"彼女は自分の失敗を諦める理由ではなく、貴重な教訓としてみなしていると思いますか？"},
  {label:"でる度A #13",target:"fine",jp:"罰金を科す",
   en:"I honestly think it is fair to fine companies heavily when they knowingly damage the natural environment.",
   ja:"企業が故意に自然環境を破壊した場合、重い罰金を科すことは公正だと正直思います。"},
  {label:"でる度A #14",target:"transfer",jp:"移す",
   en:"Have you ever had to transfer to a completely new school or workplace and felt utterly lost at first?",
   ja:"全く新しい学校や職場に転校・転勤し、最初は完全に途方に暮れたことはありますか？"},
  {label:"でる度A #15",target:"decline",jp:"減少する",
   en:"Have you noticed that the number of independent bookstores has continued to decline in recent years?",
   ja:"近年、独立系書店の数が減少し続けているのに気づいていますか？"},
  {label:"でる度A #16",target:"eliminate",jp:"取り除く",
   en:"I really wish we could eliminate the kind of systemic bias that holds talented people back from reaching their potential.",
   ja:"才能ある人々が可能性を発揮するのを妨げる組織的な偏見を取り除くことができればと強く思います。"},
  {label:"でる度A #17",target:"indicate",jp:"示す",
   en:"Do you think the choices she makes in her daily life indicate what she truly values most deeply?",
   ja:"彼女が日常生活で行う選択は、彼女が最も深く大切にしているものを示していると思いますか？"},
  {label:"でる度A #18",target:"ensure",jp:"確実にする",
   en:"I really think it is our responsibility to ensure that future generations inherit a healthy planet.",
   ja:"将来の世代が健全な地球を受け継げるよう確実にするのが私たちの責任だと、強く思います。"},
  {label:"でる度A #19",target:"expand",jp:"広げる",
   en:"I honestly believe that travel has the power to expand your sense of what is possible in your own life.",
   ja:"旅行は自分の人生で何が可能かという感覚を広げる力を持っていると正直信じています。"},
  {label:"でる度A #20",target:"address",jp:"取り組む",
   en:"Have you ever felt frustrated that leaders refuse to address the real causes of a problem and only treat the symptoms?",
   ja:"リーダーたちが問題の真の原因に取り組もうとせず、症状だけを治療することに苛立ちを感じたことはありますか？"},
  {label:"でる度A #21",target:"identify",jp:"特定する",
   en:"Do you think you could identify the exact moment when you first became truly passionate about something?",
   ja:"何かに初めて本当に情熱を持った瞬間を正確に特定できると思いますか？"},
  {label:"でる度A #22",target:"construct",jp:"建設する",
   en:"I really think that the stories we tell ourselves are the walls and windows that construct the reality we live in.",
   ja:"私たちが自分に語る物語は、私たちが生きる現実を建設する壁と窓だと強く思います。"},
  {label:"でる度A #23",target:"invest",jp:"投資する",
   en:"Do you think she is willing to invest enough time and emotional energy into building truly meaningful relationships?",
   ja:"彼女は本当に意味のある人間関係を築くために、十分な時間と感情的エネルギーを投資する意欲があると思いますか？"},
  {label:"でる度A #24",target:"obtain",jp:"取得する",
   en:"I honestly feel that the hardest things to obtain in life are not money or status but genuine peace of mind.",
   ja:"人生で取得するのが最も難しいものは、お金や地位ではなく本物の心の平和だと正直感じています。"},
  {label:"でる度A #25",target:"struggle",jp:"奮闘する",
   en:"Have you ever watched someone you love struggle silently for years before finally asking for the help they needed?",
   ja:"愛する人が何年も声を上げずに奮闘してから、ようやく必要な助けを求めるのを見たことはありますか？"},
  {label:"でる度A #26",target:"counter",jp:"反論する",
   en:"I really admire people who have the courage to counter popular opinion when they genuinely believe it is wrong.",
   ja:"本当に間違っていると信じるとき、大衆の意見に反論する勇気を持つ人を心から尊敬します。"},
  {label:"でる度A #27",target:"associate",jp:"連想する",
   en:"Do you think she will always associate the smell of rain with a particular memory from her childhood?",
   ja:"彼女は雨の匂いを、幼少期のある特定の記憶と常に連想するでしょうか？"},
  {label:"でる度A #28",target:"register",jp:"登録する",
   en:"I honestly think more young people would register to vote if they truly believed their voice could change things.",
   ja:"自分の声が物事を変えられると本当に信じるなら、もっと多くの若者が選挙人登録をすると正直思います。"},
  {label:"でる度A #29",target:"reveal",jp:"明らかにする",
   en:"Do you think social media platforms should be required to reveal how their algorithms influence what we see?",
   ja:"SNSプラットフォームはアルゴリズムが私たちの見るものにどう影響するかを明らかにすることを義務付けられるべきだと思いますか？"},
  {label:"でる度A #30",target:"species",jp:"種",
   en:"Have you ever felt a profound sadness knowing that an entire species has disappeared from the earth forever?",
   ja:"ある種が地球から永遠に消えたと知ったとき、深い悲しみを感じたことはありますか？"},
  {label:"でる度A #31",target:"diet",jp:"食事",
   en:"I really believe that a balanced diet is not just about physical health but also about how clearly you think and feel.",
   ja:"バランスの取れた食事は身体的な健康だけでなく、思考と感情の明晰さにも関わると強く信じています。"},
  {label:"でる度A #32",target:"site",jp:"場所",
   en:"Do you think she ever visits the site where something important happened in her life just to feel connected to it again?",
   ja:"彼女は人生で重要な出来事が起きた場所を、再びつながりを感じるために訪れることがあると思いますか？"},
  {label:"でる度A #33",target:"cell",jp:"細胞",
   en:"Do you think that understanding how a single cell functions could revolutionize the way we treat disease?",
   ja:"単一の細胞がどのように機能するかを理解することが、病気の治療方法に革命をもたらすと思いますか？"},
  {label:"でる度A #34",target:"facility",jp:"施設",
   en:"I honestly think that every community deserves access to a safe, well-maintained facility where people can gather and support each other.",
   ja:"すべての地域社会には、人々が集まり支え合える安全で手入れの行き届いた施設へのアクセスが必要だと正直思います。"},
  {label:"でる度A #35",target:"practice",jp:"慣習",
   en:"Have you ever questioned a long-standing practice in your family or culture and wondered whether it still makes sense today?",
   ja:"家族や文化における長年の慣習に疑問を持ち、今日でもまだ意味があるかと考えたことはありますか？"},
  {label:"でる度A #36",target:"resident",jp:"居住者",
   en:"I really feel that every resident of a city deserves to have a say in the decisions that shape their daily environment.",
   ja:"都市のすべての居住者は、日常環境を形作る決定に発言権を持つべきだと強く感じています。"},
  {label:"でる度A #37",target:"option",jp:"選択肢",
   en:"Do you think young people today have more or fewer meaningful career options than previous generations did?",
   ja:"今日の若者は以前の世代よりも意味のある職業の選択肢が多いと思いますか、それとも少ないと思いますか？"},
  {label:"でる度A #38",target:"organ",jp:"臓器",
   en:"Do you think she has ever seriously considered registering as an organ donor and what that decision truly means?",
   ja:"彼女は臓器提供者として登録することを真剣に考え、その決断が本当に何を意味するかを考えたことがあると思いますか？"},
  {label:"でる度A #39",target:"critic",jp:"批評家",
   en:"I honestly think that being your own harshest critic can be both your greatest strength and your most exhausting weakness.",
   ja:"自分自身の最も厳しい批評家であることは、最大の強さでもあり最も疲弊させる弱さでもあると正直思います。"},
  {label:"でる度A #40",target:"region",jp:"地域",
   en:"Have you ever traveled to a region so different from your own that it made you question everything you assumed was normal?",
   ja:"自分の地域とあまりにも異なる地域を旅して、当たり前だと思っていたすべてのことを疑わせられたことはありますか？"},
  {label:"でる度A #41",target:"tax",jp:"税金",
   en:"Do you think that wealthy individuals and corporations should pay significantly higher tax rates than they currently do?",
   ja:"裕福な個人と企業は現在よりも大幅に高い税金を支払うべきだと思いますか？"},
  {label:"でる度A #42",target:"access",jp:"利用の機会",
   en:"I really believe that unequal access to quality education is one of the deepest injustices in our society today.",
   ja:"質の高い教育への不平等なアクセスは、今日の社会における最も深い不正義の一つだと強く信じています。"},
  {label:"でる度A #43",target:"virus",jp:"ウイルス",
   en:"Do you think she fully understood how quickly a virus could reshape the entire way society functions until she lived through it?",
   ja:"実際に経験するまで、ウイルスが社会の機能全体をいかに速く再形成できるかを彼女は完全に理解していたと思いますか？"},
  {label:"でる度A #44",target:"bill",jp:"請求書",
   en:"I honestly feel a quiet anxiety every time a medical bill arrives that reminds me how fragile financial security truly is.",
   ja:"医療の請求書が届くたびに、経済的な安心がいかに脆いかを思い知らされる静かな不安を正直感じます。"},
  {label:"でる度A #45",target:"evidence",jp:"証拠",
   en:"Do you think there is sufficient evidence to conclude that climate change is primarily caused by human activity?",
   ja:"気候変動が主に人間の活動によって引き起こされているという結論を導くのに十分な証拠があると思いますか？"},
  {label:"でる度A #46",target:"attempt",jp:"試み",
   en:"I honestly admire anyone who makes a genuine attempt to learn a new language as an adult.",
   ja:"大人になって新しい言語を学ぼうという真剣な試みをする人を、私は正直心から尊敬します。"},
  {label:"でる度A #47",target:"account",jp:"口座",
   en:"Have you ever checked your bank account and felt that the number there said something painful about the choices you had made?",
   ja:"銀行口座を確認して、その数字が自分が行った選択について何か辛いことを語っていると感じたことはありますか？"},
  {label:"でる度A #48",target:"theory",jp:"理論",
   en:"I really think that a theory which cannot be tested against real human experience is of very limited value in the end.",
   ja:"実際の人間の経験に対して検証できない理論は、結局のところ非常に限られた価値しかないと強く思います。"},
  {label:"でる度A #49",target:"factor",jp:"要因",
   en:"Do you think that early childhood environment is the single most important factor in shaping who a person becomes?",
   ja:"幼少期の環境が、人がどんな人間になるかを形成する上で最も重要な要因だと思いますか？"},
  {label:"でる度A #50",target:"stock",jp:"在庫",
   en:"Do you think she ever worries that she is slowly running out of the emotional stock she needs to keep giving to others?",
   ja:"他者に与え続けるために必要な感情的な在庫が徐々に尽きていくことを、彼女は心配することがあると思いますか？"},
  {label:"でる度A #51",target:"chemical",jp:"化学的な",
   en:"Do you think that chemical additives in processed foods pose a genuine long-term health risk to consumers?",
   ja:"加工食品の化学的な添加物は消費者に長期的な健康リスクをもたらすと思いますか？"},
  {label:"でる度A #52",target:"media",jp:"メディア",
   en:"I honestly feel that the media has a responsibility to present the truth even when it is uncomfortable.",
   ja:"不快であっても真実を伝えるのはメディアの責任だと、正直思います。"},
  {label:"でる度A #53",target:"income",jp:"所得",
   en:"I honestly believe that a person's income should never determine the quality of healthcare or education they receive.",
   ja:"人の所得が受ける医療や教育の質を決して決定すべきではないと正直信じています。"},
  {label:"でる度A #54",target:"supply",jp:"供給",
   en:"I really think that ensuring a stable supply of clean water should be a top priority for every government.",
   ja:"清潔な水の安定した供給を確保することはすべての政府の最優先事項であるべきだと、強く思います。"},
  {label:"でる度A #55",target:"shortage",jp:"不足",
   en:"Have you ever lived through a shortage of something you always took for granted and felt genuine gratitude afterward?",
   ja:"当たり前だと思っていたものの不足を経験し、その後本物の感謝の気持ちを感じたことはありますか？"},
  {label:"でる度A #56",target:"poverty",jp:"貧困",
   en:"I really think that no child should be born into poverty in a world that produces more than enough for everyone.",
   ja:"全員に十分以上のものを生産する世界で、貧困の中に生まれる子供がいるべきではないと強く思います。"},
  {label:"でる度A #57",target:"criminal",jp:"犯人",
   en:"Do you think she believes that a criminal can genuinely change and deserve a second chance to live a meaningful life?",
   ja:"犯人は本当に変わることができ、意味のある人生を生きる第二のチャンスに値すると彼女は信じていると思いますか？"},
  {label:"でる度A #58",target:"budget",jp:"予算",
   en:"I honestly feel that the way a government chooses to spend its budget reveals more about its true values than any speech ever could.",
   ja:"政府が予算をどのように使うかは、いかなるスピーチよりも政府の真の価値観をより多く明らかにすると正直感じています。"},
  {label:"でる度A #59",target:"authority",jp:"当局",
   en:"Have you ever felt torn between trusting the authority of experts and following your own deeply held instincts?",
   ja:"専門家の当局を信頼することと、自分の深く持つ本能に従うことの間で引き裂かれたことはありますか？"},
  {label:"でる度A #60",target:"genome",jp:"ゲノム",
   en:"I really think that understanding the human genome is one of the most profound scientific achievements of our generation.",
   ja:"人間のゲノムを理解することは、私たちの世代の最も深遠な科学的成果の一つだと強く思います。"},
  {label:"でる度A #61",target:"atmosphere",jp:"雰囲気",
   en:"Do you think she can sense the atmosphere in a room the moment she walks in and adjust herself accordingly?",
   ja:"彼女は部屋に入った瞬間にその雰囲気を感じ取り、それに合わせて自分を調整できると思いますか？"},
  {label:"でる度A #62",target:"aid",jp:"援助",
   en:"I honestly believe that genuine aid should empower people to build their own futures rather than create dependence.",
   ja:"本物の援助は依存を生み出すのではなく、人々が自分自身の未来を築く力を与えるべきだと正直信じています。"},
  {label:"でる度A #63",target:"measure",jp:"措置",
   en:"Have you ever wished that those in power would take stronger measures to protect the people who are most vulnerable in society?",
   ja:"権力を持つ人々が社会で最も脆弱な人々を守るためにより強力な措置を取ってほしいと思ったことはありますか？"},
  {label:"でる度A #64",target:"subject",jp:"被験者",
   en:"I really feel uncomfortable with the idea of using human beings as subjects in experiments without their fully informed consent.",
   ja:"完全な情報に基づく同意なしに人間を実験の被験者として使うという考えに、強く不快感を覚えます。"},
  {label:"でる度A #65",target:"decade",jp:"10年間",
   en:"Do you think she realizes how much she has changed over the past decade and whether she is proud of who she has become?",
   ja:"彼女は過去10年間でどれほど変わったか、そして自分がなった人物を誇りに思うかどうかを理解していると思いますか？"},
  {label:"でる度A #66",target:"weapon",jp:"兵器",
   en:"I honestly think that kindness used with wisdom and courage can be the most powerful weapon against hatred and division.",
   ja:"知恵と勇気を持って使われる優しさは、憎しみと分断に対する最も強力な兵器になり得ると正直思います。"},
  {label:"でる度A #67",target:"nutrient",jp:"栄養分",
   en:"Have you ever paid close attention to the nutrient content of your food and been surprised by how little value some meals have?",
   ja:"食品の栄養分の内容に注意を払って、一部の食事が実際にはいかに栄養価が低いかに驚いたことはありますか？"},
  {label:"でる度A #68",target:"expense",jp:"出費",
   en:"I really believe that the greatest expense in life is not money but the time and energy we spend on things that do not matter.",
   ja:"人生における最大の出費はお金ではなく、重要でないことに費やす時間とエネルギーだと強く信じています。"},
  {label:"でる度A #69",target:"structure",jp:"建造物",
   en:"Do you think she finds meaning in visiting ancient structures that connect her to people who lived thousands of years before her?",
   ja:"何千年も前に生きた人々とつながる古代の建造物を訪れることに、彼女は意味を見出すと思いますか？"},
  {label:"でる度A #70",target:"adolescent",jp:"青年",
   en:"I honestly think that the pain an adolescent feels is often dismissed too quickly by adults who have forgotten how intense it was.",
   ja:"青年が感じる痛みは、それがいかに強烈だったかを忘れた大人によってあまりにも早く退けられることが多いと正直思います。"},
  {label:"でる度A #71",target:"procedure",jp:"手順",
   en:"Have you ever followed every procedure perfectly and still felt that something essential was missing from the outcome?",
   ja:"すべての手順を完璧に踏んでも、結果に何か本質的なものが欠けていると感じたことはありますか？"},
  {label:"でる度A #72",target:"minimum",jp:"最低限",
   en:"I honestly think that meeting only the minimum requirement in life is a quiet way of telling yourself you are not worth more.",
   ja:"人生で最低限の要件だけを満たすことは、自分にはそれ以上の価値がないと静かに自分に言い聞かせる方法だと正直思います。"},
  {label:"でる度A #73",target:"fuel",jp:"燃料",
   en:"Do you think she understands that resentment, left unaddressed, can fuel a kind of slow destruction from within?",
   ja:"対処されないままの恨みは、内側からゆっくりとした破壊の燃料になり得ることを彼女は理解していると思いますか？"},
  {label:"でる度A #74",target:"resource",jp:"資源",
   en:"I really believe that time is the one resource that, once spent, can never be recovered no matter how much wealth you accumulate.",
   ja:"時間はどれほど富を蓄積しても、一度使ったら決して取り戻せない唯一の資源だと強く信じています。"},
  {label:"でる度A #75",target:"regulation",jp:"規制",
   en:"Have you ever felt that a regulation designed to protect people ended up making their lives more complicated and difficult instead?",
   ja:"人々を守るために作られた規制が、かえって彼らの生活をより複雑で困難にしていると感じたことはありますか？"},
  {label:"でる度A #76",target:"contract",jp:"契約書",
   en:"I honestly feel that no contract can truly capture the depth of trust that makes a real partnership work over time.",
   ja:"どんな契約書も、本物のパートナーシップを長期にわたって機能させる信頼の深さを真に捉えることはできないと正直感じています。"},
  {label:"でる度A #77",target:"insurance",jp:"保険",
   en:"Do you think she ever resents paying for insurance she never uses while knowing others desperately need it and cannot afford it?",
   ja:"彼女は決して使わない保険料を払いながら、他の人が切実に必要としているのに払えないことを知って憤りを感じることがあると思いますか？"},
  {label:"でる度A #78",target:"employment",jp:"雇用",
   en:"I really think that meaningful employment gives people far more than just income — it gives them a sense of dignity and purpose.",
   ja:"意味のある雇用は収入だけでなく、尊厳と目的意識を人々に与えると強く思います。"},
  {label:"でる度A #79",target:"ban",jp:"禁止",
   en:"Have you ever felt conflicted about a ban on something you personally enjoy because you understand why it protects others?",
   ja:"他の人を守る理由は理解しながらも、自分が楽しんでいるものの禁止について複雑な気持ちになったことはありますか？"},
  {label:"でる度A #80",target:"vehicle",jp:"車",
   en:"I honestly believe that the vehicle you drive says something about how you balance personal desire with responsibility to the planet.",
   ja:"あなたが運転する車は、個人的な欲求と地球への責任のバランスをどのように取るかについて何かを語っていると正直信じています。"},
  {label:"でる度A #81",target:"soil",jp:"土",
   en:"Do you think she feels a deep connection to the soil of the place where she grew up even after living far away for years?",
   ja:"何年も遠くに住んでいても、彼女は育った場所の土に深いつながりを感じると思いますか？"},
  {label:"でる度A #82",target:"cargo",jp:"貨物",
   en:"I really think that every ship carrying cargo across the ocean is also quietly carrying the hopes of people on both ends of the journey.",
   ja:"海を渡る貨物を積んだすべての船は、旅の両端にいる人々の希望も静かに運んでいると強く思います。"},
  {label:"でる度A #83",target:"aircraft",jp:"航空機",
   en:"Have you ever sat alone on an aircraft high above the clouds and felt strangely free from every problem waiting for you on the ground?",
   ja:"雲の上高くで航空機に一人で座り、地上で待つすべての問題から不思議と解放された気分になったことはありますか？"},
  {label:"でる度A #84",target:"current",jp:"現在の",
   en:"I honestly think that your current circumstances do not define your future unless you allow them to become your only story.",
   ja:"現在の状況は、それを唯一の物語にしてしまわない限り、あなたの未来を定義しないと正直思います。"},
  {label:"でる度A #85",target:"political",jp:"政治の",
   en:"Do you think she finds it exhausting to navigate the political tension that surfaces even in ordinary conversations among friends?",
   ja:"友人同士の普通の会話にも表れる政治的な緊張を乗り越えることに、彼女は疲れを感じると思いますか？"},
  {label:"でる度A #86",target:"significant",jp:"重要な",
   en:"I really believe that the most significant changes in a person's life often begin with a single quiet decision made alone.",
   ja:"人の人生における最も重要な変化は、一人で行われた一つの静かな決断から始まることが多いと強く信じています。"},
  {label:"でる度A #87",target:"effective",jp:"効果的な",
   en:"Have you ever discovered that the most effective approach to a problem was the simplest one you had been overlooking all along?",
   ja:"問題への最も効果的なアプローチが、ずっと見落としていた最もシンプルなものだったと気づいたことはありますか？"},
  {label:"でる度A #88",target:"military",jp:"軍隊の",
   en:"I honestly think that those who have never experienced military service often misunderstand both its costs and its profound bonds.",
   ja:"軍隊の経験をしたことがない人は、その代償と深い絆の両方をしばしば誤解していると正直思います。"},
  {label:"でる度A #89",target:"due",jp:"支払期日",
   en:"Do you think she feels the weight of everything due in her life — deadlines, obligations, expectations — and wonders when it ends?",
   ja:"締め切り、義務、期待など、人生で支払期日が来るすべての重みを感じ、それがいつ終わるかと思うことがあると思いますか？"},
  {label:"でる度A #90",target:"essential",jp:"不可欠な",
   en:"I really think that silence is essential for anyone who wants to hear the quiet voice of their own deepest intuition.",
   ja:"自分の最も深い直感の静かな声を聞きたい人にとって、沈黙は不可欠だと強く思います。"},
  {label:"でる度A #91",target:"illegal",jp:"違法の",
   en:"Have you ever wondered whether something being illegal automatically makes it wrong, or whether law and ethics are truly the same thing?",
   ja:"違法であることが自動的に間違いを意味するのか、それとも法律と倫理は本当に同じものなのかと疑問に思ったことはありますか？"},
  {label:"でる度A #92",target:"immune",jp:"免疫を持つ",
   en:"I honestly believe that no one is truly immune to loneliness, not even those who always appear to be surrounded by people.",
   ja:"常に人に囲まれているように見える人でさえ、誰も孤独に真に免疫を持っているわけではないと正直信じています。"},
  {label:"でる度A #93",target:"numerous",jp:"非常に数の多い",
   en:"Do you think she is aware of the numerous small kindnesses others have shown her that she may have forgotten over time?",
   ja:"彼女は、時間とともに忘れてしまったかもしれない他者からの非常に数の多い小さな親切に気づいていると思いますか？"},
  {label:"でる度A #94",target:"extreme",jp:"極端な",
   en:"I really think that people who hold extreme views are often expressing a deep fear that more moderate voices have failed to address.",
   ja:"極端な見解を持つ人は、穏健な声が対処できなかった深い恐怖を表現していることが多いと強く思います。"},
  {label:"でる度A #95",target:"general",jp:"一般的な",
   en:"Have you ever noticed that general advice often sounds wise until you actually try to apply it to your specific complicated situation?",
   ja:"一般的なアドバイスは、自分の具体的な複雑な状況に実際に適用しようとするまでは賢明に聞こえることに気づいたことはありますか？"},
  {label:"でる度A #96",target:"agricultural",jp:"農業の",
   en:"I honestly believe that agricultural communities hold a kind of wisdom about patience and cycles that urban life tends to erase.",
   ja:"農業の地域社会は、都市生活が消し去りがちな忍耐とサイクルについての一種の知恵を持っていると正直信じています。"},
  {label:"でる度A #97",target:"overall",jp:"全体的な",
   en:"Do you think she ever steps back to assess the overall direction of her life and honestly asks whether she is heading somewhere meaningful?",
   ja:"彼女は自分の人生の全体的な方向性を評価するために一歩引き、意味のある場所に向かっているかどうかを正直に自問することがあると思いますか？"},
  {label:"でる度A #98",target:"additional",jp:"追加の",
   en:"I really feel that asking for additional support when you are struggling is a sign of wisdom, not weakness.",
   ja:"苦しんでいるときに追加の支援を求めることは、弱さではなく知恵の証だと強く感じています。"},
  {label:"でる度A #99",target:"entire",jp:"全体の",
   en:"Have you ever given your entire self to a relationship or a dream and then had to figure out who you were without it?",
   ja:"関係や夢に自分の全体を捧げてから、それなしで自分が誰なのかを考えなければならなかったことはありますか？"},
  {label:"でる度A #100",target:"severe",jp:"ひどい",
   en:"I honestly think that severe criticism delivered without compassion rarely changes behavior and instead just hardens resistance.",
   ja:"思いやりなく与えられるひどい批判は、行動をほとんど変えず、代わりに抵抗を強化するだけだと正直思います。"},
  {label:"でる度A #101",target:"alter",jp:"変える",
   en:"Do you think she realizes that every experience she has, however small, will alter who she is in ways she cannot fully predict?",
   ja:"どんなに小さな経験でも、彼女は完全には予測できない形で自分を変えることに彼女は気づいていると思いますか？"},
  {label:"でる度A #102",target:"adopt",jp:"採用する",
   en:"I really believe that the courage to adopt a completely new perspective is one of the greatest gifts you can give yourself.",
   ja:"全く新しい視点を採用する勇気は、自分自身に与えられる最大の贈り物の一つだと強く信じています。"},
  {label:"でる度A #103",target:"vote",jp:"投票する",
   en:"Have you ever stood in a voting booth and felt the strange weight of choosing between imperfect options that all matter deeply?",
   ja:"投票所に立って、すべてが深く重要な不完全な選択肢の中から選ぶ奇妙な重みを感じたことはありますか？"},
  {label:"でる度A #104",target:"determine",jp:"決定する",
   en:"I honestly think that the questions we choose to ask determine the quality of the answers and the life we end up living.",
   ja:"私たちが選ぶ質問が、答えの質と最終的に生きる人生の質を決定すると正直思います。"},
  {label:"でる度A #105",target:"enable",jp:"できるようにする",
   en:"Do you think she believes that financial independence will enable her to finally make choices based purely on meaning rather than necessity?",
   ja:"経済的な独立が、必要性ではなく純粋に意味に基づいた選択をついにできるようにすると彼女は信じていると思いますか？"},
  {label:"でる度A #106",target:"conduct",jp:"実施する",
   en:"I really feel that the way we conduct ourselves in small, unobserved moments reveals our true character more than any public act.",
   ja:"人目のない小さな瞬間に自分をどのように振る舞うかは、どんな公の行為よりも真の人格を明らかにすると強く感じています。"},
  {label:"でる度A #107",target:"direct",jp:"案内する",
   en:"Have you ever had a mentor who could direct you toward your own strengths in ways you had never seen them yourself?",
   ja:"自分自身では気づかなかった形で、あなたを自分の強みへと案内してくれたメンターがいたことはありますか？"},
  {label:"でる度A #108",target:"absorb",jp:"吸収する",
   en:"I honestly think that children absorb not just the words their parents say but the emotions those words are wrapped in.",
   ja:"子供は親が言う言葉だけでなく、その言葉が包まれた感情も吸収すると正直思います。"},
  {label:"でる度A #109",target:"imply",jp:"ほのめかす",
   en:"Do you think she understands that what people do not say can sometimes imply far more than anything they choose to express openly?",
   ja:"人が言わないことは、公に表現することよりもはるかに多くをほのめかすことがあると彼女は理解していると思いますか？"},
  {label:"でる度A #110",target:"operate",jp:"操作する",
   en:"I really think society needs more transparency about how algorithms operate and influence our daily choices.",
   ja:"アルゴリズムがどのように操作され私たちの日常的な選択に影響を与えるかについて、社会にはより多くの透明性が必要だと強く思います。"},
  {label:"でる度A #111",target:"demonstrate",jp:"実演する",
   en:"I really believe the most powerful way to demonstrate your values is not through words but through the choices you make daily.",
   ja:"自分の価値観を実演する最も強力な方法は言葉ではなく、日々の選択だと強く信じています。"},
  {label:"でる度A #112",target:"boost",jp:"増加させる",
   en:"Have you ever found that a single encouraging word from the right person at the right moment could boost your confidence entirely?",
   ja:"適切な瞬間に適切な人からの一言の励ましが、自信を完全に増加させることがあると気づいたことはありますか？"},
  {label:"でる度A #113",target:"prove",jp:"判明する",
   en:"I honestly think that the moments when you feel most alone can prove to be the ones that shape you most profoundly.",
   ja:"最も孤独に感じる瞬間が、あなたを最も深く形作る瞬間であると判明することがあると正直思います。"},
  {label:"でる度A #114",target:"monitor",jp:"監視する",
   en:"Do you think she ever feels uneasy knowing that so many aspects of her digital life are being monitored without her full awareness?",
   ja:"デジタルライフの多くの側面が十分な認識なしに監視されていることを知って、彼女は不安を感じることがあると思いますか？"},
  {label:"でる度A #115",target:"defeat",jp:"打ち破る",
   en:"I really believe that the only way to truly defeat fear is to walk directly toward it rather than waiting for it to disappear.",
   ja:"恐怖を真に打ち破る唯一の方法は、それが消えるのを待つのではなく、直接それに向かって歩くことだと強く信じています。"},
  {label:"でる度A #116",target:"protest",jp:"抗議する",
   en:"Have you ever felt the urge to protest against something you knew was wrong but stayed silent out of fear of the consequences?",
   ja:"間違っていると知りながら、結果を恐れて沈黙したまま何かに抗議したい衝動を感じたことはありますか？"},
  {label:"でる度A #117",target:"target",jp:"対象にする",
   en:"I honestly think it is deeply unfair when vulnerable communities are consistently targeted by policies designed to benefit those already powerful.",
   ja:"すでに力のある人々を利益にする政策によって、脆弱なコミュニティが一貫して対象にされることは非常に不公平だと正直思います。"},
  {label:"でる度A #118",target:"preserve",jp:"保護する",
   en:"Do you think she feels a personal responsibility to preserve the stories and memories of older generations before they are lost forever?",
   ja:"彼女は、永遠に失われる前に古い世代の物語と記憶を保護する個人的な責任を感じていると思いますか？"},
  {label:"でる度A #119",target:"oppose",jp:"反対する",
   en:"I really think that learning to oppose ideas firmly while still respecting the person who holds them is one of the hardest social skills.",
   ja:"アイデアをしっかりと反対しながらも、それを持つ人を尊重することを学ぶのは最も難しい社会的スキルの一つだと強く思います。"},
  {label:"でる度A #120",target:"migrate",jp:"移住する",
   en:"Have you ever imagined what it would feel like to migrate to a country where no one knows your name or your story?",
   ja:"誰もあなたの名前や物語を知らない国に移住するとどんな感じかを想像したことはありますか？"},
  {label:"でる度A #121",target:"analyze",jp:"分析する",
   en:"I honestly think there is a danger in trying to analyze every emotion too carefully, because some feelings are meant to simply be felt.",
   ja:"すべての感情を慎重に分析しようとすることには危険があります。なぜなら、ただ感じるだけでよい感情もあるからだと正直思います。"},
  {label:"でる度A #122",target:"discourage",jp:"思いとどまらせる",
   en:"Have you ever had someone you trusted try to discourage you from a dream that you knew deep down was right for you?",
   ja:"深いところで自分に合っていると知っていた夢から、信頼していた人が思いとどまらせようとしたことはありますか？"},
  {label:"でる度A #123",target:"confirm",jp:"確認する",
   en:"I honestly think we often seek reassurance from others not to confirm facts but to quiet our own inner doubts.",
   ja:"私たちがよく他者に安心を求めるのは、事実を確認するためではなく、内なる疑いを静めるためだと正直思います。"},
  {label:"でる度A #124",target:"intend",jp:"意図する",
   en:"Do you think she fully understands the gap between what she intends to do and what she actually ends up doing each day?",
   ja:"彼女は毎日、意図することと実際に行うことの間のギャップを十分に理解していると思いますか？"},
  {label:"でる度A #125",target:"predict",jp:"予測する",
   en:"I really think that the hardest part of making any major decision is that no one can truly predict how their future self will feel.",
   ja:"大きな決断を下す最も難しい部分は、未来の自分がどう感じるかを誰も真に予測できないことだと強く思います。"},
  {label:"でる度A #126",target:"extend",jp:"延長する",
   en:"Have you ever wished you could extend a moment of pure happiness just a little longer before life moved on?",
   ja:"人生が続く前に、純粋な幸福の瞬間をもう少しだけ延長できればと思ったことはありますか？"},
  {label:"でる度A #127",target:"figure",jp:"人物",
   en:"I honestly believe that every era produces a defining figure whose courage or vision reshapes what people believe is possible.",
   ja:"どの時代にも、その勇気やビジョンで人々が可能だと信じることを再形成する決定的な人物が現れると正直信じています。"},
  {label:"でる度A #128",target:"transportation",jp:"交通機関",
   en:"Do you think she ever uses long transportation journeys as a chance to simply think without distraction or obligation?",
   ja:"彼女は長い交通機関での移動を、気晴らしや義務なしにただ考える機会として使うことがあると思いますか？"},
  {label:"でる度A #129",target:"institution",jp:"機関",
   en:"I really think that any institution which stops questioning itself eventually becomes the very obstacle it was created to overcome.",
   ja:"自問することをやめたあらゆる機関は、最終的には克服するために作られた障害そのものになると強く思います。"},
  {label:"でる度A #130",target:"theft",jp:"盗み",
   en:"Have you ever felt that the theft of someone's time or dignity can be just as damaging as the theft of their possessions?",
   ja:"誰かの時間や尊厳の盗みは、所有物の盗みと同じくらい傷つくことがあると感じたことはありますか？"},
  {label:"でる度A #131",target:"candidate",jp:"候補者",
   en:"I honestly think that the best candidate for any role is rarely the one who is most confident but rather the one who is most prepared.",
   ja:"どんな役割においても最良の候補者は、最も自信がある人ではなく最も準備ができている人だと正直思います。"},
  {label:"でる度A #132",target:"mammal",jp:"哺乳類",
   en:"Do you think she ever feels a sense of kinship with other mammals and wonders what they experience in their inner lives?",
   ja:"彼女は他の哺乳類に親近感を覚え、彼らが内面でどんな経験をしているかと思うことがあると思いますか？"},
  {label:"でる度A #133",target:"economist",jp:"経済学者",
   en:"I really think that even the most brilliant economist cannot fully account for the role of human emotion in financial decisions.",
   ja:"最も優れた経済学者でさえ、金融的な決断における人間の感情の役割を完全に説明することはできないと強く思います。"},
  {label:"でる度A #134",target:"protein",jp:"タンパク質",
   en:"Have you ever become so focused on getting enough protein and nutrients that you forgot to simply enjoy the pleasure of eating?",
   ja:"十分なタンパク質と栄養素を摂ることに集中しすぎて、食べることの喜びをただ楽しむことを忘れたことはありますか？"},
  {label:"でる度A #135",target:"immigrant",jp:"移民",
   en:"I honestly believe that every immigrant carries within them a kind of courage that those who have never left home rarely have to find.",
   ja:"すべての移民は、故郷を離れたことのない人がほとんど見つける必要のない種類の勇気を内に持っていると正直信じています。"},
  {label:"でる度A #136",target:"property",jp:"不動産",
   en:"Do you think she sometimes questions whether owning property gives people a sense of belonging or just a heavier burden to carry?",
   ja:"不動産を所有することが帰属感を与えるのか、それとも単により重い荷物を与えるだけなのかと彼女は時々疑問に思うと思いますか？"},
  {label:"でる度A #137",target:"fund",jp:"資金",
   en:"I really think that how we choose to fund education and healthcare says everything about what kind of society we actually want to be.",
   ja:"教育と医療への資金調達の方法は、私たちが実際になりたい社会の種類についてすべてを語っていると強く思います。"},
  {label:"でる度A #138",target:"habitat",jp:"生息場所",
   en:"Have you ever visited a natural habitat so untouched and beautiful that you felt humanity had no right to disturb it?",
   ja:"人類が乱す権利がないと感じるほど、手つかずで美しい自然の生息場所を訪れたことはありますか？"},
  {label:"でる度A #139",target:"symptom",jp:"症状",
   en:"I honestly believe that loneliness is often a symptom of a deeper disconnection from one's own sense of meaning and purpose.",
   ja:"孤独はしばしば、自分自身の意味と目的意識からの深い断絶の症状だと正直信じています。"},
  {label:"でる度A #140",target:"eruption",jp:"発生",
   en:"Do you think she sees the eruption of anger in others as something to fear or as a signal that something important needs to be heard?",
   ja:"他者における怒りの発生を、恐れるべきものとして見るのか、それとも重要なことが聞かれる必要があるというシグナルとして見るのかと彼女は思いますか？"},
  {label:"でる度A #141",target:"quantity",jp:"量",
   en:"I really think that in relationships, the quantity of time spent together matters far less than the quality of attention given.",
   ja:"人間関係において、一緒に過ごす時間の量は与えられる注意の質よりはるかに重要ではないと強く思います。"},
  {label:"でる度A #142",target:"ad",jp:"広告",
   en:"Have you ever noticed how a well-crafted ad can make you feel inadequate about a life that was perfectly fine moments before?",
   ja:"巧みに作られた広告が、直前まで十分に良かった人生について不十分に感じさせることに気づいたことはありますか？"},
  {label:"でる度A #143",target:"saving",jp:"節約",
   en:"I honestly feel that the real value of saving money is not the security it provides but the freedom it quietly makes possible.",
   ja:"お金の節約の本当の価値は、それが提供する安心感ではなく、それが静かに可能にする自由だと正直感じています。"},
  {label:"でる度A #144",target:"territory",jp:"領土",
   en:"Do you think she ever feels that her personal boundaries are a kind of emotional territory worth protecting from those who do not respect them?",
   ja:"彼女は自分の個人的な境界を、尊重しない人から守る価値のある感情的な領土のように感じることがあると思いますか？"},
  {label:"でる度A #145",target:"threat",jp:"脅威",
   en:"I really believe that the greatest threat to our freedom is not outside force but the gradual acceptance of our own diminishment.",
   ja:"自由への最大の脅威は外からの力ではなく、自分自身が小さくなることを徐々に受け入れることだと強く信じています。"},
  {label:"でる度A #146",target:"sufferer",jp:"苦しむ人",
   en:"Have you ever wished you could do more to ease the pain of a sufferer you love but felt helpless in the face of their struggle?",
   ja:"愛する苦しむ人の痛みを和らげたいと思いながらも、彼らの苦しみの前で無力に感じたことはありますか？"},
  {label:"でる度A #147",target:"emission",jp:"排出",
   en:"I honestly think that reducing carbon emission is not just an environmental issue but a profound moral obligation to future generations.",
   ja:"二酸化炭素の排出を削減することは、環境問題だけでなく将来の世代への深い道徳的義務だと正直思います。"},
  {label:"でる度A #148",target:"executive",jp:"幹部",
   en:"Do you think she ever wonders whether the executive who made a decision that hurt thousands of people truly understood the human cost?",
   ja:"何千人もの人々を傷つけた決断を下した幹部が、その人的コストを本当に理解していたかどうかと彼女は思うことがあると思いますか？"},
  {label:"でる度A #149",target:"strategy",jp:"戦略",
   en:"I really think the most important strategy in life is knowing when to persist and when to change direction completely.",
   ja:"人生における最も重要な戦略は、いつ粘り続け、いつ完全に方向を変えるかを知ることだと強く思います。"},
  {label:"でる度A #150",target:"riot",jp:"暴動",
   en:"Have you ever tried to understand what drives people to riot and found that desperation and unheard voices are almost always at the root?",
   ja:"人々を暴動に駆り立てるものを理解しようとして、絶望と聞かれない声がほぼ常に根底にあると気づいたことはありますか？"},
  {label:"でる度A #151",target:"district",jp:"地域",
   en:"I honestly feel that growing up in a disadvantaged district should never determine the ceiling of what a child can dream or achieve.",
   ja:"恵まれない地域で育つことが、子供が夢見たり達成したりできることの上限を決して決定すべきではないと正直感じています。"},
  {label:"でる度A #152",target:"election",jp:"選挙",
   en:"Do you think she truly believes that one election can change the direction of a nation, or does she feel the system runs deeper than that?",
   ja:"一度の選挙が国の方向を変えられると彼女は本当に信じているのか、それともシステムはそれよりも深いところで動いていると感じているのかと思いますか？"},
  {label:"でる度A #153",target:"medication",jp:"薬",
   en:"I really think that finding the right medication for mental health is an act of courage, not a sign of giving up on yourself.",
   ja:"精神的健康のための適切な薬を見つけることは、自分を諦めるサインではなく、勇気ある行為だと強く思います。"},
  {label:"でる度A #154",target:"breed",jp:"品種",
   en:"Have you ever wondered what it means that humans have shaped entire breed of animals to suit our needs over thousands of years?",
   ja:"何千年もかけて、私たちのニーズに合わせて動物の品種全体を人間が形作ってきたことが何を意味するかと思ったことはありますか？"},
  {label:"でる度A #155",target:"conflict",jp:"衝突",
   en:"I honestly believe that every unresolved conflict we carry inside us eventually finds a way to surface in our closest relationships.",
   ja:"内に抱えたすべての未解決の衝突は、最終的に最も親密な関係の中に浮かび上がる方法を見つけると正直信じています。"},
  {label:"でる度A #156",target:"productivity",jp:"生産性",
   en:"Do you think she ever questions whether her obsession with productivity is helping her live fully or preventing her from simply being?",
   ja:"生産性への執着が完全に生きることを助けているのか、それともただ存在することを妨げているのかと彼女は疑問に思うことがあると思いますか？"},
  {label:"でる度A #157",target:"organism",jp:"有機体",
   en:"I really think that a city, like a living organism, is only as healthy as its most neglected and vulnerable parts.",
   ja:"都市は生きた有機体のように、最も放置され脆弱な部分と同じくらいしか健全ではないと強く思います。"},
  {label:"でる度A #158",target:"representative",jp:"代表者",
   en:"Have you ever felt that your elected representative had completely forgotten what it felt like to live the life of the people they serve?",
   ja:"選出された代表者が、自分が仕える人々の生活がどんな感じかを完全に忘れていると感じたことはありますか？"},
  {label:"でる度A #159",target:"warehouse",jp:"倉庫",
   en:"I honestly think that some people use busyness as a warehouse to store all the feelings they are not yet ready to face.",
   ja:"一部の人は、まだ向き合う準備ができていないすべての感情を保管する倉庫として多忙さを使っていると正直思います。"},
  {label:"でる度A #160",target:"refund",jp:"返金",
   en:"Do you think she ever wishes she could receive a refund for the years she spent trying to be someone she was never meant to be?",
   ja:"彼女はなることを意図されていなかった誰かになろうとして過ごした年月の返金を受けられればと思うことがあると思いますか？"},
  {label:"でる度A #161",target:"tuition",jp:"授業料",
   en:"I really think that the rising cost of tuition is silently closing the door of opportunity on an entire generation of talented young people.",
   ja:"授業料の上昇コストは、才能ある若者の世代全体の機会の扉を静かに閉じていると強く思います。"},
  {label:"でる度A #162",target:"range",jp:"範囲",
   en:"Have you ever been surprised by the range of emotions you could feel within a single hour — from grief to joy to numbness?",
   ja:"悲しみから喜び、そして無感覚まで、たった1時間以内に感じることができる感情の範囲に驚いたことはありますか？"},
  {label:"でる度A #163",target:"victim",jp:"被害者",
   en:"I honestly believe that refusing to see yourself as a victim, even when you have been wronged, is one of the most powerful choices you can make.",
   ja:"不当な扱いを受けていても、自分を被害者と見ることを拒否することは、あなたができる最も強力な選択の一つだと正直信じています。"},
  {label:"でる度A #164",target:"dose",jp:"服用量",
   en:"Do you think she understands that even a small dose of genuine encouragement can sometimes be enough to change the entire trajectory of a life?",
   ja:"本物の励ましのほんの少しの服用量が、時に人生の軌道全体を変えるのに十分なことがあると彼女は理解していると思いますか？"},
  {label:"でる度A #165",target:"mainland",jp:"本土",
   en:"I really think that people who grew up on islands often develop a relationship with isolation and self-reliance that mainland dwellers rarely understand.",
   ja:"島で育った人々は、本土の住人がほとんど理解しない孤立と自立との関係をしばしば育てると強く思います。"},
  {label:"でる度A #166",target:"waterfall",jp:"滝",
   en:"Have you ever stood before a powerful waterfall and felt both completely small and strangely alive at the same time?",
   ja:"強力な滝の前に立って、完全に小さくなりながらも奇妙に生きていると同時に感じたことはありますか？"},
  {label:"でる度A #167",target:"satellite",jp:"人工衛星",
   en:"I honestly find it remarkable that a satellite launched decades ago is still traveling silently through space, long after its creators have passed.",
   ja:"数十年前に打ち上げられた人工衛星が、その作り手たちが亡くなった後も、宇宙を静かに旅し続けていることは驚くべきことだと正直思います。"},
  {label:"でる度A #168",target:"evolution",jp:"進化",
   en:"Do you think she sees her own personal growth as a kind of evolution, shaped not by design but by the pressures she has survived?",
   ja:"彼女は自分の個人的な成長を、設計によってではなく乗り越えてきた圧力によって形作られた一種の進化として見ていると思いますか？"},
  {label:"でる度A #169",target:"prey",jp:"獲物",
   en:"I really think that kind and trusting people should never be made to feel like prey simply because they chose to believe in others.",
   ja:"優しく信頼する人々は、他者を信じることを選んだだけで獲物のように感じさせられるべきではないと強く思います。"},
  {label:"でる度A #170",target:"bystander",jp:"傍観者",
   en:"Have you ever been a bystander in a moment that required courage to act and wished afterward that you had found the strength to step in?",
   ja:"行動する勇気が必要な場面の傍観者になり、後から踏み出す強さを持てばよかったと思ったことはありますか？"},
  {label:"でる度A #171",target:"creature",jp:"生き物",
   en:"I honestly believe that every living creature deserves to exist without suffering imposed upon it by human indifference or cruelty.",
   ja:"すべての生き物は、人間の無関心や残酷さによって課される苦しみなしに存在する権利があると正直信じています。"},
  {label:"でる度A #172",target:"civilization",jp:"文明",
   en:"Have you ever stood among ancient ruins and felt the full weight of how fragile every civilization ultimately is?",
   ja:"古代の遺跡の中に立って、すべての文明が最終的にいかに脆いかという重みを全身で感じたことはありますか？"},
  {label:"でる度A #173",target:"tribe",jp:"部族",
   en:"I really think that every person needs a tribe — a small group of people who truly see them and refuse to let them disappear.",
   ja:"すべての人は部族が必要だと強く思います。本当に自分を見て、消えることを拒否してくれる小さなグループです。"},
  {label:"でる度A #174",target:"permission",jp:"許可",
   en:"Do you think she is still waiting for permission from others to pursue the life she has always known she deserved?",
   ja:"彼女はまだ、自分が常にふさわしいと知っていた人生を追求するための他者からの許可を待っていると思いますか？"},
  {label:"でる度A #175",target:"barrier",jp:"障壁",
   en:"I honestly believe that the most stubborn barrier between people is not language or distance but the unwillingness to truly listen.",
   ja:"人々の間で最も頑固な障壁は、言語や距離ではなく、真に聞こうとしない意志の欠如だと正直信じています。"},
  {label:"でる度A #176",target:"wage",jp:"賃金",
   en:"Have you ever felt the quiet indignity of working full days and still earning a wage too low to live on with any real dignity?",
   ja:"丸一日働いても、本当の尊厳を持って生きるには低すぎる賃金しか稼げないという静かな屈辱を感じたことはありますか？"},
  {label:"でる度A #177",target:"drone",jp:"ドローン",
   en:"I really think that the rise of the drone in modern life raises profound questions about privacy, surveillance, and what it means to be observed.",
   ja:"現代生活におけるドローンの台頭は、プライバシー、監視、そして観察されることの意味について深刻な疑問を提起すると強く思います。"},
  {label:"でる度A #178",target:"appearance",jp:"外見",
   en:"Do you think she has ever struggled to reconcile the appearance she shows the world with the person she truly feels she is inside?",
   ja:"彼女は世界に見せる外見と、内側で本当に感じている自分を一致させることに苦しんだことがあると思いますか？"},
  {label:"でる度A #179",target:"embassy",jp:"大使館",
   en:"I honestly find it fascinating that an embassy represents a small piece of one country existing quietly inside another.",
   ja:"大使館があるの国の小さな一部が別の国の中に静かに存在することを表しているということが、興味深いと正直思います。"},
  {label:"でる度A #180",target:"skeleton",jp:"骨格",
   en:"Have you ever thought about how the skeleton of your beliefs was formed in childhood and how hard it is to reshape even one bone?",
   ja:"信念の骨格が幼少期に形成され、たった一本の骨を作り直すことさえいかに難しいかを考えたことはありますか？"},
  {label:"でる度A #181",target:"wildlife",jp:"野生生物",
   en:"I really believe that our willingness to protect wildlife is one of the truest measures of our capacity for compassion beyond ourselves.",
   ja:"野生生物を守る意志は、自分を超えた思いやりの能力の最も真の尺度の一つだと強く信じています。"},
  {label:"でる度A #182",target:"potential",jp:"潜在的な",
   en:"Do you think she sometimes grieves the potential she feels she has not yet fully lived up to, and wonders if it is too late?",
   ja:"彼女はまだ十分に発揮していないと感じる潜在能力を時々悼み、手遅れかどうかと思うことがあると思いますか？"},
  {label:"でる度A #183",target:"limited",jp:"限られた",
   en:"I honestly think that having limited time and resources forces a clarity of purpose that abundance rarely teaches.",
   ja:"限られた時間と資源を持つことは、豊かさがほとんど教えてくれない目的の明確さを強いると正直思います。"},
  {label:"でる度A #184",target:"rural",jp:"田舎の",
   en:"Have you ever spent time in a rural community and felt a slower, quieter rhythm of life that made you question your usual pace?",
   ja:"田舎のコミュニティで時間を過ごし、普段のペースを疑わせる、よりゆっくりと静かな生活のリズムを感じたことはありますか？"},
  {label:"でる度A #185",target:"advanced",jp:"進歩した",
   en:"I really think that the most advanced societies are not those with the best technology but those that treat their most vulnerable members with the most care.",
   ja:"最も進歩した社会は、最高の技術を持つ社会ではなく、最も脆弱なメンバーを最も丁重に扱う社会だと強く思います。"},
  {label:"でる度A #186",target:"beneficial",jp:"有益な",
   en:"Do you think she finds solitude genuinely beneficial, or does she secretly fear what she might discover about herself in the silence?",
   ja:"彼女は孤独を本当に有益だと感じているのか、それとも沈黙の中で自分について発見するかもしれないことを密かに恐れているのかと思いますか？"},
  {label:"でる度A #187",target:"genetic",jp:"遺伝子の",
   en:"I honestly wonder whether understanding our genetic predispositions frees us from them or simply gives us more to worry about.",
   ja:"遺伝子の傾向を理解することが、それらから解放してくれるのか、それとも単に心配することを増やすだけなのかと正直疑問に思います。"},
  {label:"でる度A #188",target:"radical",jp:"根本的な",
   en:"Have you ever realized that what feels like a radical idea today is often simply the common sense of tomorrow?",
   ja:"今日は根本的なアイデアに感じることが、しばしば明日の常識に過ぎないことに気づいたことはありますか？"},
  {label:"でる度A #189",target:"hostile",jp:"敵意のある",
   en:"I really think that when someone becomes hostile, they are often expressing a pain so deep they have forgotten how else to speak.",
   ja:"誰かが敵意のある態度を取るとき、彼らはしばしば他にどう話せばいいか忘れてしまうほど深い痛みを表現していると強く思います。"},
  {label:"でる度A #190",target:"fit",jp:"健康な",
   en:"Do you think she truly believes that staying fit is about loving her body, or does she secretly still use exercise to punish herself?",
   ja:"健康でいることは体を愛することだと彼女は本当に信じているのか、それとも密かにまだ運動を自分を罰するために使っているのかと思いますか？"},
  {label:"でる度A #191",target:"long-term",jp:"長期にわたる",
   en:"I honestly think that most of our regrets come from choosing short-term comfort over long-term meaning.",
   ja:"ほとんどの後悔は、長期にわたる意味よりも短期的な快楽を選ぶことから来ると正直思います。"},
  {label:"でる度A #192",target:"Arctic",jp:"北極の",
   en:"Have you ever read about the Arctic and felt both awe at its beauty and grief at how rapidly we are allowing it to disappear?",
   ja:"北極について読んで、その美しさへの畏敬と、いかに急速にそれを消失させているかへの悲しみを同時に感じたことはありますか？"},
  {label:"でる度A #193",target:"minor",jp:"軽い",
   en:"I really believe that what seems like a minor act of kindness to the giver can feel enormous and life-changing to the one who receives it.",
   ja:"与える側には軽い親切に見えることが、受け取る側には巨大で人生を変えるものに感じられることがあると強く信じています。"},
  {label:"でる度A #194",target:"risky",jp:"危険な",
   en:"Do you think she understands that playing it safe can sometimes be the most risky choice of all, because it forecloses so many possibilities?",
   ja:"安全策を取ることは、非常に多くの可能性を閉ざすため、時に最も危険な選択になり得ることを彼女は理解していると思いますか？"},
  {label:"でる度A #195",target:"complex",jp:"複雑な",
   en:"I honestly feel that our hunger for simple answers is what makes us most vulnerable in a genuinely complex world.",
   ja:"単純な答えへの欲求が、本当に複雑な世界で私たちを最も脆弱にするものだと正直感じています。"},
  {label:"でる度A #196",target:"competitive",jp:"競争力のある",
   en:"Have you ever worked in an environment so competitive that it slowly eroded your ability to celebrate someone else's success?",
   ja:"あまりにも競争力のある環境で働いて、他者の成功を喜ぶ能力がゆっくりと失われていったことはありますか？"},
  {label:"でる度A #197",target:"immediate",jp:"即座の",
   en:"I really think the pressure for immediate results prevents us from investing in the slow, deep work that actually transforms things.",
   ja:"即座の結果への圧力が、実際に物事を変革する遅くて深い仕事への投資を妨げると強く思います。"},
  {label:"でる度A #198",target:"religious",jp:"宗教上の",
   en:"Do you think she respects religious traditions that are very different from her own upbringing, or does she quietly struggle with their meaning?",
   ja:"彼女は自分の育ちとは非常に異なる宗教上の伝統を尊重しているのか、それともその意味に静かに苦しんでいるのかと思いますか？"},
  {label:"でる度A #199",target:"related",jp:"関連した",
   en:"I honestly think that nearly every problem we face in society is related to some deeper failure of empathy and connection.",
   ja:"社会で直面するほぼすべての問題は、共感とつながりのより深い失敗に関連していると正直思います。"},
  {label:"でる度A #200",target:"affordable",jp:"手頃な",
   en:"Have you ever felt the quiet shame of something being unaffordable that everyone around you seemed to access without a second thought?",
   ja:"周りの誰もが何も考えずに利用しているように見えるものが手頃でないときの静かな恥を感じたことはありますか？"},
  {label:"でる度A #201",target:"donate",jp:"寄付をする",
   en:"I really believe that when we donate not from obligation but from genuine love, both the giver and receiver are transformed.",
   ja:"義務からではなく本物の愛から寄付をするとき、与える側と受け取る側の両方が変わると強く信じています。"},
  {label:"でる度A #202",target:"lessen",jp:"減らす",
   en:"Do you think she has found anything that consistently helps to lessen the anxiety she carries with her most days?",
   ja:"彼女はほとんどの日々に抱えている不安を一貫して減らすのに役立つものを見つけたと思いますか？"},
  {label:"でる度A #203",target:"manufacture",jp:"生産する",
   en:"I honestly think that our ability to manufacture convenience has quietly manufactured a generation unable to tolerate discomfort.",
   ja:"利便性を生産する私たちの能力が、不快感に耐えられない世代を静かに生産してしまったと正直思います。"},
  {label:"でる度A #204",target:"commute",jp:"通勤する",
   en:"Have you ever used your daily commute as the only quiet space you had to think, decompress, or simply be alone with yourself?",
   ja:"毎日の通勤を、考えたり、緊張をほぐしたり、ただ自分一人でいられる唯一の静かなスペースとして使ったことはありますか？"},
  {label:"でる度A #205",target:"exaggerate",jp:"誇張する",
   en:"I really think we often exaggerate our own suffering in our minds and underestimate the resources we actually have to face it.",
   ja:"私たちはしばしば心の中で自分の苦しみを誇張し、実際に向き合うための持っているリソースを過小評価すると強く思います。"},
  {label:"でる度A #206",target:"suspect",jp:"疑わしく思う",
   en:"Do you think she would suspect kindness from a stranger, or has she kept enough openness to receive it with genuine gratitude?",
   ja:"彼女は見知らぬ人からの親切を疑わしく思うのか、それとも本物の感謝を持って受け取るだけの開放性を保っているのかと思いますか？"},
  {label:"でる度A #207",target:"acquire",jp:"習得する",
   en:"I honestly believe that the skills most worth having are rarely those we acquire quickly but those we wrestle with for years.",
   ja:"持つ価値が最も高いスキルは、素早く習得するものではなく、何年もかけて取り組むものであることが多いと正直信じています。"},
  {label:"でる度A #208",target:"reintroduce",jp:"再導入する",
   en:"Have you ever thought about what it would mean to reintroduce a lost species into a landscape and give it a second chance at existence?",
   ja:"絶滅した種を景観に再導入し、存在への第二のチャンスを与えることが何を意味するかを考えたことはありますか？"},
  {label:"でる度A #209",target:"reschedule",jp:"日時の変更をする",
   en:"I really think that our habit of constantly reschedule things we find difficult reveals more about our fears than our calendars.",
   ja:"難しいと感じることを常に日時の変更をする習慣は、カレンダーよりも私たちの恐れについてより多くを明らかにすると強く思います。"},
  {label:"でる度A #210",target:"adapt",jp:"適応する",
   en:"Do you think she admires the way some people seem to adapt to almost any situation without losing their core sense of self?",
   ja:"ほとんどどんな状況にも自分の本質的な自己感覚を失わずに適応するように見える人の在り方を彼女は尊敬していると思いますか？"},
  {label:"でる度A #211",target:"generate",jp:"生み出す",
   en:"I honestly believe that genuine curiosity can generate more meaningful learning than any structured system of education ever designed.",
   ja:"本物の好奇心は、これまでに設計されたどんな構造化された教育システムよりも意味のある学習を生み出すことができると正直信じています。"},
  {label:"でる度A #212",target:"guarantee",jp:"保障する",
   en:"Have you ever wished life could guarantee that the effort you put in would always lead to the outcome you were hoping for?",
   ja:"注いだ努力が常に望む結果につながることを人生が保障してくれればと思ったことはありますか？"},
  {label:"でる度A #213",target:"dump",jp:"投棄する",
   en:"I really think it says something troubling about us that we continue to dump our problems — chemical, emotional, industrial — onto future generations.",
   ja:"化学的、感情的、工業的な問題を将来の世代に投棄し続けることは、私たち自身について不穏なことを示していると強く思います。"},
  {label:"でる度A #214",target:"update",jp:"最新のものにする",
   en:"Do you think she takes time to regularly update the beliefs she formed in her youth and examine whether they still hold up?",
   ja:"彼女は若い頃に形成した信念を定期的に最新のものにして、今でも通用するかどうかを検討する時間を取っていると思いますか？"},
  {label:"でる度A #215",target:"classify",jp:"分類する",
   en:"I honestly think our urge to classify and categorize other people often blinds us to the complexity that makes them human.",
   ja:"他者を分類し区分化しようとする衝動が、しばしば人間としての彼らの複雑さへの視野を塞ぐと正直思います。"},
  {label:"でる度A #216",target:"acknowledge",jp:"認める",
   en:"Have you ever found that simply having someone acknowledge your pain — without trying to fix it — was exactly what you needed?",
   ja:"痛みを直そうとせず、ただ誰かが認めてくれるだけで、まさに必要なものだったと気づいたことはありますか？"},
  {label:"でる度A #217",target:"enforce",jp:"遵守させる",
   en:"I really believe it is not enough to have good laws; what matters most is the will and consistency with which we enforce them.",
   ja:"良い法律を持つだけでは十分ではなく、最も重要なのはそれらを遵守させる意志と一貫性だと強く信じています。"},
  {label:"でる度A #218",target:"renew",jp:"再開する",
   en:"Do you think she feels the need to renew her sense of purpose from time to time, or does she carry a steady inner direction?",
   ja:"彼女は時々目的意識を再開する必要を感じているのか、それとも安定した内なる方向性を持っているのかと思いますか？"},
  {label:"でる度A #219",target:"overlook",jp:"見逃す",
   en:"I honestly think that we most often overlook the beauty in our lives precisely because it is constant and familiar.",
   ja:"私たちが最も頻繁に見逃すのは、まさにそれが一定で親しみ深いからこそ、人生の美しさだと正直思います。"},
  {label:"でる度A #220",target:"evaluate",jp:"評価する",
   en:"Have you ever had to evaluate your own performance honestly and felt the discomfort of seeing yourself more clearly than you expected?",
   ja:"自分のパフォーマンスを正直に評価しなければならず、期待以上に自分自身がはっきり見えることの不快感を感じたことはありますか？"},
  {label:"でる度A #221",target:"commit",jp:"を犯す",
   en:"I really believe that most people who commit harmful acts are not monsters but ordinary people who stopped questioning themselves.",
   ja:"有害な行為を犯すほとんどの人は怪物ではなく、自問することをやめてしまった普通の人々だと強く信じています。"},
  {label:"でる度A #222",target:"argument",jp:"議論",
   en:"Have you ever won an argument and felt strangely hollow afterward, as if being right had cost you something more important?",
   ja:"議論に勝ってから、正しかったことが何かより大切なものを犠牲にしたかのように、奇妙に空虚に感じたことはありますか？"},
  {label:"でる度A #223",target:"archaeologist",jp:"考古学者",
   en:"I really think that every archaeologist who uncovers a forgotten life is performing an act of profound respect for human existence.",
   ja:"忘れられた命を掘り起こすすべての考古学者は、人間の存在への深い敬意の行為をしていると強く思います。"},
  {label:"でる度A #224",target:"reputation",jp:"評判",
   en:"Do you think she worries that her reputation is being shaped by people who have never taken the time to truly understand her?",
   ja:"彼女の評判が、彼女を真に理解する時間を取ったことのない人々によって形成されていることを彼女は心配していると思いますか？"},
  {label:"でる度A #225",target:"fossil",jp:"化石",
   en:"I honestly feel a strange wonder that a fossil can survive for millions of years while the living creature it once was vanished so quickly.",
   ja:"かつてあった生き物がそれほど速く消えたのに、化石が何百万年も生き残れるという奇妙な驚きを正直感じます。"},
  {label:"でる度A #226",target:"status",jp:"地位",
