   en:"Have you ever noticed how quickly people treat you differently the moment your professional status changes, in either direction?",
   ja:"専門的な地位がどちらの方向でも変わった瞬間に、人々がいかに素早く違う扱いをするかに気づいたことはありますか？"},
  {label:"でる度A #227",target:"contrast",jp:"対比",
   en:"I really think that experiencing great sadness in contrast with great joy teaches you something about the full depth of being human.",
   ja:"大きな喜びとの対比で大きな悲しみを経験することは、人間であることの完全な深みについて何かを教えてくれると強く思います。"},
  {label:"でる度A #228",target:"workplace",jp:"職場",
   en:"Do you think she has ever felt that the culture of her workplace slowly began to reshape who she was outside of it as well?",
   ja:"職場の文化が、その外での自分自身も徐々に再形成し始めたと彼女は感じたことがあると思いますか？"},
  {label:"でる度A #229",target:"equality",jp:"平等",
   en:"I honestly believe that true equality is not about making everyone the same but about ensuring that no one is invisible or left behind.",
   ja:"真の平等は全員を同じにすることではなく、誰も見えなくならず取り残されないことを確保することだと正直信じています。"},
  {label:"でる度A #230",target:"colleague",jp:"同僚",
   en:"Have you ever had a colleague whose quiet encouragement changed the entire experience of a job you were about to give up on?",
   ja:"諦めようとしていた仕事の経験全体を変えた同僚の静かな励ましがあったことはありますか？"},
  {label:"でる度A #231",target:"assistance",jp:"手助け",
   en:"I really think that offering assistance without being asked, at exactly the right moment, is one of the highest forms of attentiveness.",
   ja:"求められることなく、まさに適切な瞬間に手助けを申し出ることは、最高の気配りの形の一つだと強く思います。"},
  {label:"でる度A #232",target:"luxury",jp:"贅沢",
   en:"Do you think she considers uninterrupted time for thought and reflection to be a genuine luxury in her current life?",
   ja:"彼女は思考と内省のための邪魔されない時間を、現在の生活における本物の贅沢とみなしていると思いますか？"},
  {label:"でる度A #233",target:"outbreak",jp:"突発",
   en:"I honestly think that every disease outbreak reveals not just a biological failure but the social inequalities that determine who is most at risk.",
   ja:"すべての病気の突発は、生物学的な失敗だけでなく、誰が最もリスクにさらされているかを決定する社会的不平等を明らかにすると正直思います。"},
  {label:"でる度A #234",target:"council",jp:"議会",
   en:"Have you ever attended a local council meeting and been struck by both how much ordinary citizens care and how powerless they often feel?",
   ja:"地元の議会の会議に出席し、一般市民がいかに気にかけているかと、いかに無力に感じることが多いかの両方に驚いたことはありますか？"},
  {label:"でる度A #235",target:"pottery",jp:"陶器",
   en:"I really think there is something deeply meditative about making pottery — the way your hands and the material negotiate a shape together.",
   ja:"陶器を作ることには深く瞑想的な何かがあります。手と素材が一緒に形を交渉する方法には、と強く思います。"},
  {label:"でる度A #236",target:"assessment",jp:"評価",
   en:"Do you think she is capable of making an honest assessment of her own weaknesses without falling into either denial or harsh self-judgment?",
   ja:"彼女は否定にも厳しい自己批判にも陥ることなく、自分の弱点を正直に評価することができると思いますか？"},
  {label:"でる度A #237",target:"particle",jp:"微粒子",
   en:"I honestly find it remarkable that the same particle of matter can exist in entirely different forms depending on how it is arranged.",
   ja:"同じ微粒子が、どのように配置されているかによって全く異なる形で存在できることが、驚くべきだと正直思います。"},
  {label:"でる度A #238",target:"radiation",jp:"放射線",
   en:"Have you ever thought about how invisibly radiation surrounds us in daily life, and how little we understand its long-term effects?",
   ja:"日常生活でいかに目に見えない形で放射線が私たちを囲んでいるか、そしてその長期的な影響をいかに少しか理解していないかを考えたことはありますか？"},
  {label:"でる度A #239",target:"priority",jp:"優先",
   en:"I really think that what we list as a priority and what we actually prioritize with our time are often two entirely different things.",
   ja:"優先として挙げることと、実際に時間を使って優先することは、しばしば全く異なることだと強く思います。"},
  {label:"でる度A #240",target:"content",jp:"内容",
   en:"Do you think she is genuinely content with her life, or does she sometimes sense a quiet restlessness she has not yet found words for?",
   ja:"彼女は本当に自分の人生に満足しているのか、それとも時々まだ言葉が見つかっていない静かな落ち着きのなさを感じているのかと思いますか？"},
  {label:"でる度A #241",target:"destination",jp:"目的地",
   en:"I honestly believe that the journey changes you far more than the destination, and the person who arrives is never quite the one who left.",
   ja:"旅は目的地よりもはるかにあなたを変え、到着した人は出発した人とは少し違うと正直信じています。"},
  {label:"でる度A #242",target:"mine",jp:"鉱山",
   en:"Have you ever read about the conditions in a mine and felt the weight of what goes into the products we casually consume every day?",
   ja:"鉱山の状況について読んで、私たちが毎日何気なく消費する製品に何が込められているかの重みを感じたことはありますか？"},
  {label:"でる度A #243",target:"injury",jp:"怪我",
   en:"I really think that some of the most significant injury we carry through life are the invisible ones inflicted in childhood.",
   ja:"人生を通じて抱える最も重要な怪我の中には、幼少期に与えられた目に見えないものがあると強く思います。"},
  {label:"でる度A #244",target:"lottery",jp:"宝くじ",
   en:"Do you think she ever reflects on how much of her life's circumstances were simply the lottery of where and to whom she was born?",
   ja:"彼女の人生の状況の多くが、単純にどこでどんな親に生まれたかという宝くじだったかを、彼女は時々振り返ることがあると思いますか？"},
  {label:"でる度A #245",target:"feature",jp:"特徴",
   en:"I honestly think the feature of a person that others often criticize is sometimes the very same quality that makes them extraordinary.",
   ja:"他者がよく批判する人の特徴は、時にその人を並外れた存在にしているまさに同じ質であることがあると正直思います。"},
  {label:"でる度A #246",target:"labor",jp:"労働",
   en:"Have you ever felt deep respect for the labor of someone whose work you had previously taken entirely for granted?",
   ja:"以前は当然のこととして受け取っていた誰かの労働に、深い敬意を感じたことはありますか？"},
  {label:"でる度A #247",target:"diabetes",jp:"糖尿病",
   en:"I really think that the global rise of diabetes tells us something important about the kind of environment and food systems we have built.",
   ja:"世界的な糖尿病の増加は、私たちが構築した環境と食料システムの種類について重要なことを教えてくれると強く思います。"},
  {label:"でる度A #248",target:"bulb",jp:"電球",
   en:"Do you think she has ever noticed how the light from a single bulb can transform the mood of a room and the way people speak to each other?",
   ja:"一つの電球からの光が、部屋の雰囲気と人々が互いに話す方法を変えることに彼女は気づいたことがあると思いますか？"},
  {label:"でる度A #249",target:"résumé",jp:"履歴書",
   en:"I honestly think that the person behind a résumé is almost always far richer and stranger and more interesting than any document can capture.",
   ja:"履歴書の背後にいる人は、どんな書類でも捉えることができるよりも、ほぼ常にはるかに豊かで奇妙で面白いと正直思います。"},
  {label:"でる度A #250",target:"mud",jp:"泥",
   en:"Have you ever been completely stuck in the mud of a situation you created yourself and had to find the patience to slowly work your way out?",
   ja:"自分で作り出した状況の泥に完全にはまり込み、ゆっくりと抜け出す忍耐を見つけなければならなかったことはありますか？"},
  {label:"でる度A #251",target:"psychology",jp:"心理学",
   en:"I really believe that a basic understanding of psychology should be taught to every young person as one of the most essential life skills.",
   ja:"心理学の基本的な理解は、最も不可欠な人生スキルの一つとして、すべての若者に教えられるべきだと強く信じています。"},
  {label:"でる度A #252",target:"corporation",jp:"大企業",
   en:"Do you think she trusts that any corporation genuinely acts in the public interest, or does she believe profit will always come first?",
   ja:"いかなる大企業も本当に公益のために行動すると彼女は信頼しているのか、それとも利益が常に最優先されると信じているのかと思いますか？"},
  {label:"でる度A #253",target:"ecosystem",jp:"生態系",
   en:"I honestly think that understanding how fragile an ecosystem truly is would change the way most people vote and consume.",
   ja:"生態系が本当にどれほど脆いかを理解すれば、ほとんどの人の投票や消費の仕方が変わるだろうと正直思います。"},
  {label:"でる度A #254",target:"promotion",jp:"昇進",
   en:"Have you ever received a promotion and felt a surprising emptiness where you expected to feel satisfaction and accomplishment?",
   ja:"昇進して、満足感と達成感を感じると思っていたところに、驚くべき虚しさを感じたことはありますか？"},
  {label:"でる度A #255",target:"administration",jp:"管理業務",
   en:"I really think that the quality of any institution depends far less on its vision and far more on the unglamorous work of daily administration.",
   ja:"いかなる機関の質も、そのビジョンよりも、日々の管理業務という地味な仕事にはるかに依存すると強く思います。"},
  {label:"でる度A #256",target:"complaint",jp:"苦情",
   en:"Do you think she is the kind of person who transforms a complaint into a concrete request, or does she sometimes just need to be heard?",
   ja:"彼女は苦情を具体的な要求に変える種類の人なのか、それとも時々ただ聞いてもらうだけが必要なのかと思いますか？"},
  {label:"でる度A #257",target:"debt",jp:"借金",
   en:"I honestly feel that emotional debt — the unexpressed gratitude and love we owe people — can weigh on us as heavily as financial debt.",
   ja:"感情的な借金、つまり人々に対する未表現の感謝と愛は、経済的な借金と同じくらい重く私たちにのしかかることがあると正直感じています。"},
  {label:"でる度A #258",target:"requirement",jp:"要件",
   en:"Have you ever felt that the requirement placed on you by others was based on who they needed you to be rather than who you actually are?",
   ja:"他者があなたに課す要件が、あなたが実際に誰であるかではなく、彼らがあなたにどうあってほしいかに基づいていると感じたことはありますか？"},
  {label:"でる度A #259",target:"workforce",jp:"労働人口",
   en:"I really think that preparing the workforce for a rapidly changing economy requires much more imagination than current education systems offer.",
   ja:"急速に変化する経済のための労働人口を準備することは、現在の教育システムが提供するよりもはるかに多くの想像力を必要とすると強く思います。"},
  {label:"でる度A #260",target:"preference",jp:"好み",
   en:"Do you think she has ever truly examined whether her preference for certain people or experiences reflects her values or just her comfort zone?",
   ja:"特定の人や経験への好みが、自分の価値観を反映しているのか、それとも単なるコンフォートゾーンなのかを、彼女は本当に検討したことがあると思いますか？"},
  {label:"でる度A #261",target:"refugee",jp:"難民",
   en:"I honestly think that if more people heard the individual stories behind the word refugee, the political conversation would be very different.",
   ja:"難民という言葉の背後にある個々の物語をより多くの人が聞けば、政治的な会話は大きく異なるものになるだろうと正直思います。"},
  {label:"でる度A #262",target:"inhabitant",jp:"住人",
   en:"Have you ever walked through an abandoned place and wondered about the lives of the inhabitant who once filled it with noise and meaning?",
   ja:"廃墟を歩いて、かつてそこに音と意味で満ちていた住人の生活を思ったことはありますか？"},
  {label:"でる度A #263",target:"subscription",jp:"予約購読",
   en:"I really think that the ease of a subscription model is designed specifically to outlast our attention and our willingness to cancel it.",
   ja:"サブスクリプションモデルの手軽さは、私たちの注意とキャンセルする意志を超えるように特別に設計されていると強く思います。"},
  {label:"でる度A #264",target:"recipient",jp:"受取人",
   en:"Do you think she ever wonders whether being the recipient of too much generosity can quietly undermine a person's own sense of agency?",
   ja:"過度な寛大さの受取人になることが、人の主体性の感覚を静かに損なうことがあるかどうかと彼女は疑問に思うことがあると思いますか？"},
  {label:"でる度A #265",target:"shift",jp:"変化",
   en:"I honestly believe that the most profound shift in a person's life rarely comes from a dramatic event but from a single quiet realization.",
   ja:"人の人生における最も深い変化は、劇的な出来事からではなく、一つの静かな気づきから来ることがほとんどだと正直信じています。"},
  {label:"でる度A #266",target:"vessel",jp:"船",
   en:"Have you ever stood at the edge of the ocean and watched a vessel disappear over the horizon and felt the pull of whatever lies beyond?",
   ja:"海の端に立って船が地平線の向こうに消えていくのを見て、その先にあるものへの引力を感じたことはありますか？"},
  {label:"でる度A #267",target:"ingredient",jp:"材料",
   en:"I really think that trust is the single most essential ingredient in any relationship, and once it is truly broken, almost nothing tastes the same.",
   ja:"信頼はいかなる関係においても最も不可欠な材料であり、一度本当に壊れると、ほとんど何も同じ味がしなくなると強く思います。"},
  {label:"でる度A #268",target:"qualified",jp:"有能な",
   en:"Do you think she ever doubts whether she is truly qualified for the role she is in, even when all the evidence says otherwise?",
   ja:"すべての証拠が逆を示している場合でも、彼女は自分が就いている役割に本当に有能かどうかを疑うことがあると思いますか？"},
  {label:"でる度A #269",target:"widespread",jp:"広範囲にわたる",
   en:"I honestly think the widespread belief that things cannot change is one of the most powerful tools that keeps things exactly as they are.",
   ja:"物事は変わらないという広範囲にわたる信念は、物事をまさにそのままに保つ最も強力なツールの一つだと正直思います。"},
  {label:"でる度A #270",target:"alternative",jp:"代替の",
   en:"Have you ever chosen an alternative path that everyone around you questioned, and found that the uncertainty itself became part of its value?",
   ja:"周りの全員が疑問視した代替の道を選び、不確実性そのものがその価値の一部になったと気づいたことはありますか？"},
  {label:"でる度A #271",target:"harsh",jp:"厳しい",
   en:"I really believe that harsh truths, delivered with genuine care and at the right time, can be one of the greatest gifts one person gives another.",
   ja:"本物の思いやりと適切なタイミングで伝えられる厳しい真実は、一人が他者に与える最大の贈り物の一つになり得ると強く信じています。"},
  {label:"でる度A #272",target:"enormous",jp:"並外れた",
   en:"Have you ever felt an enormous wave of gratitude wash over you for no particular reason, and simply let yourself feel it fully?",
   ja:"特別な理由もなく並外れた感謝の波が押し寄せ、それをただ完全に感じさせたことはありますか？"},
  {label:"でる度A #273",target:"specific",jp:"具体的な",
   en:"I really think that most promises fail not because of bad intentions but because they were never specific enough to be acted upon.",
   ja:"ほとんどの約束が失敗するのは、悪意があるからではなく、実行するのに十分なほど具体的でなかったからだと強く思います。"},
  {label:"でる度A #274",target:"artificial",jp:"人工の",
   en:"Do you think she prefers the raw unpredictability of nature to anything artificial, or does she find beauty in what humans have deliberately made?",
   ja:"彼女は自然の生の予測不可能さを何か人工のものよりも好むのか、それとも人間が意図的に作ったものの中に美を見出すのかと思いますか？"},
  {label:"でる度A #275",target:"toxic",jp:"有毒な",
   en:"I honestly think that a toxic relationship does not always announce itself loudly — sometimes it whispers you are the problem.",
   ja:"有毒な関係は常に大声で自分を知らせるわけではありません。時々、それはあなたが問題だとささやくと正直思います。"},
  {label:"でる度A #276",target:"flexible",jp:"柔軟性のある",
   en:"Have you ever admired how some people remain flexible in their thinking without ever losing the core values that make them who they are?",
   ja:"一部の人が自分自身を作る核となる価値観を失わずに思考において柔軟性のある状態を保っていることに感心したことはありますか？"},
  {label:"でる度A #277",target:"latest",jp:"最新の",
   en:"I really think that chasing the latest trend in any field can sometimes be the fastest way to lose sight of what actually matters.",
   ja:"どんな分野でも最新のトレンドを追いかけることは、時に実際に重要なものを見失う最速の方法になり得ると強く思います。"},
  {label:"でる度A #278",target:"former",jp:"以前の",
   en:"Do you think she ever looks back at her former self with compassion rather than judgment, and wonders how far she has truly come?",
   ja:"彼女は時々、以前の自分を批判ではなく思いやりを持って振り返り、どこまで本当に来たかと思うことがあると思いますか？"},
  {label:"でる度A #279",target:"capable",jp:"有能な",
   en:"I honestly believe that people are far more capable than they think, but only when they are trusted enough to discover it themselves.",
   ja:"人々は自分が思うよりもはるかに有能ですが、それは自分自身で発見するのに十分なほど信頼された場合に限ると正直信じています。"},
  {label:"でる度A #280",target:"practical",jp:"実践的な",
   en:"Have you ever found that the most practical solution to an emotional problem was simply giving yourself permission to feel it fully?",
   ja:"感情的な問題への最も実践的な解決策は、それを完全に感じることを自分に許すことだと気づいたことはありますか？"},
  {label:"でる度A #281",target:"mechanical",jp:"機械の",
   en:"I really think that when our responses to people become mechanical, it is a sign that we have stopped truly seeing them.",
   ja:"人々への反応が機械的になるとき、それは彼らを本当に見ることをやめたサインだと強く思います。"},
  {label:"でる度A #282",target:"federal",jp:"連邦政府の",
   en:"Do you think she believes that federal policy can ever truly reflect the deeply diverse needs of people living in very different circumstances?",
   ja:"連邦政府の政策が、全く異なる状況に住む人々の深く多様なニーズを本当に反映できると彼女は信じていると思いますか？"},
  {label:"でる度A #283",target:"aggressive",jp:"攻撃的な",
   en:"I honestly think that people who seem aggressive in their opinions are often the ones most afraid of being fundamentally wrong.",
   ja:"意見において攻撃的に見える人々は、しばしば根本的に間違っていることを最も恐れている人々だと正直思います。"},
  {label:"でる度A #284",target:"adequate",jp:"十分な",
   en:"Have you ever struggled with whether adequate was truly good enough, or whether something in you always demanded more than the minimum?",
   ja:"十分なことが本当に良いことなのか、それとも自分の何かが常に最低限以上を求めているのかと葛藤したことはありますか？"},
  {label:"でる度A #285",target:"unexpected",jp:"思いがけない",
   en:"I really believe that the most unexpected conversations in the most ordinary places have sometimes changed the entire direction of my thinking.",
   ja:"最も普通の場所での最も思いがけない会話が、時に私の思考の全方向を変えたことがあると強く信じています。"},
  {label:"でる度A #286",target:"attractive",jp:"魅力的な",
   en:"Do you think she finds confidence more attractive in others than physical appearance, or does she still find herself judging by what she first sees?",
   ja:"彼女は他者において肉体的な外見よりも自信の方が魅力的だと感じているのか、それとも最初に見るものでまだ判断してしまうのかと思いますか？"},
  {label:"でる度A #287",target:"sufficient",jp:"十分な",
   en:"I honestly think that knowing you did your best, even if the result was not sufficient, is a kind of peace that outcomes alone cannot give you.",
   ja:"結果が十分でなかったとしても、最善を尽くしたと知ることは、結果だけでは得られない種類の平和だと正直思います。"},
  {label:"でる度A #288",target:"costly",jp:"費用がかかる",
   en:"Have you ever made a decision that was not costly financially but proved extremely costly in terms of time, energy, and emotional peace?",
   ja:"経済的には費用がかからなかったが、時間、エネルギー、感情的な平和の面で非常に費用がかかることが判明した決断をしたことはありますか？"},
  {label:"でる度A #289",target:"eventually",jp:"結局は",
   en:"I really think that those who keep showing up honestly and consistently will eventually be trusted in ways that shortcuts never allow.",
   ja:"誠実に一貫して現れ続ける人々は、近道では決して許されない方法で結局は信頼されるようになると強く思います。"},
  {label:"でる度A #290",target:"otherwise",jp:"そうでなければ",
   en:"Do you think she acknowledges when she is wrong, or does she reframe things otherwise to protect her own sense of being right?",
   ja:"彼女は間違っているときに認めるのか、それとも自分が正しいという感覚を守るために物事をそうでなければと再解釈するのかと思いますか？"},
  {label:"でる度A #291",target:"previously",jp:"以前には",
   en:"I honestly feel grateful for beliefs I previously held that turned out to be wrong, because releasing them made room for something truer.",
   ja:"以前に持っていた信念が間違っていたことに感謝しています。なぜなら、それを手放すことがより真実なものへの場所を作ったからだと正直感じています。"},
  {label:"でる度A #292",target:"relatively",jp:"比較的",
   en:"Have you ever realized that a problem you were treating as a crisis was relatively minor compared to what others around you were silently enduring?",
   ja:"危機として扱っていた問題が、周りの人々が静かに耐えていることと比較すると比較的些細なことだと気づいたことはありますか？"},
  {label:"でる度A #293",target:"consequently",jp:"その結果",
   en:"I really think that when we fail to listen carefully to early warning signs, we consequently pay a far greater price later.",
   ja:"早期の警告サインを注意深く聞くことを怠ると、その結果としてはるかに大きな代価を後から払うことになると強く思います。"},
  {label:"でる度A #294",target:"constantly",jp:"絶えず",
   en:"Do you think she is constantly comparing her inner reality with the outer lives people display, and finding herself somehow lacking?",
   ja:"彼女は自分の内なる現実と人々が見せる外面の生活を絶えず比較し、何か欠けていると感じていると思いますか？"},
  {label:"でる度A #295",target:"typically",jp:"通常",
   en:"I honestly think that what people typically say they value and how they actually spend their time rarely match as closely as they imagine.",
   ja:"人々が通常大切にすると言うことと、実際に時間を使う方法は、想像するほど一致しないことが多いと正直思います。"},
  {label:"でる度A #296",target:"barely",jp:"かろうじて",
   en:"Have you ever held yourself together for so long that when someone asked if you were okay, you could barely answer before breaking down?",
   ja:"誰かが大丈夫かと聞いたとき、崩れ落ちる前にかろうじて答えられないほど長い間自分を保ち続けたことはありますか？"},
  {label:"でる度A #297",target:"despite",jp:"にもかかわらず",
   en:"I really admire those who continue to give generously to others despite carrying their own heavy and unspoken burdens.",
   ja:"自分自身の重くて口に出せない荷物を抱えているにもかかわらず、他者に惜しみなく与え続ける人を心から尊敬します。"},
  {label:"でる度A #298",target:"per",jp:"につき",
   en:"Do you think she ever calculates what she earns per hour of genuine happiness versus per hour of obligation, and wonders about the ratio?",
   ja:"彼女は本当の幸福の1時間につき稼ぐものと義務の1時間につきのものを計算し、その比率について疑問に思うことがあると思いますか？"},
  {label:"でる度A #299",target:"beneath",jp:"下に",
   en:"I honestly believe that beneath even the most composed exterior, most people are quietly carrying something they have never told anyone.",
   ja:"最も落ち着いた外見の下にも、ほとんどの人は誰にも話したことがない何かを静かに抱えていると正直信じています。"},
  {label:"でる度A #300",target:"whereas",jp:"であるのに対して",
   en:"Have you ever noticed that some people grow warmer and more open with age, whereas others seem to slowly close around their pain?",
   ja:"年齢とともに温かく開放的になる人もいるのであるのに対して、他の人は自分の痛みを中心に徐々に閉じていくように見えることに気づいたことはありますか？"},
  {label:"でる度A #301",target:"post",jp:"投稿する",
   en:"I really think that the decision to post something online is often driven more by a need to be seen than a need to communicate.",
   ja:"オンラインに何かを投稿する決断は、コミュニケーションの必要性よりも見られる必要性によって動かされることが多いと強く思います。"},
  {label:"でる度A #302",target:"reject",jp:"拒絶する",
   en:"Do you think she is able to reject other people's expectations of her without feeling guilty for choosing her own path instead?",
   ja:"彼女は代わりに自分の道を選ぶことで罪悪感を感じることなく、他者の期待を拒絶することができると思いますか？"},
  {label:"でる度A #303",target:"consult",jp:"相談する",
   en:"I honestly think that people consult others not always for advice but often just for the experience of being listened to without judgment.",
   ja:"人々が他者に相談するのは、必ずしもアドバイスのためではなく、判断なしに聞いてもらう経験のためであることが多いと正直思います。"},
  {label:"でる度A #304",target:"obey",jp:"従う",
   en:"Have you ever felt the tension between your desire to obey the rules and your sense that following them would make you complicit in something wrong?",
   ja:"規則に従う欲求と、それに従うことで何か間違ったことに加担することになるという感覚の間の緊張を感じたことはありますか？"},
  {label:"でる度A #305",target:"engage",jp:"従事させる",
   en:"I really believe that the ability to engage deeply with other people's ideas without losing your own is one of the rarest intellectual gifts.",
   ja:"自分自身を失わずに他者のアイデアに深く従事する能力は、最も稀な知的な才能の一つだと強く信じています。"},
  {label:"でる度A #306",target:"restore",jp:"修復する",
   en:"Do you think she believes it is ever truly possible to restore a broken trust, or does she feel that something always remains changed?",
   ja:"壊れた信頼を本当に修復することは可能だと彼女は信じているのか、それとも何かが常に変わったままだと感じているのかと思いますか？"},
  {label:"でる度A #307",target:"colonize",jp:"植民地化する",
   en:"I honestly think that to colonize another people's land is to colonize their story — and that wound does not heal easily or quickly.",
   ja:"他の民族の土地を植民地化することは、彼らの物語を植民地化することであり、その傷は簡単にも素早くも癒えないと正直思います。"},
  {label:"でる度A #308",target:"interact",jp:"交流する",
   en:"Have you ever noticed how differently you interact with someone depending on whether you believe they genuinely like and respect you?",
   ja:"相手が本当に自分を好きで尊重していると思うかどうかによって、どれほど異なる形で交流するかに気づいたことはありますか？"},
  {label:"でる度A #309",target:"inspire",jp:"奮起させる",
   en:"I really think that the people who inspire us most are rarely those with the most extraordinary abilities but those with the most extraordinary courage.",
   ja:"最も私たちを奮起させる人々は、最も並外れた能力を持つ人々ではなく、最も並外れた勇気を持つ人々であることがほとんどだと強く思います。"},
  {label:"でる度A #310",target:"sue",jp:"訴える",
   en:"Do you think she would ever sue someone she once loved deeply, or would she find a way to let go without making it a legal battle?",
   ja:"かつて深く愛した人を訴えることがあると思いますか、それとも法的な戦いにせずに手放す方法を見つけるでしょうか？"},
  {label:"でる度A #311",target:"estimate",jp:"推定する",
   en:"I honestly think we consistently estimate the time and effort needed for meaningful change to be far less than reality eventually demands.",
   ja:"意味のある変化に必要な時間と努力を、現実が最終的に要求するものよりもはるかに少なく推定し続けると正直思います。"},
  {label:"でる度A #312",target:"strengthen",jp:"強化する",
   en:"Have you ever gone through an experience so painful that it seemed designed to strengthen exactly the part of you that needed it most?",
   ja:"最も必要としていた部分をまさに強化するために設計されているかのように思える、非常に辛い経験をしたことはありますか？"},
  {label:"でる度A #313",target:"carve",jp:"彫って作る",
   en:"I really believe that every person must carve out their own sense of purpose from the raw material of their particular life and losses.",
   ja:"すべての人は自分の特定の人生と喪失の原材料から、自分自身の目的意識を彫って作らなければならないと強く信じています。"},
  {label:"でる度A #314",target:"convince",jp:"説得する",
   en:"Do you think she finds it easier to convince herself she is fine, or does she actually listen when her body and emotions say otherwise?",
   ja:"自分は大丈夫だと自分を説得する方が簡単だと感じているのか、それとも体と感情がそうでないと言うときに実際に聞くのかと思いますか？"},
  {label:"でる度A #315",target:"propose",jp:"提案する",
   en:"I honestly feel that the courage it takes to propose a completely new way of doing something is deeply underestimated in most organizations.",
   ja:"ほとんどの組織で、何かをする全く新しい方法を提案するために必要な勇気が深く過小評価されていると正直感じています。"},
  {label:"でる度A #316",target:"blame",jp:"責任を負わせる",
   en:"Have you ever noticed how quickly we blame others when things go wrong, and how long it takes to honestly examine our own contribution?",
   ja:"物事がうまくいかないとき、いかに素早く責任を負わせるか、そして自分自身の貢献を正直に検討するのにいかに時間がかかるかに気づいたことはありますか？"},
  {label:"でる度A #317",target:"collapse",jp:"崩れ落ちる",
   en:"I really think that when something we have built with great hope and effort begins to collapse, the grief is unlike almost any other.",
   ja:"大きな希望と努力で築いたものが崩れ落ち始めるとき、その悲しみは他のほとんどのものとは異なると強く思います。"},
  {label:"でる度A #318",target:"import",jp:"輸入する",
   en:"Do you think she ever considers the human stories behind the products she uses daily — who made them, where, and at what cost?",
   ja:"彼女は毎日使う製品の背後にある人間の物語、誰が、どこで、どんな代価で作ったかを時々考えることがあると思いますか？"},
  {label:"でる度A #319",target:"load",jp:"積む",
   en:"I honestly believe that trying to load too much meaning into a single relationship is one of the most common ways we damage the ones we love.",
   ja:"一つの関係に多すぎる意味を積もうとすることは、愛する人々を傷つける最も一般的な方法の一つだと正直信じています。"},
  {label:"でる度A #320",target:"pollute",jp:"汚染する",
   en:"Have you ever felt that spending too much time in cynical company can pollute your own sense of what is possible and worth trying?",
   ja:"冷笑的な仲間と多すぎる時間を過ごすことが、何が可能で試す価値があるかという自分の感覚を汚染することがあると感じたことはありますか？"},
  {label:"でる度A #321",target:"spot",jp:"場所",
   en:"I really think that everyone needs at least one spot in the world where they feel completely themselves without needing to perform for anyone.",
   ja:"誰もが世界に少なくとも一つ、誰かのためにパフォーマンスすることなく完全に自分自身でいられる場所が必要だと強く思います。"},
  {label:"でる度A #322",target:"prescription",jp:"処方箋",
   en:"Have you ever felt the quiet vulnerability of handing someone a prescription and hoping it would finally give you back some peace?",
   ja:"処方箋を渡して、それがついに平和を取り戻してくれることを望む静かな脆さを感じたことはありますか？"},
  {label:"でる度A #323",target:"duty",jp:"仕事",
   en:"I really think that people who confuse duty with love often end up resenting the very people they sacrificed themselves for.",
   ja:"義務と愛を混同する人々は、しばしば自分を犠牲にした相手を恨んでしまうことになると強く思います。"},
  {label:"でる度A #324",target:"union",jp:"組合",
   en:"Do you think she believes that a union between different people or ideas produces something stronger than either could be on their own?",
   ja:"異なる人々やアイデアの組合は、どちらか単独では持てないより強いものを生み出すと彼女は信じていると思いますか？"},
  {label:"でる度A #325",target:"concept",jp:"概念",
   en:"I honestly think that the concept of success we inherit from our families is one of the hardest to examine and one of the most worth questioning.",
   ja:"家族から受け継ぐ成功の概念は、検討するのが最も難しく、疑問を持つのが最も価値があるものの一つだと正直思います。"},
  {label:"でる度A #326",target:"root",jp:"根本",
   en:"Have you ever traced a recurring pattern in your life back to its root and felt both the pain and the relief of finally understanding it?",
   ja:"人生の繰り返すパターンをその根本まで辿り、ついに理解した痛みと安堵の両方を感じたことはありますか？"},
  {label:"でる度A #327",target:"survival",jp:"生き残り",
   en:"I really believe that survival is sometimes not about strength but about the quiet refusal to stop moving even when everything says stop.",
   ja:"生き残りとは時に強さについてではなく、すべてが止まれと言うときでも動き続けることを静かに拒否することだと強く信じています。"},
  {label:"でる度A #328",target:"maintenance",jp:"保守点検",
   en:"Do you think she understands that the maintenance of close relationships requires just as much deliberate care as maintaining anything else of value?",
   ja:"親密な関係の保守点検は、他の価値あるものを維持するのと同じくらい意図的な配慮が必要だと彼女は理解していると思いますか？"},
  {label:"でる度A #329",target:"formation",jp:"形成",
   en:"I honestly think the formation of a person's character owes as much to what they have survived as to what they were deliberately taught.",
   ja:"人の人格の形成は、意図的に教えられたことと同じくらい、乗り越えてきたことに負っていると正直思います。"},
  {label:"でる度A #330",target:"educator",jp:"教育者",
   en:"Have you ever had an educator whose belief in your potential changed what you believed was possible for yourself?",
   ja:"あなたの可能性への信念が、あなた自身に可能だと思っていたことを変えた教育者がいたことはありますか？"},
  {label:"でる度A #331",target:"kidney",jp:"腎臓",
   en:"I really think that the kidney, like so many quiet organs, only receives attention when it stops doing the invisible work that keeps us alive.",
   ja:"腎臓は、多くの静かな臓器と同様に、私たちを生かし続ける目に見えない仕事をやめたときにのみ注目されると強く思います。"},
  {label:"でる度A #332",target:"nutrition",jp:"栄養",
   en:"Do you think she pays as much attention to her emotional nutrition as she does to what she physically eats and drinks each day?",
   ja:"彼女は毎日身体的に食べたり飲んだりするものと同じくらい、感情的な栄養に注意を払っていると思いますか？"},
  {label:"でる度A #333",target:"brand",jp:"ブランド",
   en:"I honestly think that people who define themselves too closely by a brand — whether a product or an ideology — are quietly outsourcing their identity.",
   ja:"製品であれイデオロギーであれ、ブランドに自分を密接に定義しすぎる人々は、静かにアイデンティティを外部委託していると正直思います。"},
  {label:"でる度A #334",target:"storage",jp:"保管",
   en:"Have you ever realized that your mind uses worry as a form of storage for all the problems you are not yet ready to solve?",
   ja:"心が、まだ解決する準備ができていないすべての問題の保管の形として心配を使っていることに気づいたことはありますか？"},
  {label:"でる度A #335",target:"firm",jp:"会社",
   en:"I really think that a firm which forgets that its people are human beings first and employees second will eventually pay a high price for that.",
   ja:"人々がまず人間であり、次に従業員であることを忘れた会社は、やがてそれに対して高い代価を払うことになると強く思います。"},
  {label:"でる度A #336",target:"statistics",jp:"統計",
   en:"Do you think she trusts statistics to tell the truth, or does she know that numbers can be arranged to say almost anything we want them to?",
   ja:"彼女は統計が真実を語ると信頼しているのか、それとも数字はほぼ私たちが言いたいことを言うように並べられると知っているのかと思いますか？"},
  {label:"でる度A #337",target:"toll",jp:"損失",
   en:"I honestly think that chronic stress takes a toll not just on the body but on the quality of every relationship and decision we make.",
   ja:"慢性的なストレスは身体だけでなく、私たちが行うすべての関係と決断の質にも損失をもたらすと正直思います。"},
  {label:"でる度A #338",target:"tip",jp:"秘訣",
   en:"Have you ever received a simple tip that completely changed the way you approached something you had been struggling with for years?",
   ja:"何年も苦しんでいたことへのアプローチを完全に変えたシンプルな秘訣を受け取ったことはありますか？"},
  {label:"でる度A #339",target:"CEO",jp:"最高経営責任者",
   en:"I really think that the best CEO is not always the most dominant person in the room but often the one who listens most carefully to the quiet voices.",
   ja:"最良のCEOは常に部屋で最も支配的な人ではなく、しばしば静かな声に最も注意深く耳を傾ける人だと強く思います。"},
  {label:"でる度A #340",target:"circumstance",jp:"状況",
   en:"Do you think she truly believes that her circumstance do not define her potential, or does she sometimes feel trapped by the life she was given?",
   ja:"状況が潜在能力を定義しないと彼女は本当に信じているのか、それとも与えられた人生に閉じ込められていると感じることがあるのかと思いますか？"},
  {label:"でる度A #341",target:"outsider",jp:"部外者",
   en:"I honestly believe that the outsider perspective, though often painful, is one of the greatest sources of clarity and creative insight.",
   ja:"部外者の視点は、しばしば辛いものですが、明晰さと創造的な洞察の最大の源の一つだと正直信じています。"},
  {label:"でる度A #342",target:"reduction",jp:"削減",
   en:"Have you ever felt that a reduction in your responsibilities actually revealed how much of your identity had been built around staying busy?",
   ja:"責任の削減が、どれほど多くの自分のアイデンティティが忙しくいることを中心に構築されていたかを実際に明らかにしたことはありますか？"},
  {label:"でる度A #343",target:"settlement",jp:"開拓地",
   en:"I really think that every settlement humans have built carries within its streets and structures the accumulated dreams and sorrows of those who came before.",
   ja:"人間が築いたすべての開拓地は、その通りと建造物の中に、以前にやってきた人々の積み重なった夢と悲しみを持っていると強く思います。"},
  {label:"でる度A #344",target:"divorce",jp:"離婚",
   en:"Do you think she sees divorce as a failure, or has she come to understand it as a courageous decision to begin again more honestly?",
   ja:"彼女は離婚を失敗として見るのか、それともより正直に再出発するための勇気ある決断として理解するようになったのかと思いますか？"},
  {label:"でる度A #345",target:"likelihood",jp:"可能性",
   en:"I honestly think that we dramatically overestimate the likelihood of our worst fears coming true and underestimate our ability to cope if they do.",
   ja:"最悪の恐れが実現する可能性を劇的に過大評価し、実現した場合の対処能力を過小評価していると正直思います。"},
  {label:"でる度A #346",target:"livestock",jp:"家畜",
   en:"Have you ever thought seriously about the lives of livestock and felt the weight of the moral questions that come with eating meat?",
   ja:"家畜の命について真剣に考え、肉を食べることに伴う道徳的な問いの重みを感じたことはありますか？"},
  {label:"でる度A #347",target:"possession",jp:"所有物",
   en:"I really think that the possession we cling to most tightly is often the one that has the least actual value and the most emotional charge.",
   ja:"最も強く執着する所有物は、しばしば実際の価値が最も低く、感情的な重みが最も大きいものだと強く思います。"},
  {label:"でる度A #348",target:"plot",jp:"小区画",
   en:"Do you think she could be happy living on a small plot of land, growing her own food and living slowly, or would she feel confined?",
   ja:"彼女は小さな小区画の土地に住み、自分の食料を育て、ゆっくり生きることで幸せになれると思いますか、それとも閉じ込められたと感じるでしょうか？"},
  {label:"でる度A #349",target:"category",jp:"分類",
   en:"I honestly think that every time we place a person into a category, we risk missing the one thing about them that matters most.",
   ja:"人を分類に入れるたびに、その人について最も重要な一つのことを見逃すリスクがあると正直思います。"},
  {label:"でる度A #350",target:"welfare",jp:"福祉",
   en:"Have you ever felt frustrated that debates about welfare so rarely center the voices and experiences of those who actually depend on it?",
   ja:"福祉についての議論が、実際にそれに依存する人々の声と経験をほとんど中心に置かないことに苛立ちを感じたことはありますか？"},
  {label:"でる度A #351",target:"moisture",jp:"湿気",
   en:"I really think there is something quietly comforting about the moisture in the air after rain — it feels like the world has just exhaled.",
   ja:"雨の後の空気の湿気には静かに慰められるものがあります。まるで世界が息を吐いたかのように感じられると強く思います。"},
  {label:"でる度A #352",target:"obesity",jp:"肥満",
   en:"Do you think she approaches the issue of obesity with compassion for the complex emotional and social forces that often drive it?",
   ja:"彼女は肥満の問題を、しばしばそれを駆り立てる複雑な感情的・社会的な力への思いやりを持って取り組んでいると思いますか？"},
  {label:"でる度A #353",target:"grant",jp:"助成金",
   en:"I honestly think that access to a grant at the right moment can be the difference between a meaningful idea becoming real or dying unheard.",
   ja:"適切な瞬間の助成金へのアクセスは、意味のあるアイデアが実現するか、聞かれないまま死ぬかの違いになり得ると正直思います。"},
  {label:"でる度A #354",target:"layer",jp:"層",
   en:"Have you ever peeled back a layer of someone's personality and found something so unexpected and tender that it changed how you saw them entirely?",
   ja:"誰かの人格の層を剥がして、あまりにも予想外で繊細なものを見つけ、彼らをまったく異なる目で見るようになったことはありますか？"},
  {label:"でる度A #355",target:"secretary",jp:"秘書",
   en:"I really think that behind almost every powerful person in history, there was a secretary who remembered everything they forgot.",
   ja:"歴史上のほぼすべての強力な人物の背後には、彼らが忘れたすべてを覚えている秘書がいたと強く思います。"},
  {label:"でる度A #356",target:"anxiety",jp:"不安",
   en:"Do you think she has found a way to sit with anxiety rather than fight it, and to listen to what it might actually be trying to tell her?",
   ja:"彼女は不安と戦うのではなく、それとともにいる方法を見つけ、それが実際に何を伝えようとしているかに耳を傾けていると思いますか？"},
  {label:"でる度A #357",target:"ownership",jp:"所有権",
   en:"I honestly believe that true ownership of your life begins only when you stop blaming others for the shape it has taken.",
   ja:"人生の真の所有権は、その形を他者のせいにすることをやめたときにのみ始まると正直信じています。"},
  {label:"でる度A #358",target:"foundation",jp:"基礎",
   en:"Have you ever had the foundation of a belief or relationship crumble beneath you and had to find out who you were without it?",
   ja:"信念や関係の基礎が足元で崩れ、それなしで自分が誰かを見つけなければならなかったことはありますか？"},
  {label:"でる度A #359",target:"division",jp:"分断",
   en:"I really think that the division we see in society today reflects not a difference in values but a failure to understand each other's fears.",
   ja:"今日の社会で見られる分断は、価値観の違いではなく、お互いの恐れを理解する失敗を反映していると強く思います。"},
  {label:"でる度A #360",target:"establishment",jp:"設立",
   en:"Do you think she has ever questioned the establishment simply because it has always been there, or does she wait for real evidence of its failures?",
   ja:"彼女はただ常にそこにあったというだけで体制に疑問を持つのか、それとも実際の失敗の証拠を待つのかと思いますか？"},
  {label:"でる度A #361",target:"conservation",jp:"保護",
   en:"I honestly believe that conservation is not just about saving species but about preserving our own humanity and sense of wonder.",
   ja:"保護は種を救うだけでなく、私たち自身の人間性と驚きの感覚を保存することだと正直信じています。"},
  {label:"でる度A #362",target:"murder",jp:"殺人",
   en:"Have you ever tried to understand the psychology behind a murder without excusing it, and found that understanding and condoning are not the same thing?",
   ja:"それを許すことなく殺人の背後にある心理を理解しようとして、理解することと容認することは同じではないと気づいたことはありますか？"},
  {label:"でる度A #363",target:"presence",jp:"存在",
   en:"I really think that the presence of someone who truly listens can heal in ways that no advice, no matter how wise, ever fully can.",
   ja:"本当に聞いてくれる人の存在は、どんなに賢いアドバイスも完全にはできない方法で癒すことができると強く思います。"},
  {label:"でる度A #364",target:"paradox",jp:"逆説",
   en:"Do you think she has made peace with the paradox that you can love someone deeply and still know that you cannot build a life with them?",
   ja:"彼女は、誰かを深く愛しながらも彼らと人生を築くことができないという逆説と折り合いをつけていると思いますか？"},
  {label:"でる度A #365",target:"prisoner",jp:"囚人",
   en:"I honestly think that some of the freest people in the world are those who have literally been a prisoner and decided not to let it define them.",
   ja:"世界で最も自由な人々の一部は、文字通り囚人だったが、それに定義されないことを決意した人々だと正直思います。"},
  {label:"でる度A #366",target:"surgeon",jp:"外科医",
   en:"Have you ever thought about the extraordinary stillness a surgeon must find within themselves before making an incision that changes a life?",
   ja:"外科医が人生を変える切開をする前に、自分の中に見つけなければならない並外れた静けさについて考えたことはありますか？"},
  {label:"でる度A #367",target:"frequency",jp:"頻度",
   en:"I really think that the frequency with which we express gratitude to the people we love says more about our character than almost anything else.",
   ja:"愛する人々への感謝を表現する頻度は、ほとんど他の何よりも私たちの人格について多くを語ると強く思います。"},
  {label:"でる度A #368",target:"port",jp:"港",
   en:"Do you think she sees her hometown as a port she always returns to, or as the place she needed to leave in order to become herself?",
   ja:"彼女は故郷を常に戻ってくる港として見るのか、それとも自分自身になるために離れる必要があった場所として見るのかと思いますか？"},
  {label:"でる度A #369",target:"reception",jp:"歓迎会",
   en:"I honestly think that the reception we give to new ideas says everything about how open we truly are to growth and change.",
   ja:"新しいアイデアへの歓迎の仕方は、成長と変化に対して本当にどれほど開放的であるかについてすべてを語ると正直思います。"},
  {label:"でる度A #370",target:"coworker",jp:"同僚",
   en:"Have you ever had a coworker whose presence made the whole atmosphere lighter, and only realized how much they meant when they were gone?",
   ja:"その存在が全体の雰囲気を明るくした同僚がいて、いなくなってから初めてどれほど大切だったかに気づいたことはありますか？"},
  {label:"でる度A #371",target:"rust",jp:"錆",
   en:"I really believe that talent, like metal left unused, will eventually rust if it is not regularly exercised and exposed to challenge.",
   ja:"才能は、使われない金属のように、定期的に鍛えられ挑戦にさらされなければ、やがて錆びると強く信じています。"},
  {label:"でる度A #372",target:"athletics",jp:"スポーツ",
   en:"Have you ever noticed how athletics can teach a kind of discipline and resilience that formal education rarely manages to instill?",
   ja:"スポーツが、正規の教育ではほとんど植え付けることができない種類の規律と回復力を教えることに気づいたことはありますか？"},
  {label:"でる度A #373",target:"voyage",jp:"航海",
   en:"I really think that every significant relationship is a kind of voyage — you set out together not knowing what weather you will face.",
   ja:"すべての重要な関係は一種の航海だと強く思います。どんな天気に直面するかを知らないまま、一緒に出発します。"},
  {label:"でる度A #374",target:"ecologist",jp:"生態学者",
   en:"Do you think she would ever consider becoming an ecologist if she could start over, or does she feel her current path is exactly right?",
   ja:"もし最初からやり直せるなら生態学者になることを考えると思いますか、それとも現在の道がまさに正しいと感じているのかと思いますか？"},
  {label:"でる度A #375",target:"soul",jp:"魂",
   en:"I honestly believe there are moments of music, silence, and human connection that seem to reach a part of us we can only call the soul.",
   ja:"音楽、沈黙、そして人とのつながりの瞬間には、魂としか呼べない自分の一部に届くように思えるものがあると正直信じています。"},
  {label:"でる度A #376",target:"isolated",jp:"孤立した",
   en:"Have you ever felt most isolated not in empty rooms but in crowded spaces where no one seemed to truly see you?",
   ja:"空の部屋ではなく、誰も本当に自分を見てくれないような混んだ場所で最も孤立したと感じたことはありますか？"},
  {label:"でる度A #377",target:"biased",jp:"偏った",
   en:"I really think that everyone is biased in ways they cannot fully see, which is precisely why humility and self-examination are so essential.",
   ja:"誰もが自分には完全に見えない形で偏っているからこそ、謙虚さと自己検討が非常に不可欠なのだと強く思います。"},
  {label:"でる度A #378",target:"multiple",jp:"多数の",
   en:"Do you think she has come to peace with the idea that she can hold multiple truths at once — that something can be both good and deeply flawed?",
   ja:"何かが良いと同時に深く欠陥があるという、複数の真実を同時に保持できるというアイデアと折り合いをつけたと思いますか？"},
  {label:"でる度A #379",target:"crucial",jp:"重要な",
   en:"I honestly think that the crucial moment in any transformation is not the dramatic decision but the quiet one made alone in the dark.",
   ja:"いかなる変革においても重要な瞬間は、劇的な決断ではなく、暗闇の中で一人で行われる静かな決断だと正直思います。"},
  {label:"でる度A #380",target:"remote",jp:"人里離れた",
   en:"Have you ever spent time in a truly remote place and discovered a version of yourself that city life had quietly buried?",
   ja:"本当に人里離れた場所で時間を過ごし、都市生活が静かに埋葬していた自分のバージョンを発見したことはありますか？"},
  {label:"でる度A #381",target:"encouraging",jp:"励みになる",
   en:"I really think that an encouraging word given at the right moment costs nothing and yet can mean absolutely everything to the person who receives it.",
   ja:"適切な瞬間に与えられる励みになる言葉は何の費用もかからないのに、受け取る人にとってはすべてを意味し得ると強く思います。"},
  {label:"でる度A #382",target:"underground",jp:"地下の",
   en:"Do you think she ever feels that her most important thoughts and feelings remain underground, unseen by the people who matter most to her?",
   ja:"彼女の最も重要な思いと感情が、最も大切な人々に見られないまま地下に留まっていると時々感じると思いますか？"},
  {label:"でる度A #383",target:"stable",jp:"安定した",
   en:"I honestly believe that a stable sense of self is not one that never wavers but one that always finds its way back to its own center.",
   ja:"安定した自己感覚とは、決して揺らがないものではなく、常に自分の中心に戻る道を見つけるものだと正直信じています。"},
  {label:"でる度A #384",target:"domestic",jp:"国内の",
   en:"Have you ever noticed how domestic policy decisions made in distant capitals can quietly reshape the most intimate details of ordinary daily life?",
   ja:"遠い首都で行われた国内の政策決定が、日常生活の最も親密な詳細を静かに再形成する様子に気づいたことはありますか？"},
  {label:"でる度A #385",target:"shallow",jp:"浅はかな",
   en:"I really think that what looks like shallow behavior on the surface is often a defense mechanism protecting something much deeper and more tender.",
   ja:"表面上は浅はかな行動に見えることが、しばしばより深く繊細な何かを守る防衛機制であることが多いと強く思います。"},
  {label:"でる度A #386",target:"willing",jp:"こころよくする",
   en:"Do you think she is truly willing to change the things about herself she knows are causing harm, or does awareness stop short of action?",
   ja:"害を与えていると知っている自分の部分を変えることに本当にこころよくしているのか、それとも認識が行動の一歩手前で止まっているのかと思いますか？"},
  {label:"でる度A #387",target:"superior",jp:"優れている",
   en:"I honestly think that people who constantly need to feel superior to others are often most afraid of discovering they are not enough on their own.",
   ja:"常に他者より優れていると感じる必要がある人々は、しばしば自分だけでは十分でないことを発見することを最も恐れていると正直思います。"},
  {label:"でる度A #388",target:"profitable",jp:"利益になる",
   en:"Have you ever felt conflicted about doing something that was profitable but went against values you had always believed in?",
   ja:"利益になるが、常に信じてきた価値観に反することをすることに葛藤を感じたことはありますか？"},
  {label:"でる度A #389",target:"solid",jp:"確実な",
   en:"I really believe that solid friendships are not built in moments of celebration but in the quieter moments when you show up despite your own exhaustion.",
   ja:"確実な友情は祝いの瞬間ではなく、自分の疲労にもかかわらず現れるという静かな瞬間に築かれると強く信じています。"},
  {label:"でる度A #390",target:"tremendous",jp:"途方もない",
   en:"Do you think she feels the tremendous weight of responsibility that comes with being someone others genuinely look up to and depend on?",
   ja:"他者が本当に尊敬し依存している人物であることに伴う途方もない責任の重みを、彼女は感じていると思いますか？"},
  {label:"でる度A #391",target:"intellectual",jp:"知的な",
   en:"I honestly think that intellectual curiosity — the genuine desire to understand rather than to win — is one of the most attractive qualities a person can have.",
   ja:"知的な好奇心、つまり勝つためではなく理解したいという本物の欲求は、人が持てる最も魅力的な資質の一つだと正直思います。"},
  {label:"でる度A #392",target:"chief",jp:"主な",
   en:"Have you ever identified the chief reason you keep repeating a pattern and still found it nearly impossible to stop, even with full awareness?",
   ja:"パターンを繰り返し続ける主な理由を特定しても、完全に認識していても、止めることがほぼ不可能だと気づいたことはありますか？"},
  {label:"でる度A #393",target:"steady",jp:"着実な",
   en:"I really think that a steady, quiet commitment to something meaningful will almost always outlast the dramatic, short-lived burst of enthusiasm.",
   ja:"意味のあることへの着実で静かな献身は、ほぼ常に劇的で短命な熱狂の爆発を凌ぐと強く思います。"},
  {label:"でる度A #394",target:"evil",jp:"邪悪な",
   en:"Do you think she believes that truly evil acts come only from evil people, or does she understand how ordinary circumstances can lead ordinary people there?",
   ja:"真に邪悪な行為は邪悪な人からのみ来ると彼女は信じているのか、それとも平凡な状況がいかに平凡な人々をそこに導くかを理解しているのかと思いますか？"},
  {label:"でる度A #395",target:"coastal",jp:"沿岸の",
   en:"I honestly feel a deep sadness about the number of coastal communities that will be permanently altered by rising sea levels within our lifetime.",
   ja:"私たちの生涯の中で海面上昇によって永続的に変えられる沿岸のコミュニティの数について、深い悲しみを正直感じています。"},
  {label:"でる度A #396",target:"dairy",jp:"乳製品の",
   en:"Have you ever thought about the quiet complexity behind a single glass of milk and what the dairy industry actually costs in terms of welfare and land?",
   ja:"一杯のミルクの背後にある静かな複雑さと、乳製品業界が福祉と土地の面で実際に何を犠牲にしているかを考えたことはありますか？"},
  {label:"でる度A #397",target:"digestive",jp:"消化の",
   en:"I really think that the connection between the digestive system and mental health is one of the most underappreciated frontiers in modern medicine.",
   ja:"消化の系統と精神的健康の間のつながりは、現代医学で最も過小評価されているフロンティアの一つだと強く思います。"},
  {label:"でる度A #398",target:"loyal",jp:"忠実な",
   en:"Do you think she is the kind of person who remains loyal even when loyalty is inconvenient, or does she quietly reassess when the cost gets high?",
   ja:"彼女は忠誠心が不便なときでも忠実であり続ける種類の人なのか、それとも代価が高くなると静かに再評価するのかと思いますか？"},
  {label:"でる度A #399",target:"sensory",jp:"感覚の",
   en:"I honestly think that slowing down to notice sensory details — the smell of coffee, the light through leaves — is one of the simplest paths back to presence.",
   ja:"コーヒーの香りや葉を通る光などの感覚の細部に気づくためにゆっくりすることは、現在に戻る最もシンプルな道の一つだと正直思います。"},
  {label:"でる度A #400",target:"fancy",jp:"高級な",
   en:"Have you ever been served a meal in a very fancy restaurant and felt inexplicably underwhelmed by how little it actually nourished you inside?",
   ja:"非常に高級なレストランで食事を出されて、実際にどれほど内面を満たさなかったかに不思議なほど失望したことはありますか？"},
  {label:"でる度A #401",target:"spoil",jp:"台無しにする",
   en:"I really think that one act of pettiness or cruelty can spoil years of goodwill in a way that patience and kindness struggle to fully repair.",
   ja:"一つの些細さや残酷さが、忍耐と優しさが完全に修復するのに苦労する方法で、何年もの善意を台無しにすることがあると強く思います。"},
  {label:"でる度A #402",target:"stimulate",jp:"刺激する",
   en:"Do you think she seeks out experiences that genuinely stimulate her thinking, or does she sometimes prefer the comfort of what is already familiar?",
   ja:"彼女は本当に思考を刺激する経験を求めるのか、それとも時々すでに親しみのあるものの快適さを好むのかと思いますか？"},
  {label:"でる度A #403",target:"distract",jp:"注意をそらす",
   en:"I honestly think we use entertainment and noise to distract ourselves from the quiet questions that would actually bring us closer to who we are.",
   ja:"私たちは娯楽と騒音を使って、実際に自分が何者かに近づけてくれる静かな問いから注意をそらすと正直思います。"},
  {label:"でる度A #404",target:"bargain",jp:"交渉する",
   en:"Have you ever tried to bargain with yourself over a change you know you need to make and found that you are not a reliable negotiator?",
   ja:"必要だとわかっている変化について自分自身と交渉しようとして、自分が信頼できる交渉者ではないと気づいたことはありますか？"},
  {label:"でる度A #405",target:"emerge",jp:"明らかになる",
   en:"I really believe that the truest version of a person tends to emerge not when life is easy but when it becomes almost too hard to bear.",
   ja:"人の最も真実のバージョンは、人生が簡単なときではなく、ほとんど耐えられないほど難しくなったときに明らかになる傾向があると強く信じています。"},
  {label:"でる度A #406",target:"browse",jp:"見て歩く",
   en:"Do you think she uses the habit of browse online to genuinely explore new ideas, or mainly to avoid sitting alone with her own thoughts?",
   ja:"彼女はオンラインを見て歩く習慣を本当に新しいアイデアを探るために使っているのか、それとも主に自分の思考と一人で座ることを避けるために使っているのかと思いますか？"},
  {label:"でる度A #407",target:"define",jp:"定義する",
   en:"I honestly think that refusing to let a single experience or label define you for life is one of the most quietly radical acts of self-respect.",
   ja:"一つの経験やレベルに生涯にわたって自分を定義させることを拒否することは、最も静かに根本的な自尊心の行為の一つだと正直思います。"},
  {label:"でる度A #408",target:"adjust",jp:"調節する",
   en:"Have you ever had to adjust to a version of your life that looked nothing like what you had planned and found unexpected gifts inside the grief?",
   ja:"計画していたものとは全く異なる人生のバージョンに調節しなければならず、悲しみの中に予想外の贈り物を見つけたことはありますか？"},
  {label:"でる度A #409",target:"deserve",jp:"値する",
   en:"I really think one of the deepest forms of suffering is believing you do not deserve the love, rest, and peace that every human being needs.",
   ja:"最も深い苦しみの形の一つは、すべての人間が必要とする愛、休息、そして平和に自分が値しないと信じることだと強く思います。"},
  {label:"でる度A #410",target:"undergo",jp:"経験する",
   en:"Do you think she understands that to undergo genuine transformation, you must be willing to feel profoundly uncomfortable for an extended period?",
   ja:"本物の変容を経験するには、長期間にわたって深く不快に感じることを厭わない必要があることを彼女は理解していると思いますか？"},
  {label:"でる度A #411",target:"contradict",jp:"矛盾する",
   en:"I honestly believe that the ability to hold views that contradict each other without collapsing is one of the marks of a truly mature mind.",
   ja:"崩れることなく互いに矛盾する見解を保持する能力は、真に成熟した心の証の一つだと正直信じています。"},
  {label:"でる度A #412",target:"withdraw",jp:"引き出す",
   en:"Have you ever watched someone you love slowly withdraw from you and felt both helpless and desperate to understand what you might have done?",
   ja:"愛する人がゆっくりとあなたから離れていくのを見て、無力と同時に自分が何をしたかを理解しようと必死になったことはありますか？"},
  {label:"でる度A #413",target:"accompany",jp:"一緒に行く",
   en:"I really think that the willingness to accompany someone through their darkest moment, without trying to fix it, is the highest form of friendship.",
   ja:"それを直そうとせずに誰かの最も暗い瞬間に一緒に行く意志は、友情の最高の形だと強く思います。"},
  {label:"でる度A #414",target:"infect",jp:"感染させる",
   en:"Do you think she realizes that optimism and hope can infect a room just as powerfully as despair, if she chooses to carry them in?",
   ja:"彼女が持ち込むことを選べば、楽観主義と希望は絶望と同じくらい強力に部屋に感染させることができると彼女は気づいていると思いますか？"},
  {label:"でる度A #415",target:"rebel",jp:"反抗する",
   en:"I honestly think that the healthiest way to rebel is not against others but against the smaller, more frightened version of yourself.",
   ja:"最も健全な反抗の方法は他者に対してではなく、自分自身のより小さく、より怖れている部分に対してだと正直思います。"},
  {label:"でる度A #416",target:"convert",jp:"改造する",
   en:"Have you ever tried to convert a deeply held belief and realized that the mind changes its furniture far more slowly than we expect?",
   ja:"深く持つ信念を改造しようとして、心が私たちの期待よりもはるかにゆっくりと家具を変えることに気づいたことはありますか？"},
  {label:"でる度A #417",target:"calculate",jp:"算出する",
   en:"I really think that the costs worth caring about in life are the ones you cannot easily calculate — time, dignity, and peace of mind.",
   ja:"人生で気にかける価値のある代価は、時間、尊厳、そして心の平和など、簡単に算出することができないものだと強く思います。"},
  {label:"でる度A #418",target:"utilize",jp:"利用する",
   en:"Do you think she knows how to utilize periods of stillness and silence as fuel for creativity rather than as symptoms of emptiness?",
   ja:"彼女は静けさと沈黙の時期を、空虚さの症状としてではなく創造性の燃料として利用する方法を知っていると思いますか？"},
  {label:"でる度A #419",target:"admit",jp:"認める",
   en:"I honestly believe that the courage to admit you were wrong is rarer and more valuable than the ability to defend your position indefinitely.",
   ja:"間違っていたと認める勇気は、立場を無限に守る能力よりも稀で価値があると正直信じています。"},
  {label:"でる度A #420",target:"punish",jp:"罰する",
   en:"Have you ever noticed how harshly you punish yourself for mistakes you would immediately forgive in the people you love most?",
   ja:"最も愛する人々なら即座に許す過ちを、自分自身をいかに厳しく罰するかに気づいたことはありますか？"},
  {label:"でる度A #421",target:"approve",jp:"承認する",
   en:"I really think that waiting for others to approve of your choices before you can feel good about them is a way of giving away your own authority.",
   ja:"自分の選択について良く感じる前に他者の承認を待つことは、自分自身の権限を手放す方法だと強く思います。"},
  {label:"でる度A #422",target:"owe",jp:"おかげである",
   en:"Have you ever sat quietly and counted all the people to whom you owe a debt of gratitude that you have never properly expressed?",
   ja:"これまで適切に表現したことのない感謝の借りがある、すべての人々を静かに数えたことはありますか？"},
  {label:"でる度A #423",target:"proceed",jp:"向かう",
   en:"I really think that knowing when to pause and when to proceed is one of the most undervalued forms of wisdom in any endeavor.",
   ja:"いつ止まり、いつ向かうかを知ることは、いかなる取り組みにおいても最も過小評価されている知恵の形の一つだと強く思います。"},
  {label:"でる度A #424",target:"navigate",jp:"操縦する",
   en:"Do you think she has learned to navigate the complicated relationship between ambition and contentment without losing herself in either?",
   ja:"彼女はどちらにも自分を失わずに、野心と満足感の複雑な関係を操縦することを学んだと思いますか？"},
  {label:"でる度A #425",target:"postpone",jp:"延期する",
   en:"I honestly think that our tendency to postpone difficult conversations is one of the most common ways we damage our closest relationships.",
   ja:"難しい会話を延期する傾向は、最も親密な関係を傷つける最も一般的な方法の一つだと正直思います。"},
  {label:"でる度A #426",target:"swallow",jp:"飲み込む",
   en:"Have you ever had to swallow your pride in a way that felt humiliating at the time but proved to be the beginning of real growth?",
   ja:"当時は屈辱的に感じたが、本物の成長の始まりであることが判明した形で、プライドを飲み込まなければならなかったことはありますか？"},
  {label:"でる度A #427",target:"tailor",jp:"条件に合わせて作る",
   en:"I really believe that the most effective teachers are those who tailor their approach to the specific fears and strengths of each individual student.",
   ja:"最も効果的な教師は、各生徒の具体的な恐れと強みに合わせてアプローチを条件に合わせて作る人々だと強く信じています。"},
  {label:"でる度A #428",target:"overhear",jp:"偶然耳にする",
   en:"Do you think she would be honest about changing her opinion if she happened to overhear a compelling argument she had not considered before?",
   ja:"以前に考慮していなかった説得力のある議論を偶然耳にしたとき、意見を変えることを正直に認めると思いますか？"},
  {label:"でる度A #429",target:"consequence",jp:"結果",
   en:"I honestly think that most people are willing to take risks when they underestimate the consequence and only become cautious when the cost becomes real.",
   ja:"ほとんどの人は結果を過小評価するときにリスクを取る意欲があり、代価が現実になったときにのみ慎重になると正直思います。"},
  {label:"でる度A #430",target:"application",jp:"申請書",
   en:"Have you ever stared at an application and felt the strange vulnerability of trying to compress who you are into a few pages for someone to judge?",
   ja:"申請書を見つめて、誰かに判断されるために自分が誰かを数ページに圧縮しようとする奇妙な脆さを感じたことはありますか？"},
  {label:"でる度A #431",target:"workout",jp:"運動",
   en:"I really think the best workout is not the one that exhausts your body but the one that leaves you feeling genuinely more alive afterward.",
   ja:"最良の運動は体を疲弊させるものではなく、その後に本当により生き生きとした気分にさせるものだと強く思います。"},
  {label:"でる度A #432",target:"obstacle",jp:"障害物",
   en:"Do you think she sees each obstacle in her path as something to overcome, or has she learned to ask what it might be trying to teach her?",
   ja:"彼女は道の障害物をそれぞれ乗り越えるべきものとして見るのか、それともそれが何を教えようとしているかを尋ねることを学んだのかと思いますか？"},
  {label:"でる度A #433",target:"treaty",jp:"条約",
   en:"I honestly think that every treaty between nations, however imperfect, represents a hard-won choice for conversation over destruction.",
   ja:"どんなに不完全でも、国家間のすべての条約は、破壊よりも対話を選ぶ苦労して勝ち取った選択を表していると正直思います。"},
  {label:"でる度A #434",target:"deforestation",jp:"森林破壊",
   en:"Have you ever flown over a region of severe deforestation and felt the loss as something almost physical — a wound in the earth below?",
   ja:"ひどい森林破壊の地域の上を飛んで、地球の傷のような、ほとんど身体的な何かとしてその喪失を感じたことはありますか？"},
  {label:"でる度A #435",target:"infrastructure",jp:"インフラ",
   en:"I really think that a country's infrastructure reveals its true priorities — which communities it values and which it has decided can wait.",
   ja:"国のインフラは、どのコミュニティを大切にし、どのコミュニティが待てると決めたかという真の優先順位を明らかにすると強く思います。"},
  {label:"でる度A #436",target:"contribution",jp:"貢献",
   en:"Do you think she ever doubts whether her contribution to the people and projects she cares about is genuinely making a difference?",
   ja:"彼女が気にかける人々やプロジェクトへの貢献が本当に違いをもたらしているかどうかを時々疑うと思いますか？"},
  {label:"でる度A #437",target:"congestion",jp:"渋滞",
   en:"I honestly think that the congestion in our cities reflects something deeper — a collective failure to imagine and plan for how people actually live.",
   ja:"都市の渋滞は、人々が実際にどのように生きているかを想像し計画することへの集合的な失敗という、より深い何かを反映していると正直思います。"},
  {label:"でる度A #438",target:"exposure",jp:"身をさらすこと",
   en:"Have you ever found that repeated exposure to something you once feared gradually transformed your relationship to it in ways you never expected?",
   ja:"かつて恐れていたものへの繰り返しの身をさらすことが、予期しなかった方法でそれとの関係を徐々に変えたことを見つけたことはありますか？"},
  {label:"でる度A #439",target:"blow",jp:"打撃",
   en:"I really think that the deepest blow is not the one that knocks you down but the one that makes you question whether getting up is worth it.",
   ja:"最も深い打撃は、あなたを倒すものではなく、立ち上がることが価値があるかどうかを疑わせるものだと強く思います。"},
  {label:"でる度A #440",target:"participation",jp:"参加",
   en:"Do you think she believes that meaningful participation in community life is worth the time and energy it demands from an already busy person?",
   ja:"地域生活への意味のある参加は、すでに忙しい人から要求する時間とエネルギーに値すると彼女は信じていると思いますか？"},
  {label:"でる度A #441",target:"crisis",jp:"危機",
   en:"I honestly think that how a person behaves during a crisis reveals more about their true character than years of ordinary comfortable living.",
   ja:"危機の間の人の行動は、何年もの普通の快適な生活よりも、真の人格についてより多くを明らかにすると正直思います。"},
  {label:"でる度A #442",target:"ancestor",jp:"先祖",
   en:"Have you ever thought about how your ancestor could not have imagined the world you live in, and wondered what the next generations will inherit from you?",
   ja:"先祖があなたが生きる世界を想像できなかったことを考え、次の世代があなたから何を受け継ぐかと思ったことはありますか？"},
  {label:"でる度A #443",target:"architect",jp:"建築家",
   en:"I really believe that every parent is in some sense an architect — not of buildings but of the invisible structures inside another human being.",
   ja:"すべての親はある意味で建築家だと強く信じています。建物ではなく、別の人間の内側にある目に見えない構造の。"},
  {label:"でる度A #444",target:"existence",jp:"存在",
   en:"Do you think she has ever been struck by the sheer improbability of her own existence and felt something between awe and responsibility?",
   ja:"彼女は自分の存在の全くの非可能性に打たれ、畏敬と責任の間にある何かを感じたことがあると思いますか？"},
  {label:"でる度A #445",target:"deposit",jp:"内金",
   en:"I honestly think that every act of kindness is a kind of deposit into a shared account of human trust that we all draw from invisibly.",
   ja:"すべての親切の行為は、私たちが全員目に見えない形で引き出す人間の信頼の共有口座への一種の内金だと正直思います。"},
  {label:"でる度A #446",target:"finance",jp:"金融",
   en:"Have you ever felt that the language of finance creates a distance between us and the very human needs it is supposed to serve?",
   ja:"金融の言語が、それが仕えるべき非常に人間的なニーズの間に距離を作っていると感じたことはありますか？"},
  {label:"でる度A #447",target:"awareness",jp:"認識",
   en:"I really think that awareness of a problem without the will to change is just a more sophisticated form of avoidance.",
   ja:"変えようとする意志なしに問題の認識だけ持つことは、より洗練された回避の形に過ぎないと強く思います。"},
  {label:"でる度A #448",target:"intake",jp:"摂取量",
   en:"Do you think she monitors her daily intake of information as carefully as what she eats, or does she let the algorithm decide what fills her mind?",
   ja:"彼女は食べるものと同じくらい慎重に毎日の情報の摂取量を監視しているのか、それともアルゴリズムに心を満たすものを決めさせているのかと思いますか？"},
  {label:"でる度A #449",target:"witness",jp:"目撃者",
   en:"I honestly think that to be a genuine witness to another person's pain — without flinching or rushing to fix it — is an act of profound courage.",
   ja:"怯んだり急いで直そうとせずに、別の人の痛みの真の目撃者になることは、深い勇気の行為だと正直思います。"},
  {label:"でる度A #450",target:"coverage",jp:"報道",
   en:"Have you ever felt that the media coverage of an event missed something essential about the human reality at its center?",
   ja:"あるイベントのメディア報道が、その中心にある人間的現実について何か本質的なものを見逃していると感じたことはありますか？"},
  {label:"でる度A #451",target:"lawsuit",jp:"訴訟",
   en:"I really think that the threat of a lawsuit has become a way of silencing people who simply want to speak an inconvenient truth.",
   ja:"訴訟の脅威は、単に不都合な真実を話したい人々を黙らせる方法になったと強く思います。"},
  {label:"でる度A #452",target:"session",jp:"会議",
   en:"Do you think she finds long session of planning and discussion energizing, or does she privately wish people would simply trust her judgment and let her act?",
   ja:"長い計画と議論の会議を活力のあるものだと感じているのか、それとも単に彼女の判断を信頼して行動させてほしいと密かに思っているのかと思いますか？"},
  {label:"でる度A #453",target:"means",jp:"手段",
   en:"I honestly think the most important question is not what means are available to you but which ones you are willing to use with integrity.",
   ja:"最も重要な問いは、どんな手段が利用可能かではなく、どの手段を誠実さを持って使う意志があるかだと正直思います。"},
  {label:"でる度A #454",target:"pioneer",jp:"先駆者",
   en:"Have you ever felt grateful to a pioneer whose name you do not even know — someone whose sacrifice made your ordinary freedom possible?",
   ja:"名前さえ知らない先駆者、つまり自分の犠牲があなたの普通の自由を可能にした誰かに感謝を感じたことはありますか？"},
  {label:"でる度A #455",target:"satisfaction",jp:"満足",
   en:"I really think that the deepest satisfaction comes not from achieving what you wanted but from becoming someone who can want the right things.",
   ja:"最も深い満足は、望んでいたものを達成することからではなく、正しいものを望める人間になることから来ると強く思います。"},
  {label:"でる度A #456",target:"basis",jp:"根拠",
   en:"Do you think she examines the basis of her strongest opinions, or does she prefer to hold them without too much scrutiny?",
   ja:"彼女は最も強い意見の根拠を検討するのか、それともあまり精査せずに保持することを好むのかと思いますか？"},
  {label:"でる度A #457",target:"element",jp:"要素",
   en:"I honestly think that humor is an underrated element of resilience — the ability to find lightness even in the heaviest circumstances.",
   ja:"ユーモアは回復力の過小評価された要素であり、最も重い状況でさえ軽さを見つける能力だと正直思います。"},
  {label:"でる度A #458",target:"phenomenon",jp:"現象",
   en:"Have you ever watched a natural phenomenon — a storm, an eclipse, a migration — and felt briefly freed from every human concern?",
   ja:"嵐、日食、渡り鳥など、自然の現象を見て、すべての人間的な懸念から一時的に解放されたと感じたことはありますか？"},
  {label:"でる度A #459",target:"scale",jp:"規模",
   en:"I really think that the scale of a problem should never be used as an excuse to do nothing, because every large change begins somewhere small.",
   ja:"問題の規模は何もしない言い訳として使うべきではありません。なぜならすべての大きな変化はどこか小さなところから始まるからだと強く思います。"},
  {label:"でる度A #460",target:"journal",jp:"雑誌",
   en:"Do you think she has ever kept a journal and discovered in rereading it that she had been far wiser in her darkest moments than she realized?",
   ja:"日記をつけ、読み返す中で、最も暗い瞬間に自分が気づいていたよりもはるかに賢かったと発見したことがあると思いますか？"},
  {label:"でる度A #461",target:"grain",jp:"穀物",
   en:"I honestly think there is a quiet dignity in the labor of those who grow grain and feed the world while being among the least celebrated.",
   ja:"穀物を育て世界を養いながら、最も称えられない人々の労働には静かな尊厳があると正直思います。"},
  {label:"でる度A #462",target:"continent",jp:"大陸",
   en:"Have you ever looked at a map and felt a deep longing for a continent you have never visited and a life you have never lived?",
   ja:"地図を見て、訪れたことのない大陸と生きたことのない人生への深い憧れを感じたことはありますか？"},
  {label:"でる度A #463",target:"headquarters",jp:"本社",
   en:"I really think that decisions made in distant headquarters often fail because they are too far removed from the lived reality of the people they affect.",
   ja:"遠い本社で行われる決断は、影響を受ける人々の生きた現実からあまりにも遠いため、しばしば失敗すると強く思います。"},
  {label:"でる度A #464",target:"globalization",jp:"グローバル化",
   en:"Do you think she sees globalization as a force that connects humanity or one that quietly erases the differences that make each culture irreplaceable?",
   ja:"彼女はグローバル化を人類をつなぐ力として見るのか、それとも各文化をかけがえないものにする違いを静かに消す力として見るのかと思いますか？"},
  {label:"でる度A #465",target:"brochure",jp:"パンフレット",
   en:"I honestly think that the life promised in a travel brochure and the life you actually live when you get there are two beautifully different things.",
   ja:"旅行のパンフレットで約束された生活と、実際に行ったときに生きる生活は、二つの美しく異なるものだと正直思います。"},
  {label:"でる度A #466",target:"inspection",jp:"検査",
   en:"Have you ever undergone a medical inspection and felt the vulnerability of having your body assessed by someone who does not know your story?",
   ja:"医学的な検査を受けて、あなたの物語を知らない人に体を評価される脆さを感じたことはありますか？"},
  {label:"でる度A #467",target:"attendance",jp:"出席者数",
   en:"I really think that in any community, regular attendance is one of the most honest expressions of where your real commitments lie.",
   ja:"どんなコミュニティでも、定期的な出席者数は、本当のコミットメントがどこにあるかの最も正直な表現の一つだと強く思います。"},
  {label:"でる度A #468",target:"copper",jp:"銅",
   en:"Do you think she ever wonders about the journey a single piece of copper makes — from deep underground to the device in her hand right now?",
   ja:"一片の銅が地下深くから今手の中にある機器まで辿る旅について、彼女は時々思うことがあると思いますか？"},
  {label:"でる度A #469",target:"dozen",jp:"1ダース",
   en:"I honestly think that a dozen small acts of consistent kindness matter far more than one grand dramatic gesture that is soon forgotten.",
   ja:"すぐに忘れられる一度の壮大な劇的なジェスチャーよりも、一ダースの一貫した小さな親切の行為の方がはるかに重要だと正直思います。"},
  {label:"でる度A #470",target:"flu",jp:"インフルエンザ",
   en:"Have you ever had the flu badly enough that it reminded you how much you take your ordinary good health for granted every single day?",
   ja:"インフルエンザで十分ひどくなり、毎日当たり前の健康をいかに当然のこととして受け取っているかを思い知らされたことはありますか？"},
  {label:"でる度A #471",target:"burial",jp:"埋葬",
   en:"I really think that attending a burial forces a kind of honesty about what matters and what does not that ordinary life tends to avoid.",
   ja:"埋葬に参列することは、日常生活が避けがちな、何が重要で何がそうでないかについての一種の誠実さを強いると強く思います。"},
  {label:"でる度A #472",target:"mold",jp:"カビ",
   en:"Do you think she ever worries that without new challenges and fresh air, comfort can quietly become a kind of mold that grows over ambition?",
   ja:"新しい挑戦と新鮮な空気がなければ、快適さが野心の上に生えるカビの一種に静かになることがあると彼女は心配することがあると思いますか？"},
  {label:"でる度A #473",target:"patch",jp:"区画",
   en:"I honestly believe that a small patch of garden, tended with patience over years, teaches something about care that few other things can.",
   ja:"何年もかけて忍耐を持って手入れされた小さな区画の庭は、他のほとんどのものが教えられない世話について何かを教えてくれると正直信じています。"},
  {label:"でる度A #474",target:"diagram",jp:"図",
   en:"Have you ever looked at a complex diagram of how something works and felt a quiet awe at how much invisible order exists beneath visible simplicity?",
   ja:"何かがどのように機能するかの複雑な図を見て、目に見えるシンプルさの下にいかに多くの目に見えない秩序が存在するかへの静かな畏敬を感じたことはありますか？"},
  {label:"でる度A #475",target:"placement",jp:"斡旋",
   en:"I really think that the placement of a child in a school or environment that truly understands them can alter the entire course of their development.",
   ja:"子供を本当に理解している学校や環境への斡旋は、発達の全過程を変えることができると強く思います。"},
  {label:"でる度A #476",target:"shame",jp:"残念なこと",
   en:"Do you think she can distinguish between healthy guilt, which motivates change, and corrosive shame, which simply makes her want to disappear?",
   ja:"変化を促す健全な罪悪感と、単に消えたくさせる腐食性の残念な気持ちを区別できると彼女は思いますか？"},
  {label:"でる度A #477",target:"wheelchair",jp:"車椅子",
   en:"I honestly think that a society which fails to make its public spaces fully accessible to those in a wheelchair reveals a failure of both imagination and empathy.",
   ja:"車椅子の人々に公共スペースを完全にアクセスできるようにしない社会は、想像力と共感の両方の失敗を明らかにすると正直思います。"},
  {label:"でる度A #478",target:"experienced",jp:"熟練した",
   en:"Have you ever worked alongside someone truly experienced and felt the humbling difference between what they noticed and what you had completely overlooked?",
   ja:"本当に熟練した人と一緒に働き、彼らが気づいたこととあなたが完全に見落としていたことの謙虚にさせる違いを感じたことはありますか？"},
  {label:"でる度A #479",target:"initial",jp:"最初の",
   en:"Do you think the initial impression you form of a person is usually right, or do you find it is often misleading?",
   ja:"最初に形成するある人への印象は通常正しいと思いますか、それとも誤解を招くことが多いと思いますか？"},
  {label:"でる度A #480",target:"mainstream",jp:"主流の",
   en:"I really think that ideas which are outside the mainstream today are often simply the mainstream of a generation that has not yet arrived.",
   ja:"今日の主流の外にあるアイデアは、しばしば単にまだ来ていない世代の主流に過ぎないと強く思います。"},
  {label:"でる度A #481",target:"appropriate",jp:"適切な",
   en:"Do you think she always knows what the most appropriate response to someone's pain is, or does she sometimes say the wrong thing with good intentions?",
   ja:"誰かの痛みへの最も適切な反応が常にわかるのか、それとも時々良い意図で間違ったことを言うことがあると思いますか？"},
  {label:"でる度A #482",target:"fake",jp:"偽物の",
   en:"I honestly think that a fake smile offered consistently is more exhausting than a real one given rarely, both for the person wearing it and the one receiving it.",
   ja:"一貫して与える偽物の笑顔は、まれに与える本物の笑顔よりも、それを見せる人にとっても受け取る人にとっても疲弊させると正直思います。"},
  {label:"でる度A #483",target:"alert",jp:"用心している",
   en:"Have you ever been so emotionally exhausted that you were no longer alert to the subtle signals people send when they need help?",
   ja:"感情的に疲弊しすぎて、人々が助けを必要としているときに送る微妙なシグナルに用心している状態でなくなったことはありますか？"},
  {label:"でる度A #484",target:"fatal",jp:"致命的な",
   en:"I really think that the most fatal flaw in any relationship is not conflict but the gradual decision to stop being honest with each other.",
   ja:"いかなる関係においても最も致命的な欠陥は、衝突ではなく、お互いに正直であることを徐々にやめる決断だと強く思います。"},
  {label:"でる度A #485",target:"nutritious",jp:"栄養のある",
   en:"Do you think she considers her emotional diet as carefully as her physical one and asks whether what she consumes each day is genuinely nutritious?",
   ja:"彼女は毎日消費するものが本当に栄養のあるものかどうかを問いながら、感情的な食事を身体的なものと同じくらい慎重に考えていると思いますか？"},
  {label:"でる度A #486",target:"sophisticated",jp:"洗練された",
   en:"I honestly think that the most sophisticated response to disagreement is not to win the argument but to remain genuinely curious about where the other view came from.",

  {label:"でる度C #1195",target:"obedience",jp:"何とかして、とにかく",
